let audioCtx = null;

let bgmOsc = null;
let bgmGain = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
// Ensure audio works on mobile (requires user gesture)
document.addEventListener('touchstart', initAudio, {once: true});
document.addEventListener('click', initAudio, {once: true});

function playTone(freq, duration, type = 'sine', vol = 0.08) {
    if (!soundEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxClick() { playTone(800, 0.08, 'sine', 0.06); }
function sfxSuccess() {
    playTone(523, 0.15, 'sine', 0.08);
    setTimeout(() => playTone(659, 0.15, 'sine', 0.08), 100);
    setTimeout(() => playTone(784, 0.25, 'sine', 0.08), 200);

    if (!soundEnabled || !audioCtx || bgmPlaying) return;
    bgmPlaying = true;
    const notes = [262, 294, 330, 349, 330, 294, 262, 247, 262, 294, 330, 294, 262, 247, 220, 247];
    let i = 0;
    bgmInterval = setInterval(() => {
        if (!soundEnabled) return;
        playTone(notes[i % notes.length], 0.4, 'sine', 0.02);
        i++;
    }, 500);
}
function stopBGM() {
    bgmPlaying = false;
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 音效' : '🔇 靜音';

    else stopBGM();
}

        container.appendChild(p);
    }
}

// --- Transition ---
function showTransition(icon, text, duration = 1500) {
    return new Promise(resolve => {
        const overlay = document.getElementById('transOverlay');
        document.getElementById('transIcon').textContent = icon;
        document.getElementById('transText').textContent = text;
        overlay.classList.add('active');
        setTimeout(() => {
            overlay.classList.remove('active');
            setTimeout(resolve, 400);
        }, duration);
    });
}

// --- Floating Notification ---
function floatNotify(text, type = 'info') {
    const el = document.createElement('div');
    el.className = `float-notify ${type}`;
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

// --- Typewriter Effect ---
let typewriterTimer = null;
function typewrite(elementId, text, speed = 30) {
    return new Promise(resolve => {
        const el = document.getElementById(elementId);
        if (!el) { resolve(); return; }
        el.innerHTML = '<span class="typewriter-cursor"></span>';
        let i = 0;
        if (typewriterTimer) clearInterval(typewriterTimer);
        typewriterTimer = setInterval(() => {
            if (i < text.length) {
                el.innerHTML = text.substring(0, i + 1) + '<span class="typewriter-cursor"></span>';
                i++;
            } else {
                clearInterval(typewriterTimer);
                typewriterTimer = null;
                el.innerHTML = text;
                resolve();
            }
        }, speed);
    });
}

function moodEmoji(m) {
    if (m >= 80) return '😄';
    if (m >= 60) return '🙂';
    if (m >= 40) return '😐';
    if (m >= 20) return '😰';
    return '😭';
}

function energyColor(e) {
    if (e >= 60) return 'fill-green';
    if (e >= 30) return 'fill-orange';
    return 'fill-red';
}

function renderStatusBar() {
    const year = Math.ceil(G.month / 12);
    const monthInYear = ((G.month - 1) % 12) + 1;
    const progress = ((G.month - 1) * 30 + G.day) / (36 * 30) * 100;
    return `
    <div class="progress-wrap">
        <div class="progress-label"><span>📊 遊戲進度 ${Math.round(progress)}%</span><span>第${year}年 ${monthInYear}月 · 第${G.day}日</span></div>
        <div class="progress-bar"><div class="progress-fill fill-blue" style="width:${progress}%"></div></div>
        <div class="progress-label"><span>⚡ 精力 ${G.energy}%</span><span>🎯 技能 ${G.skill} · ⭐ 口碑 ${G.reputation}</span></div>
        <div class="progress-bar"><div class="progress-fill ${energyColor(G.energy)}" style="width:${G.energy}%"></div></div>
    </div>
    <div class="status-bar">
        <div class="stat-box">
            <div class="label">📅 日期</div>
            <div class="value date">第${year}年 ${monthInYear}月</div>
        </div>

function render() {
    const single = document.getElementById('appSingle');
    const layout = document.getElementById('gameLayout');
    const topbar = document.getElementById('topbar');
    const main = document.getElementById('appMain');

    const isGameplay = ['play','result','event','monthEnd'].includes(G.phase);

    if (isGameplay) {
        single.style.display = 'none';
        layout.style.display = 'flex';
        const choices = document.getElementById('appChoices');
        document.getElementById('topbar').innerHTML = renderTopbar();
        let content;
        switch (G.phase) {
            case 'play': content = renderPlay(); break;
            case 'result': content = renderResult(); break;
            case 'event': content = renderEvent(); break;
            case 'monthEnd': content = renderMonthEnd(); break;
        }
        main.innerHTML = content.story;
        choices.innerHTML = content.choices;
        main.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        single.style.display = 'block';
        layout.style.display = 'none';
        switch (G.phase) {
            case 'start': single.innerHTML = renderStart(); break;
            case 'guide': single.innerHTML = renderGuide(); break;
            case 'end': single.innerHTML = renderEnd(); break;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function renderTopbar() {
    const year = Math.ceil(G.month / 12);
    const monthInYear = ((G.month - 1) % 12) + 1;
    const progress = ((G.month - 1) * 30 + G.day) / (36 * 30) * 100;
    const remaining = Math.max(0, G.target - G.salesThisMonth);
    const daysLeft = 30 - G.day;
    const rankNames = ['初級','高級顧問','主管'];

    // Warnings
    let warnings = [];
    if (G.money < -5000) warnings.push('💀 負債嚴重！');
    else if (G.money < 0) warnings.push('⚠️ 負債中');
    if (G.mood <= 15) warnings.push('💀 心情瀕危！');
    else if (G.mood <= 30) warnings.push('⚠️ 心情低');
    if (G.stress >= 85) warnings.push('💀 壓力爆煲！');
    else if (G.stress >= 60) warnings.push('⚠️ 壓力高');
    if (G.failMonths >= 2) warnings.push('💀 再未達標就被炒！');
    else if (G.failMonths >= 1) warnings.push('⚠️ 上月未達標');

    const warnHTML = warnings.length > 0 ? `<div class="topbar-warning">${warnings.map(w => `<span>${w}</span>`).join('')}</div>` : '';

    // Stat classes
    const moneyDanger = G.money < -5000 ? ' danger' : G.money < 0 ? ' warning' : '';
    const moodDanger = G.mood <= 15 ? ' danger' : G.mood <= 30 ? ' warning' : '';
    const stressDanger = G.stress >= 85 ? ' danger' : G.stress >= 60 ? ' warning' : '';
    const failDanger = G.failMonths >= 2 ? ' danger' : G.failMonths >= 1 ? ' warning' : '';
    const energyDanger = G.energy <= 20 ? ' warning' : '';

    return `${warnHTML}<div class="topbar-stats">
        <div class="ts"><span class="ts-label">📅</span><span class="ts-val c-blue">第${year}年${monthInYear}月 第${G.day}日</span></div>
        <div class="ts"><span class="ts-label">📊</span><span class="ts-val c-blue">${Math.round(progress)}%</span><div class="ts-bar"><div class="ts-bar-fill" style="width:${progress}%;background:#60a5fa;"></div></div></div>
        <div class="ts${moneyDanger}"><span class="ts-label">💰</span><span class="ts-val ${G.money<0?'c-red':'c-green'}">$${G.money.toLocaleString()}</span></div>
        <div class="ts"><span class="ts-label">📋</span><span class="ts-val ${G.salesThisMonth>=G.target?'c-green':'c-orange'}">${G.salesThisMonth}/${G.target}</span><span class="ts-label">差${remaining}單·剩${daysLeft}日</span></div>
        <div class="ts${failDanger}"><span class="ts-label">📉</span><span class="ts-val ${G.failMonths>=2?'c-red':G.failMonths>=1?'c-orange':'c-green'}">${G.failMonths}/3</span></div>
        <div class="ts${energyDanger}"><span class="ts-label">⚡</span><span class="ts-val ${G.energy<=20?'c-red':G.energy<=40?'c-orange':'c-green'}">${G.energy}%</span><div class="ts-bar"><div class="ts-bar-fill" style="width:${G.energy}%;background:${G.energy<=20?'#ef4444':G.energy<=40?'#f97316':'#22c55e'};"></div></div></div>
        <div class="ts${moodDanger}"><span class="ts-label">${moodEmoji(G.mood)}</span><span class="ts-val ${G.mood<=15?'c-red':G.mood<=30?'c-orange':'c-yellow'}">${G.mood}</span><div class="ts-bar"><div class="ts-bar-fill" style="width:${G.mood}%;background:${G.mood<=15?'#ef4444':G.mood<=30?'#f97316':'#fbbf24'};"></div></div></div>
        <div class="ts${stressDanger}"><span class="ts-label">😰</span><span class="ts-val ${G.stress>=85?'c-red':G.stress>=60?'c-orange':G.stress>=40?'c-yellow':'c-green'}">${G.stress}</span><div class="ts-bar"><div class="ts-bar-fill" style="width:${G.stress}%;background:${G.stress>=85?'#ef4444':G.stress>=60?'#f97316':G.stress>=40?'#fbbf24':'#22c55e'};"></div></div></div>
        <div class="ts"><span class="ts-label">🎯</span><span class="ts-val c-blue">${G.skill}</span><span class="ts-label">⭐</span><span class="ts-val c-blue">${G.reputation}</span></div>
        <div class="ts"><span class="ts-label">👔</span><span class="ts-val" style="color:${G.rank>=2?'#fbbf24':G.rank>=1?'#22c55e':'#94a3b8'};">${rankNames[G.rank]}</span></div>
        ${G.streak > 0 ? `<div class="ts"><span class="ts-label">🔥</span><span class="ts-val c-orange">${G.streak}月</span></div>` : ''}
        ${G.love > 0 ? `<div class="ts${G.loveTimer>=3?' warning':''}"><span class="ts-label">${G.love>=2?'💕':'💭'}</span><span class="ts-val" style="color:${G.love>=3?'#f472b6':G.love>=2?'#fb7185':'#94a3b8'};">${G.love>=3?'穩定':G.love>=2?G.loveName:'曖昧'}</span></div>` : ''}
    </div>`;
}

function showGuide() {
    sfxClick();
    G.phase = 'guide';
    render();
}

async function startGame() {
    if (!lifePlayerName) {
        let name = prompt('輸入你的玩家名稱（排行榜顯示）：', '');
        if (name && name.trim()) {
            lifePlayerName = name.trim().substring(0, 12);
            localStorage.setItem('life_player_name', lifePlayerName);
        } else return;
    }
    initAudio();
    sfxClick();

    G.month=1; G.day=1; G.money=5000; G.mood=80;
    G.salesThisMonth=0; G.totalSales=0; G.salary=5000;
    G.commission=150; G.rent=5500; G.living=3000;
    G.transport=800; G.target=8; G.reputation=50;
    G.skill=30; G.energy=100; G.stress=20; G.streak=0; G.maxStreak=0; G.failMonths=0; G.rank=0;
    G.love=0; G.loveName=''; G.loveTimer=0;
    G.log=[]; G.lastResult=null;

    await showTransition('🌅', '第 1 年，第 1 個月，第 1 日...', 2000);

    G.phase = 'play';
    render();
    startBGM();
}

async function doWork(index) {
    sfxClick();
    const choice = WORK_CHOICES[index];
    const result = choice.action(G);

    G.log.push({
        text: `[第${G.day}日] ${result.text.split('\n')[0]}`,
        cls: result.good === true ? 'log-good' : result.good === false ? 'log-bad' : 'log-info'
    });

    // Advance 1 day
    G.day += 1;

    // Daily stress accumulation
    if (!WORK_CHOICES[index].isRest) {
        G.stress += 5; // daily work stress
        if (G.energy < 30) G.stress += 4; // exhaustion stress
        if (G.salesThisMonth < G.target && G.day > 15) G.stress += 5; // deadline anxiety (earlier trigger)
        if (G.salesThisMonth < G.target && G.day > 25) G.stress += 5; // panic mode
        if (G.failMonths >= 1) G.stress += 3; // pressure from last month fail
        if (G.failMonths >= 2) G.stress += 5; // about to be fired
        if (G.money < 0) G.stress += 3; // debt stress
    } else {
        G.stress = Math.max(0, G.stress - 8); // rest reduces stress (less than before)
    }

    // High stress drains mood
    if (G.stress >= 80) G.mood -= 4;
    else if (G.stress >= 60) G.mood -= 2;
    else if (G.stress >= 40) G.mood -= 1;

    // Clamp
    G.mood = Math.max(0, Math.min(100, G.mood));
    G.energy = Math.max(0, Math.min(100, G.energy));
    G.stress = Math.max(0, Math.min(100, G.stress));

    // Sound effects
    if (result.good === true) {
        if (result.sales) { sfxCoin(); floatNotify(`+${result.sales} 單！`, 'good'); }
        else sfxSuccess();
    } else if (result.good === false) {
        sfxFail();
    }

    // Show result screen
    G.lastResult = { ...result, scene: choice.scene };
    G.phase = 'result';
    render();

    // Typewriter effect for result
    await typewrite('resultText', result.text, 25);
}

async function afterResult() {
    sfxClick();

    // Random event chance (~20%)
    if (Math.random() < 0.3 && G.day < 28) {
        await triggerRandomEvent();
        return;
    }

    // Check month end
    if (G.day > 30) {
        sfxMonthEnd();
        await showTransition('📊', '月尾到了...結算時間！', 1500);
        G.phase = 'monthEnd';
        render();
        await typewriteMonthEnd();
        return;
    }

    if (checkGameOver()) return;
    G.phase = 'play';
    render();
}

async function triggerRandomEvent() {
    sfxEvent();
    // Filter events by condition, then pick random
    const eligible = RANDOM_EVENTS.filter(e => !e.condition || e.condition(G));
    const ev = eligible[Math.floor(Math.random() * eligible.length)];
    // Support dynamic text
    if (ev.getText) ev.text = ev.getText(G);
    G.currentEvent = ev;

    await showTransition(
        ev.tag === 'crisis' ? '🚨' : ev.tag === 'good' ? '🎉' : '❗',
        ev.tag === 'crisis' ? '出事了...' : ev.tag === 'good' ? '有好消息！' : '突發事件！',
        1200
    );

    G.phase = 'event';
    render();
    await typewrite('eventText', ev.text, 25);
}

async function doEvent(choiceIndex) {
    sfxClick();
    const ev = G.currentEvent;
    const result = ev.choices[choiceIndex].action(G);

    if (result.includes('簽') || result.includes('獎金')) { sfxCoin(); floatNotify(result.split('。')[0], 'good'); }
    else if (result.includes('損失') || result.includes('流失') || result.includes('受損')) { sfxFail(); floatNotify(result.split('。')[0], 'bad'); }

    G.log.push({ text: `[事件] ${result.split('\n')[0]}`, cls: 'log-info' });

    G.mood = Math.max(0, Math.min(100, G.mood));
    G.energy = Math.max(0, Math.min(100, G.energy));
    G.stress = Math.max(0, Math.min(100, G.stress));

    if (G.day > 30) {
        sfxMonthEnd();
        await showTransition('📊', '月尾到了...結算時間！', 1500);
        G.phase = 'monthEnd';
        render();
        await typewriteMonthEnd();
        return;
    }

    if (checkGameOver()) return;
    G.phase = 'play';
    render();
}

async function typewriteMonthEnd() {
    const hit = G.salesThisMonth >= G.target;
    const income = G.salary + G.salesThisMonth * G.commission;
    const bonus = hit && G.streak >= 3 ? 2000 : 0;
    const expenses = G.rent + G.living + G.transport;
    const net = income + bonus - expenses;
    let pool = hit ? (G.salesThisMonth >= G.target + 4 ? MONTH_COMMENTS.great : MONTH_COMMENTS.ok) : MONTH_COMMENTS.bad;
    const comment = pool[Math.floor(Math.random() * pool.length)];

    const text = `📊 月結報告

本月簽單：${G.salesThisMonth} 單（目標 ${G.target} 單）

💵 收入：
　底薪　　$${G.salary.toLocaleString()}
　佣金　　$${(G.salesThisMonth * G.commission).toLocaleString()}（${G.salesThisMonth} 單 × $${G.commission}）
${bonus > 0 ? `　獎金　　$${bonus.toLocaleString()}（連續達標獎勵🔥）\n` : ''}　合計　　$${(income + bonus).toLocaleString()}

💸 支出：
　租金　　$${G.rent.toLocaleString()}
　生活費　$${G.living.toLocaleString()}
　交通費　$${G.transport.toLocaleString()}
　合計　　$${expenses.toLocaleString()}

本月結餘：${net >= 0 ? '+' : ''}$${net.toLocaleString()}

${comment}`;

    await typewrite('monthText', text, 15);
}

async function nextMonth() {
    sfxClick();
    const hit = G.salesThisMonth >= G.target;
    const income = G.salary + G.salesThisMonth * G.commission;
    const bonus = hit && G.streak >= 3 ? 2000 : 0;
    const expenses = G.rent + G.living + G.transport;
    G.money += income + bonus - expenses;

    if (hit) {
        G.streak++;
        G.maxStreak = Math.max(G.maxStreak, G.streak);
        G.failMonths = 0;
        G.mood = Math.min(100, G.mood + 8);
        G.stress = Math.max(0, G.stress - 5); // 達標減壓（少量）
    } else {
        G.streak = 0;
        G.failMonths++;
        G.mood = Math.max(0, G.mood - 12);
        G.stress = Math.min(100, G.stress + 20); // 未達標大幅加壓
    }

    if (G.month % 6 === 0) {
        G.target = Math.min(15, G.target + 1);
        G.log.push({ text: `[通知] 公司提高目標到每月 ${G.target} 單！`, cls: 'log-bad' });
        floatNotify(`目標提高到 ${G.target} 單！`, 'bad');
    }
    if (G.month % 12 === 0) {
        G.salary += 300;
        G.commission += 20;
        G.log.push({ text: `[通知] 年度調薪！底薪 $${G.salary.toLocaleString()}`, cls: 'log-good' });
        floatNotify('年度調薪！', 'good');
    }

    // Relationship: monthly maintenance
    if (G.love >= 2) {
        G.living += 0; // no passive cost, events handle spending
        G.loveTimer++; // neglect accumulates unless reset by events
        if (G.love >= 2) { G.mood += 3; G.stress = Math.max(0, G.stress - 3); } // small ongoing benefit
    }

    G.month++;
    G.day = 1;
    G.salesThisMonth = 0;
    G.energy = 100;

    if (G.month > 36) {
        stopBGM();
        sfxSuccess();
        await showTransition('🏆', '3 年過去了...', 2000);
        G.phase = 'end';
        render();
        return;
    }

    if (checkGameOver()) return;

    const year = Math.ceil(G.month / 12);
    const monthInYear = ((G.month - 1) % 12) + 1;
    await showTransition('🌅', `第 ${year} 年，第 ${monthInYear} 月`, 1500);

    G.phase = 'play';
    render();
}

function checkGameOver() {
    if (G.money < -10000 || G.mood <= 0 || G.stress >= 100 || G.failMonths >= 3) {
        stopBGM();
        sfxGameOver();
        G.phase = 'end';
        render();
        return true;
    }
    return false;
}

function getLeaderboard() {
    try {
        return JSON.parse(localStorage.getItem('broadband_game_lb') || '[]');
    } catch(e) { return []; }
}

function saveToLeaderboard(entry) {
    const lb = getLeaderboard();
    lb.push(entry);
    lb.sort((a, b) => b.money - a.money);
    localStorage.setItem('broadband_game_lb', JSON.stringify(lb.slice(0, 10)));
    // Submit to global leaderboard
    submitGlobalScore_life(entry);
}

// === Global Leaderboard ===
const LB_API_LIFE = 'https://broadband-leaderboard.broadbandhk.workers.dev/api/leaderboard';
const LB_KEY_LIFE = 'bdhk-lb-s3cr3t-x7k9m2p4q8';

async function hmacSign_life(data) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(LB_KEY_LIFE), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(data));
  return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function submitGlobalScore_life(entry) {
  try {
    const ts = Date.now();
    const payload = { name: entry.name || lifePlayerName || '匿名', money: entry.money, sales: entry.sales, grade: entry.grade, rank: entry.rank };
    const sigData = { ...payload, ts };
    const sig = await hmacSign_life(JSON.stringify(sigData));
    await fetch(LB_API_LIFE + '/life', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...sigData, sig, ts })
    });
  } catch(e) {}
}

function clearLeaderboard() {
    if (confirm('確定要清除排行榜？')) {
        localStorage.removeItem('broadband_game_lb');
        render();
    }
}

function getGradeInfo(money) {
    if (money >= 80000) return { grade: 'S', title: '寬頻之王', color: '#fbbf24', emoji: '👑' };
    if (money >= 40000) return { grade: 'A', title: '金牌銷售', color: '#22c55e', emoji: '🏆' };
    if (money >= 15000) return { grade: 'B', title: '穩打穩紮', color: '#60a5fa', emoji: '💪' };
    if (money >= 0) return { grade: 'C', title: '勉強生存', color: '#f97316', emoji: '😅' };
    return { grade: 'D', title: '負債累累', color: '#ef4444', emoji: '😭' };
}

function renderLeaderboard(currentMoney) {
    const lb = getLeaderboard();

        return `<div class="leaderboard">

    return `<div class="leaderboard">

        <table class="lb-table">

function getShareText() {
    const gi = getGradeInfo(G.money);
    return `我喺「寬頻人生」模擬遊戲獲得 ${gi.emoji}${gi.grade}級 — ${gi.title}！\n💰 儲蓄: $${G.money.toLocaleString()}\n📋 簽單: ${G.totalSales}單\n👔 職級: ${['初級銷售','高級銷售顧問','銷售主管'][G.rank]}\n\n你又得唔得？即玩挑戰！👇\nhttps://broadbandhk.com/game.html`;
}

function shareWhatsApp() {
    const text = encodeURIComponent(getShareText());
    window.open('https://wa.me/?text=' + text, '_blank');
}

function shareFacebook() {
    const url = encodeURIComponent('https://broadbandhk.com/game.html');
    window.open('https://www.facebook.com/sharer/sharer.php?u=' + url, '_blank');
}

function copyShareLink() {
    const text = getShareText();
    navigator.clipboard.writeText(text).then(() => {
        floatNotify('已複製到剪貼簿！', 'good');
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        floatNotify('已複製到剪貼簿！', 'good');
    });
}

function renderShareButtons() {
    return `<div class="share-section">
        <h3>📤 分享你的結局</h3>
        <div class="share-btns">
            <button class="share-btn whatsapp" onclick="shareWhatsApp()">💬 WhatsApp 分享</button>
            <button class="share-btn facebook" onclick="shareFacebook()">📘 Facebook 分享</button>
            <button class="share-btn copy-link" onclick="copyShareLink()">📋 複製結果</button>
        </div>
    </div>`;
}

// ============================================================

initParticles();
render();
</script>
