<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Noto Sans TC', sans-serif;
        background: #0a0e1a;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* --- Particles Background --- */
    #particles {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }
    .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(96,165,250,0.15);
        animation: floatUp linear infinite;
    }
    @keyframes floatUp {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* --- Top Nav --- */
    .game-nav {
        background: rgba(15,23,42,0.95);
        backdrop-filter: blur(10px);
        padding: 8px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        height: 50px;
    }
    .game-nav .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .game-nav a {
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.9rem;
    }
    .game-nav a:hover { color: #fff; }
    .game-nav .logo { color: #60a5fa; font-weight: 900; font-size: 1.1rem; }
    .nav-right { display: flex; gap: 16px; align-items: center; }
    .sound-toggle {
        background: none;
        border: 1px solid rgba(255,255,255,0.2);
        color: #94a3b8;
        padding: 4px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-family: inherit;
    }
    .sound-toggle:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

    /* --- Game Layout: Three Column --- */
    .game-layout {
        display: flex;
        height: calc(100vh - 50px);
        margin-top: 50px;
        position: relative;
        z-index: 1;
    }
    .game-sidebar {
        width: 240px;
        flex-shrink: 0;
        background: rgba(15,23,42,0.8);
        backdrop-filter: blur(10px);
        border-right: 1px solid rgba(255,255,255,0.06);
        padding: 16px 12px;
        overflow-y: auto;
        height: calc(100vh - 50px);
    }
    .game-main {
        flex: 1;
        overflow-y: auto;
        height: calc(100vh - 50px);
        padding: 16px 20px;
        min-width: 0;
    }
    .game-choices {
        width: 280px;
        flex-shrink: 0;
        background: rgba(15,23,42,0.6);
        backdrop-filter: blur(10px);
        border-left: 1px solid rgba(255,255,255,0.06);
        padding: 16px 12px;
        overflow-y: auto;
        height: calc(100vh - 50px);
    }
    .game-choices .choices { animation: none; }
    .game-choices .choices-title {
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 10px;
        font-weight: 700;
    }
    .game-choices .choice-btn {
        font-size: 0.88rem;
        padding: 12px 14px;
    }
    .game-choices .choice-btn .cost { font-size: 0.75rem; }

    /* Single column for start/guide/end screens */
    .game-wrap {
        max-width: 700px;
        margin: 80px auto 40px;
        padding: 0 20px;
        position: relative;
        z-index: 1;
    }

    /* --- Sidebar Stats --- */
    .side-stat {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
    }
    .side-stat .side-label {
        font-size: 0.72rem;
        color: #64748b;
        margin-bottom: 4px;
    }
    .side-stat .side-value {
        font-size: 1.15rem;
        font-weight: 900;
    }
    .side-stat .side-value.money { color: #22c55e; }
    .side-stat .side-value.date { color: #60a5fa; }
    .side-stat .side-value.mood { color: #fbbf24; }
    .side-stat .side-value.sales { color: #f97316; }
    .side-stat .side-value.danger { color: #ef4444; }
    .side-progress {
        margin-top: 4px;
    }
    .side-progress .sp-bar {
        height: 5px;
        background: rgba(255,255,255,0.08);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 4px;
    }
    .side-progress .sp-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.6s;
    }
    .side-divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.06);
        margin: 12px 0;
    }
    .side-log {
        font-size: 0.75rem;
        color: #475569;
        line-height: 1.7;
        max-height: 180px;
        overflow-y: auto;
    }
    .side-log .sl-entry { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .side-log .log-good { color: #4ade80; }
    .side-log .log-bad { color: #f87171; }
    .side-log .log-info { color: #60a5fa; }

    /* --- Responsive: Stack on mobile --- */
    @media (max-width: 1024px) {
        .game-layout {
            flex-direction: column;
            height: auto;
        }
        .game-sidebar {
            width: 100%;
            height: auto;
            border-right: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 10px 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .side-divider, .side-log { display: none; }
        .game-main {
            height: auto;
            overflow-y: visible;
        }
        .game-choices {
            width: 100%;
            height: auto;
            border-left: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 12px 16px;
        }
    }

    /* --- Transition Overlay --- */
    .transition-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #0a0e1a;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
    }
    .transition-overlay.active {
        opacity: 1;
        pointer-events: all;
    }
    .transition-overlay .trans-icon { font-size: 4rem; margin-bottom: 16px; animation: pulse 1s infinite; }
    .transition-overlay .trans-text { font-size: 1.3rem; color: #94a3b8; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

    /* --- Scene Image --- */
    .scene-img {
        width: 100%;
        height: 180px;
        border-radius: 16px 16px 0 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 5rem;
        position: relative;
        overflow: hidden;
    }
    .scene-img .scene-overlay {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 60px;
        background: linear-gradient(transparent, rgba(10,14,26,0.95));
    }
    .scene-morning { background: linear-gradient(135deg, #1e3a5f, #2d6a9f, #f59e0b 120%); }
    .scene-office { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
    .scene-street { background: linear-gradient(135deg, #2d3436, #636e72, #dfe6e9 150%); }
    .scene-phone { background: linear-gradient(135deg, #0c0c1d, #1a1a3e, #2563eb 150%); }
    .scene-social { background: linear-gradient(135deg, #1a1a2e, #e1306c 80%, #f77737 120%); }
    .scene-referral { background: linear-gradient(135deg, #064e3b, #059669, #10b981); }
    .scene-study { background: linear-gradient(135deg, #1e1b4b, #3730a3, #6366f1); }
    .scene-rest { background: linear-gradient(135deg, #1e1b4b, #312e81, #fbbf24 150%); }
    .scene-event { background: linear-gradient(135deg, #4a1d96, #7c3aed, #c084fc); }
    .scene-crisis { background: linear-gradient(135deg, #7f1d1d, #dc2626, #f87171); }
    .scene-good { background: linear-gradient(135deg, #064e3b, #059669, #34d399); }
    .scene-month { background: linear-gradient(135deg, #1e3a5f, #2563eb, #60a5fa); }
    .scene-end { background: linear-gradient(135deg, #fbbf24, #f59e0b, #ef4444); }
    .scene-night { background: linear-gradient(135deg, #0a0e1a, #1e1b4b, #312e81); }

    /* Animated elements in scene */
    .scene-img .float-el {
        position: absolute;
        font-size: 2rem;
        opacity: 0.4;
        animation: floatEl 4s ease-in-out infinite;
    }
    @keyframes floatEl {
        0%,100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(10deg); }
    }

    /* --- Start Screen --- */
    .start-screen {
        text-align: center;
        padding: 60px 20px;
    }
    .start-screen h1 {
        font-size: 3.5rem;
        font-weight: 900;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% 200%;
        animation: gradientShift 3s ease infinite;
    }
    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .start-screen .subtitle {
        font-size: 1.2rem;
        color: #94a3b8;
        margin-bottom: 32px;
    }
    .start-screen .story {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 28px;
        text-align: left;
        line-height: 2;
        color: #cbd5e1;
        font-size: 0.95rem;
        margin-bottom: 24px;
    }
    .start-screen .story em {
        color: #fbbf24;
        font-style: normal;
    }
    .start-btn {
        display: inline-block;
        padding: 16px 48px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1.15rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
        margin: 6px;
    }
    .start-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(37,99,235,0.4);
    }
    .start-btn.secondary {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.15);
    }
    .start-btn.secondary:hover {
        background: rgba(255,255,255,0.12);
        box-shadow: none;
    }

    /* --- Guide Screen --- */
    .guide-section {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
        text-align: left;
    }
    .guide-section h3 {
        font-size: 1.1rem;
        margin-bottom: 12px;
        color: #60a5fa;
    }
    .guide-section .guide-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    .guide-item {
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        padding: 12px;
        font-size: 0.88rem;
        line-height: 1.6;
    }
    .guide-item .gi-icon { font-size: 1.5rem; margin-bottom: 4px; display: block; }
    .guide-item .gi-title { font-weight: 700; color: #fbbf24; }
    .guide-item .gi-desc { color: #94a3b8; font-size: 0.82rem; }
    .guide-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
    }
    .guide-bar-fill {
        height: 8px;
        border-radius: 4px;
        flex: 1;
    }
    .guide-bar-label { font-size: 0.8rem; color: #94a3b8; min-width: 60px; }

    /* --- Status Bar --- */
    .status-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 20px;
    }
    .stat-box {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
        transition: all 0.3s;
    }
    .stat-box.flash-good { animation: flashGood 0.6s; }
    .stat-box.flash-bad { animation: flashBad 0.6s; }
    @keyframes flashGood { 0%,100% { background: rgba(255,255,255,0.04); } 50% { background: rgba(34,197,94,0.2); } }
    @keyframes flashBad { 0%,100% { background: rgba(255,255,255,0.04); } 50% { background: rgba(239,68,68,0.2); } }
    .stat-box .label { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
    .stat-box .value { font-size: 1.3rem; font-weight: 900; transition: all 0.3s; }
    .stat-box .value.money { color: #22c55e; }
    .stat-box .value.date { color: #60a5fa; }
    .stat-box .value.mood { color: #fbbf24; }
    .stat-box .value.sales { color: #f97316; }

    /* --- Progress Bars --- */
    .progress-wrap { margin-bottom: 20px; }
    .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 6px;
    }
    .progress-bar {
        height: 6px;
        background: rgba(255,255,255,0.08);
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 6px;
    }
    .progress-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.8s ease;
    }
    .fill-blue { background: linear-gradient(90deg, #2563eb, #7c3aed); }
    .fill-green { background: linear-gradient(90deg, #059669, #22c55e); }
    .fill-orange { background: linear-gradient(90deg, #ea580c, #f59e0b); }
    .fill-red { background: linear-gradient(90deg, #dc2626, #f87171); }

    /* --- Story Panel --- */
    .story-panel {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        margin-bottom: 20px;
        min-height: 180px;
        overflow: hidden;
        animation: fadeSlideIn 0.5s ease;
    }
    @keyframes fadeSlideIn {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    .story-panel .story-body { padding: 24px; }
    .story-panel .event-tag {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 700;
        margin-bottom: 12px;
    }
    .tag-work { background: rgba(37,99,235,0.15); color: #60a5fa; }
    .tag-life { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .tag-random { background: rgba(168,85,247,0.15); color: #c084fc; }
    .tag-crisis { background: rgba(239,68,68,0.15); color: #f87171; }
    .tag-good { background: rgba(34,197,94,0.15); color: #4ade80; }
    .tag-month { background: rgba(37,99,235,0.15); color: #60a5fa; }

    .story-panel .text {
        font-size: 1rem;
        line-height: 1.9;
        color: #cbd5e1;
        white-space: pre-line;
    }
    .story-panel .text .highlight { color: #fbbf24; font-weight: 700; }

    /* Typewriter cursor */
    .typewriter-cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background: #60a5fa;
        margin-left: 2px;
        animation: blink 0.7s infinite;
        vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- Result Panel (after action) --- */
    .result-panel {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        margin-bottom: 20px;
        overflow: hidden;
        animation: fadeSlideIn 0.5s ease;
    }
    .result-panel .result-body { padding: 24px; }
    .result-good { border-left: 4px solid #22c55e; }
    .result-bad { border-left: 4px solid #ef4444; }
    .result-neutral { border-left: 4px solid #60a5fa; }

    /* --- Choices --- */
    .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
        animation: fadeSlideIn 0.5s ease 0.2s both;
    }
    .choice-btn {
        display: block;
        width: 100%;
        padding: 16px 20px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: #e2e8f0;
        font-size: 0.95rem;
        cursor: pointer;
        text-align: left;
        transition: all 0.25s;
        font-family: inherit;
        line-height: 1.6;
    }
    .choice-btn:hover {
        background: rgba(37,99,235,0.15);
        border-color: #2563eb;
        transform: translateX(6px);
        box-shadow: 0 4px 16px rgba(37,99,235,0.15);
    }
    .choice-btn:active { transform: translateX(3px) scale(0.98); }
    .choice-btn .cost { font-size: 0.8rem; color: #64748b; display: block; margin-top: 2px; }

    /* --- Floating Notification --- */
    .float-notify {
        position: fixed;
        top: 80px;
        right: 20px;
        padding: 12px 20px;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 700;
        z-index: 200;
        animation: slideInNotify 0.4s ease, fadeOutNotify 0.4s ease 2s forwards;
        pointer-events: none;
    }
    .float-notify.good { background: rgba(34,197,94,0.9); color: #fff; }
    .float-notify.bad { background: rgba(239,68,68,0.9); color: #fff; }
    .float-notify.info { background: rgba(37,99,235,0.9); color: #fff; }
    @keyframes slideInNotify { 0% { transform: translateX(100px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOutNotify { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* --- Log --- */
    .game-log {
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 16px;
        max-height: 200px;
        overflow-y: auto;
        font-size: 0.82rem;
        color: #475569;
        line-height: 1.8;
    }
    .game-log .log-entry { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 4px 0; }
    .game-log .log-good { color: #4ade80; }
    .game-log .log-bad { color: #f87171; }
    .game-log .log-info { color: #60a5fa; }

    /* --- End Screen --- */
    .end-screen { text-align: center; padding: 40px 20px; }
    .end-screen h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; }
    .end-screen .grade { font-size: 5rem; margin: 20px 0; animation: bounceIn 0.6s ease; }
    @keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .end-screen .summary {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 24px;
        text-align: left;
        line-height: 2;
        margin: 24px 0;
        color: #cbd5e1;
    }
    .end-cta {
        margin-top: 32px;
        padding: 24px;
        background: linear-gradient(135deg, rgba(37,99,235,0.15), rgba(124,58,237,0.15));
        border: 1px solid rgba(96,165,250,0.2);
        border-radius: 16px;
    }
    .end-cta p { margin-bottom: 12px; color: #94a3b8; }
    .end-cta a {
        display: inline-block;
        padding: 12px 32px;
        background: #2563eb;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        margin: 4px;
    }

    /* --- Responsive --- */
    @media (max-width: 600px) {
        .status-bar { grid-template-columns: repeat(2, 1fr); }
        .start-screen h1 { font-size: 2.2rem; }
        .story-panel .story-body { padding: 16px; }
        .scene-img { height: 140px; font-size: 3.5rem; }
        .guide-section .guide-grid { grid-template-columns: 1fr; }
    }
    </style>
</head>
<body>

<!-- Particle Background -->
<div id="particles"></div>

<!-- Nav -->
<div class="game-nav">
    <div class="container">
        <a href="index.html" class="logo">⚡ BroadbandHK</a>
        <div class="nav-right">
            <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">🔊 音效</button>
            <a href="index.html">返回主頁</a>
        </div>
    </div>
</div>

<!-- Transition Overlay -->
<div class="transition-overlay" id="transOverlay">
    <div class="trans-icon" id="transIcon">🌅</div>
    <div class="trans-text" id="transText">新的一天開始了...</div>

// --- Audio System (Web Audio API) ---
let audioCtx = null;
let soundEnabled = true;
let bgmOsc = null;
let bgmGain = null;
let bgmPlaying = false;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type = 'sine', vol = 0.08) {
    if (!soundEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxClick() { playTone(800, 0.08, 'sine', 0.06); }
function sfxSuccess() {
    playTone(523, 0.15, 'sine', 0.08);

// BGM using simple looping melody
let bgmInterval = null;
function startBGM() {
    if (!soundEnabled || !audioCtx || bgmPlaying) return;
    bgmPlaying = true;
    const notes = [262, 294, 330, 349, 330, 294, 262, 247, 262, 294, 330, 294, 262, 247, 220, 247];
    let i = 0;
    bgmInterval = setInterval(() => {
        if (!soundEnabled) return;
        playTone(notes[i % notes.length], 0.4, 'sine', 0.02);
        i++;
    }, 500);
}
function stopBGM() {
    bgmPlaying = false;
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 音效' : '🔇 靜音';
    if (soundEnabled) { initAudio(); startBGM(); }

}

// --- Particles ---

}

// --- Transition ---
function showTransition(icon, text, duration = 1500) {
    return new Promise(resolve => {
        const overlay = document.getElementById('transOverlay');
        document.getElementById('transIcon').textContent = icon;
        document.getElementById('transText').textContent = text;
        overlay.classList.add('active');
        setTimeout(() => {
            overlay.classList.remove('active');
            setTimeout(resolve, 400);
        }, duration);
    });
}

// --- Floating Notification ---
function floatNotify(text, type = 'info') {
    const el = document.createElement('div');
    el.className = `float-notify ${type}`;
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

// --- Typewriter Effect ---
let typewriterTimer = null;
function typewrite(elementId, text, speed = 30) {
    return new Promise(resolve => {
        const el = document.getElementById(elementId);
        if (!el) { resolve(); return; }
        el.innerHTML = '<span class="typewriter-cursor"></span>';
        let i = 0;
        if (typewriterTimer) clearInterval(typewriterTimer);
        typewriterTimer = setInterval(() => {
            if (i < text.length) {
                el.innerHTML = text.substring(0, i + 1) + '<span class="typewriter-cursor"></span>';
                i++;
            } else {
                clearInterval(typewriterTimer);
                typewriterTimer = null;
                el.innerHTML = text;
                resolve();
            }
        }, speed);
    });
}

function moodEmoji(m) {
    if (m >= 80) return '😄';
    if (m >= 60) return '🙂';
    if (m >= 40) return '😐';
    if (m >= 20) return '😰';
    return '😭';
}

function energyColor(e) {
    if (e >= 60) return 'fill-green';
    if (e >= 30) return 'fill-orange';
    return 'fill-red';
}

function renderStatusBar() {
    const year = Math.ceil(G.month / 12);
    const monthInYear = ((G.month - 1) % 12) + 1;
    const progress = ((G.month - 1) * 30 + G.day) / (36 * 30) * 100;
    return `
    <div class="progress-wrap">
        <div class="progress-label"><span>📊 遊戲進度 ${Math.round(progress)}%</span><span>第${year}年 ${monthInYear}月 · 第${G.day}日</span></div>
        <div class="progress-bar"><div class="progress-fill fill-blue" style="width:${progress}%"></div></div>
        <div class="progress-label"><span>⚡ 精力 ${G.energy}%</span><span>🎯 技能 ${G.skill} · ⭐ 口碑 ${G.reputation}</span></div>
        <div class="progress-bar"><div class="progress-fill ${energyColor(G.energy)}" style="width:${G.energy}%"></div></div>

function render() {
    const single = document.getElementById('appSingle');
    const layout = document.getElementById('gameLayout');
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('appMain');

    const isGameplay = ['play','result','event','monthEnd'].includes(G.phase);

    if (isGameplay) {
        single.style.display = 'none';
        layout.style.display = 'flex';
        const choices = document.getElementById('appChoices');
        sidebar.innerHTML = renderSidebar();
        let content;
        switch (G.phase) {
            case 'play': content = renderPlay(); break;
            case 'result': content = renderResult(); break;
            case 'event': content = renderEvent(); break;
            case 'monthEnd': content = renderMonthEnd(); break;
        }
        main.innerHTML = content.story;
        choices.innerHTML = content.choices;
        main.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        single.style.display = 'block';
        layout.style.display = 'none';
        switch (G.phase) {
            case 'start': single.innerHTML = renderStart(); break;
            case 'guide': single.innerHTML = renderGuide(); break;
            case 'end': single.innerHTML = renderEnd(); break;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

        <div class="guide-section">

                    <span style="font-size:0.78rem;color:#64748b;">歸零會被迫休息</span>
                </div>
                <div class="guide-bar">
                    <span class="guide-bar-label">😊 心情</span>
                    <div class="progress-bar" style="flex:1"><div class="progress-fill fill-orange" style="width:60%"></div></div>

                ❌ 心情跌到 <strong>0</strong>（完全失去動力）<br>
                ❌ 壓力升到 <strong>100</strong>（壓力爆煲，身體撐唔住）<br>

            <h3>🏆 結局評級</h3>
            <p style="color:#cbd5e1;line-height:1.8;font-size:0.9rem;">
                👑 <strong style="color:#fbbf24;">S 寬頻之王</strong> — 儲蓄 $80,000+<br>
                🏆 <strong style="color:#22c55e;">A 金牌銷售</strong> — 儲蓄 $40,000+<br>
                💪 <strong style="color:#60a5fa;">B 穩打穩紮</strong> — 儲蓄 $15,000+<br>

}

function renderPlay() {
    const rankNames = ['初級銷售','高級銷售顧問','銷售主管'];
    let choicesHTML = `<div style="font-size:0.78rem;color:#64748b;margin-bottom:8px;">職級：<strong style="color:${G.rank>=2?'#fbbf24':G.rank>=1?'#22c55e':'#94a3b8'}">${rankNames[G.rank]}</strong></div>`;
    choicesHTML += '<div class="choices">';
    const restIndex = WORK_CHOICES.findIndex(c => c.isRest);
    if (G.energy <= 10) {
        choicesHTML += `<button class="choice-btn" onclick="doWork(${restIndex})">😴 你太累了，只能休息<span class="cost">精力不足，無法工作</span></button>`;
    } else {
        WORK_CHOICES.forEach((c, i) => {
            if (c.locked && c.locked(G)) {
                choicesHTML += `<button class="choice-btn" style="opacity:0.4;cursor:not-allowed;border-color:rgba(255,255,255,0.05);" disabled>${c.text}<span class="cost">${c.lockMsg}</span></button>`;
            } else {
                const disabled = (G.energy <= 10 && i !== 5) ? 'style="opacity:0.4;pointer-events:none"' : '';
                choicesHTML += `<button class="choice-btn" onclick="doWork(${i})" ${disabled}>${c.text}<span class="cost">${c.desc}</span></button>`;
            }
        });
    }
    choicesHTML += '</div>';

    const remaining = Math.max(0, G.target - G.salesThisMonth);
    const daysLeft = 30 - G.day;
    let urgency = '';
    if (daysLeft <= 5 && remaining > 0) urgency = '<span style="color:#f87171;"> ⚠️ 時間唔多了！</span>';

    return {
        story: `<div class="story-panel">
            ${renderScene('morning')}
            <div class="story-body">
                <span class="event-tag tag-work">📅 第 ${G.day} 日</span>
                <div class="text" id="storyText">早上鬧鐘響起，新嘅一日開始了。\n\n距離月尾仲有 <span class="highlight">${daysLeft} 日</span>，仲差 <span class="highlight">${remaining} 單</span>先達標。${urgency}\n\n今日你想點做？</div>
            </div>
        </div>`,
        choices: `<div class="choices-title">🎮 選擇行動</div>${choicesHTML}`
    };
}

function renderResult() {
    const r = G.lastResult;
    const scene = r.good === true ? 'good' : (r.good === false ? 'crisis' : 'morning');
    const resultCls = r.good === true ? 'result-good' : (r.good === false ? 'result-bad' : 'result-neutral');

    return {
        story: `<div class="result-panel ${resultCls}">
            ${renderScene(r.scene || scene)}
            <div class="result-body">
                <span class="event-tag ${r.good === true ? 'tag-good' : r.good === false ? 'tag-crisis' : 'tag-work'}">${r.good === true ? '✅ 成功' : r.good === false ? '❌ 失敗' : '📝 結果'}</span>
                <div class="text" id="resultText"></div>
            </div>
        </div>
        <div class="choices" style="margin-top:16px;">
            <button class="choice-btn" onclick="afterResult()">繼續 →</button>
        </div>`,
        choices: ''
    };
}

function renderEvent() {
    const ev = G.currentEvent;
    let choicesHTML = '<div class="choices">';
    ev.choices.forEach((c, i) => {
        choicesHTML += `<button class="choice-btn" onclick="doEvent(${i})">${c.text}</button>`;
    });
    choicesHTML += '</div>';

    const sceneKey = ev.tag === 'crisis' ? 'crisis' : ev.tag === 'good' ? 'good' : 'event';

    return {
        story: `<div class="story-panel">
            ${renderScene(ev.scene || sceneKey)}
            <div class="story-body">
                <span class="event-tag tag-${ev.tag}">${ev.tagLabel}</span>
                <div class="text" id="eventText"></div>
            </div>
        </div>`,
        choices: `<div class="choices-title">⚡ 你的選擇</div>${choicesHTML}`
    };
}

function renderMonthEnd() {
    const hit = G.salesThisMonth >= G.target;
    const income = G.salary + G.salesThisMonth * G.commission;
    const bonus = hit && G.streak >= 3 ? 2000 : 0;
    const expenses = G.rent + G.living + G.transport;
    const net = income + bonus - expenses;

    let pool = hit ? (G.salesThisMonth >= G.target + 4 ? MONTH_COMMENTS.great : MONTH_COMMENTS.ok) : MONTH_COMMENTS.bad;
    const comment = pool[Math.floor(Math.random() * pool.length)];

    return {
        story: `<div class="story-panel">
            ${renderScene('month')}
            <div class="story-body">
                <span class="event-tag ${hit ? 'tag-good' : 'tag-crisis'}">${hit ? '🎉 達標！' : '😰 未達標'}</span>
                <div class="text" id="monthText"></div>
            </div>
        </div>
        <div class="choices" style="margin-top:16px;">
            <button class="choice-btn" onclick="nextMonth()">📅 進入下個月 →</button>
        </div>`,
        choices: ''
    };
}

function renderEnd() {
    let grade, title, color, emoji;
    if (G.money >= 80000) { grade='S'; title='寬頻之王'; color='#fbbf24'; emoji='👑'; }
    else if (G.money >= 40000) { grade='A'; title='金牌銷售'; color='#22c55e'; emoji='🏆'; }
    else if (G.money >= 15000) { grade='B'; title='穩打穩紮'; color='#60a5fa'; emoji='💪'; }
    else if (G.money >= 0) { grade='C'; title='勉強生存'; color='#f97316'; emoji='😅'; }
    else { grade='D'; title='負債累累'; color='#ef4444'; emoji='😭'; }

    const gameOver = G.money < -10000 || G.mood <= 0 || G.failMonths >= 3;
    const survived = !gameOver && G.month > 36;

    return `
    <div class="end-screen">
        ${renderScene('end')}
        <h2>${survived ? '🎊 恭喜你撐過咗 3 年！' : '💔 遊戲結束...'}</h2>
        <div class="grade" style="color:${color}">${emoji} ${grade}</div>
        <div style="font-size:1.3rem;color:${color};font-weight:700;margin-bottom:8px;">${title}</div>
        <div class="summary">
            <strong>📊 3 年總結</strong><br><br>
            📋 總簽單數：<strong>${G.totalSales}</strong> 單<br>
            💰 最終儲蓄：<strong style="color:${G.money>=0?'#22c55e':'#ef4444'}">$${G.money.toLocaleString()}</strong><br>
            🎯 最終技能：${G.skill}<br>
            ⭐ 最終口碑：${G.reputation}<br>
            😰 最終壓力：${G.stress}<br>
            👔 最終職級：<strong style="color:${G.rank>=2?'#fbbf24':G.rank>=1?'#22c55e':'#94a3b8'}">${['初級銷售','高級銷售顧問','銷售主管'][G.rank]}</strong><br>
            🔥 最高連續達標：${G.maxStreak} 個月<br><br>
            ${survived ?
                (G.money >= 40000 ? '你靠住努力同堅持，喺寬頻銷售呢行闖出名堂。你証明咗只要唔放棄，就一定有出路！' :
                 G.money >= 0 ? '3 年唔容易，但你撐過嚟了。雖然無大富大貴，但你學識咗好多嘢，認識咗好多人。' :
                 '勉強撐過 3 年，但經濟壓力好大。希望下一個 3 年會更好。') :
                (G.money < -10000 ? '負債太多，已經撐唔落去了...你決定搵份穩定嘅工先還債。' :
                 G.stress >= 100 ? '壓力爆煲！你成日失眠、焦慮、手震...醫生話你需要停工休養。你遞咗辭職信。' :
                 G.mood <= 0 ? '你對所有嘢都失去興趣，每日返工好似行屍走肉...最後決定轉行，重新開始。' :
                 '連續幾個月業績唔達標，經理話「公司需要調整人手」。你被辭退了。')}
        </div>
        <div class="end-cta">
            <p>💡 現實中，BroadbandHK 幫你搵到最平最穩定嘅寬頻！</p>
            <a href="index.html">查看寬頻月費</a>
            <a href="shops.html">免費商舖推薦</a>
        </div>
        <br>
        <button class="start-btn" onclick="location.reload()" style="background:linear-gradient(135deg,#f59e0b,#ef4444);">🔄 再玩一次</button>
        <button class="start-btn secondary" onclick="G.phase='guide';render();">📖 重睇說明</button>
    </div>`;
}

function renderLog() {
    const logHTML = G.log.slice(-8).map(l =>
        `<div class="log-entry ${l.cls}">${l.text}</div>`
    ).join('');
    return `<div class="game-log">${logHTML || '<div class="log-entry log-info">新嘅旅程開始了，加油！💪</div>'}</div>`;
}

// ============================================================
// Game Logic
// ============================================================

function showGuide() {
    sfxClick();
    G.phase = 'guide';
    render();
}

async function startGame() {
    initAudio();
    sfxClick();

    G.month=1; G.day=1; G.money=5000; G.mood=80;
    G.salesThisMonth=0; G.totalSales=0; G.salary=5000;
    G.commission=150; G.rent=5500; G.living=3000;
    G.transport=800; G.target=8; G.reputation=50;
    G.skill=30; G.energy=100; G.stress=20; G.streak=0; G.maxStreak=0; G.failMonths=0; G.rank=0;
    G.log=[]; G.lastResult=null;

    await showTransition('🌅', '第 1 年，第 1 個月，第 1 日...', 2000);

    G.phase = 'play';
    render();
    startBGM();
}

async function doWork(index) {
    sfxClick();
    const choice = WORK_CHOICES[index];
    const result = choice.action(G);

    G.log.push({
        text: `[第${G.day}日] ${result.text.split('\n')[0]}`,
        cls: result.good === true ? 'log-good' : result.good === false ? 'log-bad' : 'log-info'
    });

    // Advance 1 day
    G.day += 1;

    // Daily stress accumulation
    if (!WORK_CHOICES[index].isRest) {
        G.stress += 3; // daily work stress
        if (G.energy < 30) G.stress += 3; // exhaustion stress
        if (G.salesThisMonth < G.target && G.day > 20) G.stress += 4; // deadline anxiety
        if (G.failMonths >= 1) G.stress += 2; // pressure from last month fail
    } else {
        G.stress = Math.max(0, G.stress - 15); // rest reduces stress
    }

    // High stress drains mood
    if (G.stress >= 80) G.mood -= 3;
    else if (G.stress >= 60) G.mood -= 1;

    // Clamp
    G.mood = Math.max(0, Math.min(100, G.mood));
    G.energy = Math.max(0, Math.min(100, G.energy));
    G.stress = Math.max(0, Math.min(100, G.stress));

    // Sound effects
    if (result.good === true) {
        if (result.sales) { sfxCoin(); floatNotify(`+${result.sales} 單！`, 'good'); }
        else sfxSuccess();
    } else if (result.good === false) {
        sfxFail();
    }

    // Show result screen
    G.lastResult = { ...result, scene: choice.scene };
    G.phase = 'result';
    render();

    // Typewriter effect for result
    await typewrite('resultText', result.text, 25);
}

async function afterResult() {
    sfxClick();

    // Random event chance (~20%)
    if (Math.random() < 0.3 && G.day < 28) {
        await triggerRandomEvent();
        return;
    }

    // Check month end
    if (G.day > 30) {
        sfxMonthEnd();
        await showTransition('📊', '月尾到了...結算時間！', 1500);
        G.phase = 'monthEnd';
        render();
        await typewriteMonthEnd();
        return;
    }

    if (checkGameOver()) return;
    G.phase = 'play';
    render();
}

async function triggerRandomEvent() {
    sfxEvent();
    const ev = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
    G.currentEvent = ev;

    await showTransition(
        ev.tag === 'crisis' ? '🚨' : ev.tag === 'good' ? '🎉' : '❗',
        ev.tag === 'crisis' ? '出事了...' : ev.tag === 'good' ? '有好消息！' : '突發事件！',
        1200
    );

    G.phase = 'event';
    render();
    await typewrite('eventText', ev.text, 25);
}

async function doEvent(choiceIndex) {
    sfxClick();
    const ev = G.currentEvent;
    const result = ev.choices[choiceIndex].action(G);

    if (result.includes('簽') || result.includes('獎金')) { sfxCoin(); floatNotify(result.split('。')[0], 'good'); }
    else if (result.includes('損失') || result.includes('流失') || result.includes('受損')) { sfxFail(); floatNotify(result.split('。')[0], 'bad'); }

    G.log.push({ text: `[事件] ${result.split('\n')[0]}`, cls: 'log-info' });

    G.mood = Math.max(0, Math.min(100, G.mood));
    G.energy = Math.max(0, Math.min(100, G.energy));
    G.stress = Math.max(0, Math.min(100, G.stress));

    if (G.day > 30) {
        sfxMonthEnd();
        await showTransition('📊', '月尾到了...結算時間！', 1500);
        G.phase = 'monthEnd';
        render();
        await typewriteMonthEnd();
        return;
    }

    if (checkGameOver()) return;
    G.phase = 'play';
    render();
}

async function typewriteMonthEnd() {
    const hit = G.salesThisMonth >= G.target;
    const income = G.salary + G.salesThisMonth * G.commission;
    const bonus = hit && G.streak >= 3 ? 2000 : 0;
    const expenses = G.rent + G.living + G.transport;
    const net = income + bonus - expenses;
    let pool = hit ? (G.salesThisMonth >= G.target + 4 ? MONTH_COMMENTS.great : MONTH_COMMENTS.ok) : MONTH_COMMENTS.bad;
    const comment = pool[Math.floor(Math.random() * pool.length)];

    const text = `📊 月結報告

本月簽單：${G.salesThisMonth} 單（目標 ${G.target} 單）

💵 收入：
　底薪　　$${G.salary.toLocaleString()}
　佣金　　$${(G.salesThisMonth * G.commission).toLocaleString()}（${G.salesThisMonth} 單 × $${G.commission}）
${bonus > 0 ? `　獎金　　$${bonus.toLocaleString()}（連續達標獎勵🔥）\n` : ''}　合計　　$${(income + bonus).toLocaleString()}

💸 支出：
　租金　　$${G.rent.toLocaleString()}
　生活費　$${G.living.toLocaleString()}
　交通費　$${G.transport.toLocaleString()}
　合計　　$${expenses.toLocaleString()}

本月結餘：${net >= 0 ? '+' : ''}$${net.toLocaleString()}

${comment}`;

    await typewrite('monthText', text, 15);
}

async function nextMonth() {
    sfxClick();
    const hit = G.salesThisMonth >= G.target;
    const income = G.salary + G.salesThisMonth * G.commission;
    const bonus = hit && G.streak >= 3 ? 2000 : 0;
    const expenses = G.rent + G.living + G.transport;
    G.money += income + bonus - expenses;

    if (hit) {
        G.streak++;
        G.maxStreak = Math.max(G.maxStreak, G.streak);
        G.failMonths = 0;
        G.mood = Math.min(100, G.mood + 8);
        G.stress = Math.max(0, G.stress - 10); // 達標減壓
    } else {
        G.streak = 0;
        G.failMonths++;
        G.mood = Math.max(0, G.mood - 12);
        G.stress = Math.min(100, G.stress + 15); // 未達標加壓
    }

    if (G.month % 6 === 0) {
        G.target = Math.min(15, G.target + 1);
        G.log.push({ text: `[通知] 公司提高目標到每月 ${G.target} 單！`, cls: 'log-bad' });
        floatNotify(`目標提高到 ${G.target} 單！`, 'bad');
    }
    if (G.month % 12 === 0) {
        G.salary += 300;
        G.commission += 20;
        G.log.push({ text: `[通知] 年度調薪！底薪 $${G.salary.toLocaleString()}`, cls: 'log-good' });
        floatNotify('年度調薪！', 'good');
    }

    G.month++;
    G.day = 1;
    G.salesThisMonth = 0;
    G.energy = 100;

    if (G.month > 36) {
        stopBGM();
        sfxSuccess();
        await showTransition('🏆', '3 年過去了...', 2000);
        G.phase = 'end';
        render();
        return;
    }

    if (checkGameOver()) return;

    const year = Math.ceil(G.month / 12);
    const monthInYear = ((G.month - 1) % 12) + 1;
    await showTransition('🌅', `第 ${year} 年，第 ${monthInYear} 月`, 1500);

    G.phase = 'play';
    render();
}

function checkGameOver() {
    if (G.money < -10000 || G.mood <= 0 || G.stress >= 100 || G.failMonths >= 3) {
        stopBGM();
        sfxGameOver();
        G.phase = 'end';
        render();
        return true;
    }
    return false;
}

// ============================================================
// Init
// ============================================================
initParticles();
render();
</script>
