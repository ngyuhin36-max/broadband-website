<script>
// ============================================================
// 寬頻人生 v2 — Enhanced Game Engine
// ============================================================

// --- Audio System (Web Audio API) ---
let audioCtx = null;
let soundEnabled = true;
let bgmOsc = null;
let bgmGain = null;
let bgmPlaying = false;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type = 'sine', vol = 0.08) {
    if (!soundEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// BGM using simple looping melody
let bgmInterval = null;
function startBGM() {
    if (!soundEnabled || !audioCtx || bgmPlaying) return;
    bgmPlaying = true;
    const notes = [262, 294, 330, 349, 330, 294, 262, 247, 262, 294, 330, 294, 262, 247, 220, 247];
    let i = 0;
    bgmInterval = setInterval(() => {
        if (!soundEnabled) return;
        playTone(notes[i % notes.length], 0.4, 'sine', 0.02);
        i++;
    }, 500);
}
function stopBGM() {
    bgmPlaying = false;
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 音效' : '🔇 靜音';
    if (soundEnabled) { initAudio(); startBGM(); }
    else stopBGM();
}

// --- Particles ---
function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 15 + 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(p);
    }
}

// --- Transition ---
function showTransition(icon, text, duration = 1500) {
    return new Promise(resolve => {
        const overlay = document.getElementById('transOverlay');
        document.getElementById('transIcon').textContent = icon;
        document.getElementById('transText').textContent = text;
        overlay.classList.add('active');
        setTimeout(() => {
            overlay.classList.remove('active');
            setTimeout(resolve, 400);
        }, duration);
    });
}

// --- Floating Notification ---
function floatNotify(text, type = 'info') {
    const el = document.createElement('div');
    el.className = `float-notify ${type}`;
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

// --- Typewriter Effect ---
let typewriterTimer = null;
function typewrite(elementId, text, speed = 30) {
    return new Promise(resolve => {
        const el = document.getElementById(elementId);
        if (!el) { resolve(); return; }
        el.innerHTML = '<span class="typewriter-cursor"></span>';
        let i = 0;
        if (typewriterTimer) clearInterval(typewriterTimer);
        typewriterTimer = setInterval(() => {
            if (i < text.length) {
                el.innerHTML = text.substring(0, i + 1) + '<span class="typewriter-cursor"></span>';
                i++;
            } else {
                clearInterval(typewriterTimer);
                typewriterTimer = null;
                el.innerHTML = text;
                resolve();
            }
        }, speed);
    });
}

function moodEmoji(m) {
    if (m >= 80) return '😄';
    if (m >= 60) return '🙂';
    if (m >= 40) return '😐';
    if (m >= 20) return '😰';
    return '😭';
}

function energyColor(e) {
    if (e >= 60) return 'fill-green';
    if (e >= 30) return 'fill-orange';
    return 'fill-red';
}

function renderStatusBar() {
    const year = Math.ceil(G.month / 12);
    const monthInYear = ((G.month - 1) % 12) + 1;
    const progress = ((G.month - 1) * 30 + G.day) / (36 * 30) * 100;
    return `
    <div class="progress-wrap">
        <div class="progress-label"><span>📊 遊戲進度 ${Math.round(progress)}%</span><span>第${year}年 ${monthInYear}月 · 第${G.day}日</span></div>
        <div class="progress-bar"><div class="progress-fill fill-blue" style="width:${progress}%"></div></div>
        <div class="progress-label"><span>⚡ 精力 ${G.energy}%</span><span>🎯 技能 ${G.skill} · ⭐ 口碑 ${G.reputation}</span></div>
        <div class="progress-bar"><div class="progress-fill ${energyColor(G.energy)}" style="width:${G.energy}%"></div></div>
    </div>
    <div class="status-bar">
        <div class="stat-box">
            <div class="label">📅 日期</div>
            <div class="value date">第${year}年 ${monthInYear}月</div>
        </div>
        <div class="stat-box" id="statMoney">

// Phase Renderers
// ============================================================

function render() {
    const single = document.getElementById('appSingle');
    const layout = document.getElementById('gameLayout');
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('appMain');

    const isGameplay = ['play','result','event','monthEnd'].includes(G.phase);

    if (isGameplay) {
        single.style.display = 'none';
        layout.style.display = 'flex';
        sidebar.innerHTML = renderSidebar();
        switch (G.phase) {
            case 'play': main.innerHTML = renderPlay(); break;
            case 'result': main.innerHTML = renderResult(); break;
            case 'event': main.innerHTML = renderEvent(); break;
            case 'monthEnd': main.innerHTML = renderMonthEnd(); break;
        }
        main.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        single.style.display = 'block';
        layout.style.display = 'none';
        switch (G.phase) {
            case 'start': single.innerHTML = renderStart(); break;
            case 'guide': single.innerHTML = renderGuide(); break;
            case 'end': single.innerHTML = renderEnd(); break;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function renderPlay() {
    let choicesHTML = '<div class="choices">';
    if (G.energy <= 10) {
        choicesHTML += `<button class="choice-btn" onclick="doWork(5)">😴 你太累了，只能休息<span class="cost">精力不足，無法工作</span></button>`;
    } else {
        WORK_CHOICES.forEach((c, i) => {
            const disabled = (G.energy <= 10 && i !== 5) ? 'style="opacity:0.4;pointer-events:none"' : '';
            choicesHTML += `<button class="choice-btn" onclick="doWork(${i})" ${disabled}>${c.text}<span class="cost">${c.desc}</span></button>`;
        });
    }
    choicesHTML += '</div>';

    const remaining = Math.max(0, G.target - G.salesThisMonth);
    const daysLeft = 30 - G.day;
    let urgency = '';
    if (daysLeft <= 5 && remaining > 0) urgency = '<span style="color:#f87171;"> ⚠️ 時間唔多了！</span>';

    return `
    <div class="story-panel">
        ${renderScene('morning')}
        <div class="story-body">
            <span class="event-tag tag-work">📅 第 ${G.day} 日</span>
            <div class="text" id="storyText">早上鬧鐘響起，新嘅一日開始了。\n\n距離月尾仲有 <span class="highlight">${daysLeft} 日</span>，仲差 <span class="highlight">${remaining} 單</span>先達標。${urgency}\n\n今日你想點做？</div>
        </div>
    </div>
    ${choicesHTML}`;
}

function renderResult() {
    const r = G.lastResult;
    const scene = r.good === true ? 'good' : (r.good === false ? 'crisis' : 'morning');
    const resultCls = r.good === true ? 'result-good' : (r.good === false ? 'result-bad' : 'result-neutral');

    return `
    <div class="result-panel ${resultCls}">
        ${renderScene(r.scene || scene)}
        <div class="result-body">
            <span class="event-tag ${r.good === true ? 'tag-good' : r.good === false ? 'tag-crisis' : 'tag-work'}">${r.good === true ? '✅ 成功' : r.good === false ? '❌ 失敗' : '📝 結果'}</span>

function renderEvent() {
    const ev = G.currentEvent;
    let choicesHTML = '<div class="choices">';
    ev.choices.forEach((c, i) => {
        choicesHTML += `<button class="choice-btn" onclick="doEvent(${i})">${c.text}</button>`;
    });
    choicesHTML += '</div>';

    const sceneKey = ev.tag === 'crisis' ? 'crisis' : ev.tag === 'good' ? 'good' : 'event';

    return `
    <div class="story-panel">
        ${renderScene(ev.scene || sceneKey)}
        <div class="story-body">
            <span class="event-tag tag-${ev.tag}">${ev.tagLabel}</span>
            <div class="text" id="eventText"></div>
        </div>
    </div>
    ${choicesHTML}`;
}

function renderMonthEnd() {
    const hit = G.salesThisMonth >= G.target;

    const expenses = G.rent + G.living + G.transport;
    const net = income + bonus - expenses;

    let pool = hit ? (G.salesThisMonth >= G.target + 4 ? MONTH_COMMENTS.great : MONTH_COMMENTS.ok) : MONTH_COMMENTS.bad;
    const comment = pool[Math.floor(Math.random() * pool.length)];

    return `

        ${renderScene('month')}
        <div class="story-body">
            <span class="event-tag ${hit ? 'tag-good' : 'tag-crisis'}">${hit ? '🎉 達標！' : '😰 未達標'}</span>

    return `<div class="game-log">${logHTML || '<div class="log-entry log-info">新嘅旅程開始了，加油！💪</div>'}</div>`;
}

// ============================================================
// Game Logic
// ============================================================

function showGuide() {
    sfxClick();
    G.phase = 'guide';
    render();
}

async function startGame() {
    initAudio();
    sfxClick();

    G.month=1; G.day=1; G.money=5000; G.mood=80;
    G.salesThisMonth=0; G.totalSales=0; G.salary=5000;
    G.commission=150; G.rent=5500; G.living=3000;
    G.transport=800; G.target=8; G.reputation=50;
    G.skill=30; G.energy=100; G.streak=0; G.maxStreak=0; G.failMonths=0;
    G.log=[]; G.lastResult=null;

    await showTransition('🌅', '第 1 年，第 1 個月，第 1 日...', 2000);

    G.phase = 'play';
    render();
    startBGM();
}

async function doWork(index) {
    sfxClick();
    const choice = WORK_CHOICES[index];
    const result = choice.action(G);

    G.log.push({
        text: `[第${G.day}日] ${result.text.split('\n')[0]}`,
        cls: result.good === true ? 'log-good' : result.good === false ? 'log-bad' : 'log-info'
    });

    // Advance 1 day
    G.day += 1;

    // Clamp
    G.mood = Math.max(0, Math.min(100, G.mood));
    G.energy = Math.max(0, Math.min(100, G.energy));

    // Sound effects
    if (result.good === true) {
        if (result.sales) { sfxCoin(); floatNotify(`+${result.sales} 單！`, 'good'); }
        else sfxSuccess();
    } else if (result.good === false) {
        sfxFail();
    }

    // Show result screen
    G.lastResult = { ...result, scene: choice.scene };
    G.phase = 'result';
    render();

    // Typewriter effect for result
    await typewrite('resultText', result.text, 25);
}

async function afterResult() {
    sfxClick();

    // Random event chance (~20%)
    if (Math.random() < 0.2 && G.day < 28) {
        await triggerRandomEvent();
        return;
    }

    // Check month end
    if (G.day > 30) {
        sfxMonthEnd();
        await showTransition('📊', '月尾到了...結算時間！', 1500);
        G.phase = 'monthEnd';
        render();
        await typewriteMonthEnd();
        return;
    }

    if (checkGameOver()) return;
    G.phase = 'play';
    render();
}

async function triggerRandomEvent() {
    sfxEvent();
    const ev = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
    G.currentEvent = ev;

    await showTransition(
        ev.tag === 'crisis' ? '🚨' : ev.tag === 'good' ? '🎉' : '❗',
        ev.tag === 'crisis' ? '出事了...' : ev.tag === 'good' ? '有好消息！' : '突發事件！',
        1200
    );

    G.phase = 'event';
    render();
    await typewrite('eventText', ev.text, 25);
}

async function doEvent(choiceIndex) {
    sfxClick();
    const ev = G.currentEvent;
    const result = ev.choices[choiceIndex].action(G);

    if (result.includes('簽') || result.includes('獎金')) { sfxCoin(); floatNotify(result.split('。')[0], 'good'); }
    else if (result.includes('損失') || result.includes('流失') || result.includes('受損')) { sfxFail(); floatNotify(result.split('。')[0], 'bad'); }

    G.log.push({ text: `[事件] ${result.split('\n')[0]}`, cls: 'log-info' });

    G.mood = Math.max(0, Math.min(100, G.mood));
    G.energy = Math.max(0, Math.min(100, G.energy));

    if (G.day > 30) {
        sfxMonthEnd();
        await showTransition('📊', '月尾到了...結算時間！', 1500);
        G.phase = 'monthEnd';
        render();
        await typewriteMonthEnd();
        return;
    }

    if (checkGameOver()) return;
    G.phase = 'play';
    render();
}

async function typewriteMonthEnd() {
    const hit = G.salesThisMonth >= G.target;
    const income = G.salary + G.salesThisMonth * G.commission;
    const bonus = hit && G.streak >= 3 ? 2000 : 0;
    const expenses = G.rent + G.living + G.transport;
    const net = income + bonus - expenses;
    let pool = hit ? (G.salesThisMonth >= G.target + 4 ? MONTH_COMMENTS.great : MONTH_COMMENTS.ok) : MONTH_COMMENTS.bad;
    const comment = pool[Math.floor(Math.random() * pool.length)];

    const text = `📊 月結報告

本月簽單：${G.salesThisMonth} 單（目標 ${G.target} 單）

💵 收入：
　底薪　　$${G.salary.toLocaleString()}
　佣金　　$${(G.salesThisMonth * G.commission).toLocaleString()}（${G.salesThisMonth} 單 × $${G.commission}）
${bonus > 0 ? `　獎金　　$${bonus.toLocaleString()}（連續達標獎勵🔥）\n` : ''}　合計　　$${(income + bonus).toLocaleString()}

💸 支出：
　租金　　$${G.rent.toLocaleString()}
　生活費　$${G.living.toLocaleString()}
　交通費　$${G.transport.toLocaleString()}
　合計　　$${expenses.toLocaleString()}

本月結餘：${net >= 0 ? '+' : ''}$${net.toLocaleString()}

${comment}`;

    await typewrite('monthText', text, 15);
}

async function nextMonth() {
    sfxClick();
    const hit = G.salesThisMonth >= G.target;
    const income = G.salary + G.salesThisMonth * G.commission;
    const bonus = hit && G.streak >= 3 ? 2000 : 0;
    const expenses = G.rent + G.living + G.transport;
    G.money += income + bonus - expenses;

    if (hit) {
        G.streak++;
        G.maxStreak = Math.max(G.maxStreak, G.streak);
        G.failMonths = 0;
        G.mood = Math.min(100, G.mood + 8);
    } else {
        G.streak = 0;
        G.failMonths++;
        G.mood = Math.max(0, G.mood - 12);
    }

    if (G.month % 6 === 0) {
        G.target = Math.min(15, G.target + 1);
        G.log.push({ text: `[通知] 公司提高目標到每月 ${G.target} 單！`, cls: 'log-bad' });
        floatNotify(`目標提高到 ${G.target} 單！`, 'bad');
    }
    if (G.month % 12 === 0) {
        G.salary += 300;
        G.commission += 20;
        G.log.push({ text: `[通知] 年度調薪！底薪 $${G.salary.toLocaleString()}`, cls: 'log-good' });
        floatNotify('年度調薪！', 'good');
    }

    G.month++;
    G.day = 1;
    G.salesThisMonth = 0;
    G.energy = 100;

    if (G.month > 36) {
        stopBGM();
        sfxSuccess();
        await showTransition('🏆', '3 年過去了...', 2000);
        G.phase = 'end';
        render();
        return;
    }

    if (checkGameOver()) return;

    const year = Math.ceil(G.month / 12);
    const monthInYear = ((G.month - 1) % 12) + 1;
    await showTransition('🌅', `第 ${year} 年，第 ${monthInYear} 月`, 1500);

    G.phase = 'play';
    render();
}

function checkGameOver() {
    if (G.money < -10000 || G.mood <= 0 || G.failMonths >= 3) {
        stopBGM();
        sfxGameOver();
        G.phase = 'end';
        render();
        return true;
    }
    return false;
}

// ============================================================
// Init
// ============================================================
initParticles();
render();
</script>
