<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template 87 - Story Highlight Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(79,70,229,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text/emoji to edit → Change colors → Download as PNG</div>
<div class="toolbar">
<div><label>Background</label><br><input type="color" id="c1" value="#fdf2f8" onchange="u()"></div>
<div><label>Circle Color</label><br><input type="color" id="c2" value="#ec4899" onchange="u()"></div>
<div><label>Text Color</label><br><input type="color" id="c3" value="#831843" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:#fdf2f8;display:flex;flex-direction:column;align-items:center;justify-content:center;">
<!-- Subtle radial glow -->
<div style="position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(236,72,153,0.08) 0%,transparent 70%);"></div>
<!-- Outer decorative ring -->
<div class="outer-ring" style="width:560px;height:560px;border-radius:50%;border:2px dashed rgba(236,72,153,0.25);display:flex;align-items:center;justify-content:center;position:relative;">
<!-- Middle ring -->
<div class="middle-ring" style="width:480px;height:480px;border-radius:50%;border:3px solid rgba(236,72,153,0.15);display:flex;align-items:center;justify-content:center;">
<!-- Main circle -->
<div id="mainCircle" style="width:380px;height:380px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#f472b6);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(236,72,153,0.3);">
<div contenteditable style="font-size:120px;line-height:1;">✈️</div>
</div>
</div>
<!-- Decorative dots on ring -->
<div style="position:absolute;top:0;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#ec4899;" class="ring-dot"></div>
<div style="position:absolute;bottom:0;left:50%;transform:translate(-50%,50%);width:14px;height:14px;border-radius:50%;background:#ec4899;" class="ring-dot"></div>
<div style="position:absolute;left:0;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#ec4899;" class="ring-dot"></div>
<div style="position:absolute;right:0;top:50%;transform:translate(50%,-50%);width:14px;height:14px;border-radius:50%;background:#ec4899;" class="ring-dot"></div>
</div>
<!-- Category name -->
<div contenteditable id="catName" style="font-size:42px;font-weight:900;color:#831843;margin-top:50px;letter-spacing:4px;text-transform:uppercase;">TRAVEL</div>
<div contenteditable style="font-size:18px;color:#be185d;margin-top:8px;font-weight:600;">Story Highlights</div>
</div>
</div>
<script>
function u(){
var bg=document.getElementById('c1').value;
var circle=document.getElementById('c2').value;
var txt=document.getElementById('c3').value;
document.getElementById('card').style.background=bg;
document.getElementById('mainCircle').style.background='linear-gradient(135deg,'+circle+','+circle+'aa)';
document.getElementById('mainCircle').style.boxShadow='0 20px 60px '+circle+'44';
document.getElementById('catName').style.color=txt;
document.querySelectorAll('.outer-ring').forEach(function(el){el.style.borderColor=circle+'40'});
document.querySelectorAll('.middle-ring').forEach(function(el){el.style.borderColor=circle+'28'});
document.querySelectorAll('.ring-dot').forEach(function(el){el.style.background=circle});
}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(function(c){var a=document.createElement('a');a.download='story-cover.png';a.href=c.toDataURL('image/png');a.click();})}
</script>
<script src="template-enhancer.js"></script>
<script src="template-engine.js"></script>
</body>
</html>
