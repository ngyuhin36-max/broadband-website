<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 100 - Year in Review</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(79,70,229,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change colors → Download as PNG</div>
<div class="toolbar">
<div><label>BG Start</label><br><input type="color" id="c1" value="#0f0526" onchange="u()"></div>
<div><label>BG End</label><br><input type="color" id="c2" value="#1a0a3e" onchange="u()"></div>
<div><label>Gold Accent</label><br><input type="color" id="c3" value="#fbbf24" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:linear-gradient(135deg,#0f0526,#1a0a3e);display:flex;flex-direction:column;align-items:center;padding:60px 70px;box-sizing:border-box;position:relative;">
<!-- Decorative elements -->
<div style="position:absolute;top:40px;left:40px;width:120px;height:120px;border:3px solid rgba(251,191,36,0.15);border-radius:50%;"></div>
<div style="position:absolute;top:80px;right:60px;width:80px;height:80px;border:3px solid rgba(251,191,36,0.1);border-radius:50%;"></div>
<div style="position:absolute;bottom:100px;left:80px;width:60px;height:60px;border:3px solid rgba(251,191,36,0.12);border-radius:50%;"></div>
<div style="position:absolute;bottom:60px;right:100px;width:100px;height:100px;border:3px solid rgba(251,191,36,0.08);border-radius:50%;"></div>
<!-- Sparkle decorations -->
<div class="gold-text" style="position:absolute;top:60px;left:200px;font-size:28px;color:#fbbf24;opacity:0.4;">✦</div>
<div class="gold-text" style="position:absolute;top:180px;right:120px;font-size:22px;color:#fbbf24;opacity:0.3;">✦</div>
<div class="gold-text" style="position:absolute;bottom:200px;left:120px;font-size:18px;color:#fbbf24;opacity:0.35;">✦</div>
<div class="gold-text" style="position:absolute;bottom:140px;right:180px;font-size:24px;color:#fbbf24;opacity:0.25;">✦</div>
<!-- Top label -->
<div contenteditable class="gold-text" style="font-size:18px;font-weight:700;color:#fbbf24;letter-spacing:8px;text-transform:uppercase;margin-bottom:10px;">YEAR IN REVIEW</div>
<!-- Year number -->
<div contenteditable style="font-size:160px;font-weight:900;color:#ffffff;line-height:1;margin-bottom:5px;text-shadow:0 0 60px rgba(251,191,36,0.2);">2026</div>
<div class="gold-line" style="width:100px;height:4px;background:#fbbf24;border-radius:2px;margin-bottom:40px;"></div>
<!-- Subtitle -->
<div contenteditable style="font-size:24px;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:50px;text-align:center;">A year of growth, milestones & wins</div>
<!-- 4 stats grid -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;width:100%;max-width:800px;">
<div class="stat-card" style="background:rgba(251,191,36,0.08);border:2px solid rgba(251,191,36,0.2);border-radius:24px;padding:35px;text-align:center;">
<div contenteditable class="gold-text" style="font-size:56px;font-weight:900;color:#fbbf24;line-height:1;">150K+</div>
<div contenteditable style="font-size:18px;font-weight:600;color:rgba(255,255,255,0.6);margin-top:10px;">Followers Gained</div>
</div>
<div class="stat-card" style="background:rgba(251,191,36,0.08);border:2px solid rgba(251,191,36,0.2);border-radius:24px;padding:35px;text-align:center;">
<div contenteditable class="gold-text" style="font-size:56px;font-weight:900;color:#fbbf24;line-height:1;">365</div>
<div contenteditable style="font-size:18px;font-weight:600;color:rgba(255,255,255,0.6);margin-top:10px;">Posts Published</div>
</div>
<div class="stat-card" style="background:rgba(251,191,36,0.08);border:2px solid rgba(251,191,36,0.2);border-radius:24px;padding:35px;text-align:center;">
<div contenteditable class="gold-text" style="font-size:56px;font-weight:900;color:#fbbf24;line-height:1;">2.5M</div>
<div contenteditable style="font-size:18px;font-weight:600;color:rgba(255,255,255,0.6);margin-top:10px;">Total Impressions</div>
</div>
<div class="stat-card" style="background:rgba(251,191,36,0.08);border:2px solid rgba(251,191,36,0.2);border-radius:24px;padding:35px;text-align:center;">
<div contenteditable class="gold-text" style="font-size:56px;font-weight:900;color:#fbbf24;line-height:1;">12</div>
<div contenteditable style="font-size:18px;font-weight:600;color:rgba(255,255,255,0.6);margin-top:10px;">Brand Collabs</div>
</div>
</div>
<!-- Footer -->
<div style="margin-top:auto;padding-top:35px;text-align:center;">
<div contenteditable style="font-size:18px;font-weight:700;color:rgba(255,255,255,0.4);">Thank you for an amazing year! 🎉</div>
</div>
</div>
</div>
<script>
function u(){
var bg1=document.getElementById('c1').value;
var bg2=document.getElementById('c2').value;
var gold=document.getElementById('c3').value;
document.getElementById('card').style.background='linear-gradient(135deg,'+bg1+','+bg2+')';
document.querySelectorAll('.gold-text').forEach(function(el){el.style.color=gold});
document.querySelector('.gold-line').style.background=gold;
document.querySelectorAll('.stat-card').forEach(function(el){
el.style.background=gold+'14';
el.style.borderColor=gold+'33';
});
}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(function(c){var a=document.createElement('a');a.download='year-in-review.png';a.href=c.toDataURL('image/png');a.click();})}
</script>
<script src="template-enhancer.js"></script>
</body>
</html>
