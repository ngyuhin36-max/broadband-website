<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 02 - Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body { margin:0; background:#f0f0f0; font-family:'Inter',sans-serif; display:flex; flex-direction:column; align-items:center; padding:30px; }
.toolbar { background:#fff; padding:20px 40px; border-radius:16px; margin-bottom:30px;
    box-shadow:0 2px 20px rgba(0,0,0,0.1); display:flex; gap:20px; align-items:center; flex-wrap:wrap; }
.toolbar label { font-size:14px; color:#666; font-weight:600; }
.toolbar select, .toolbar input { padding:8px 12px; border:2px solid #e0e0e0; border-radius:8px; font-size:14px; }
.toolbar input[type="color"] { width:50px; height:36px; padding:2px; cursor:pointer; }
.btn { padding:12px 28px; border:none; border-radius:10px; font-size:16px; font-weight:700;
    cursor:pointer; transition:all 0.2s; }
.btn-download { background:linear-gradient(135deg, #667eea, #764ba2); color:#fff; }
.btn-download:hover { transform:scale(1.05); }
.instructions { background:#fff3cd; padding:15px 25px; border-radius:12px; margin-bottom:20px;
    font-size:15px; color:#856404; border-left:4px solid #ffc107; max-width:1080px; width:100%; }
#template { position:relative; }
[contenteditable]:focus { outline:2px dashed rgba(79,70,229,0.5); outline-offset:4px; }

.card { width:1080px; height:1080px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
.bg-circle1 { position:absolute; width:600px; height:600px; border-radius:50%; opacity:0.15; top:-150px; right:-150px; }
.bg-circle2 { position:absolute; width:400px; height:400px; border-radius:50%; opacity:0.1; bottom:-100px; left:-100px; }
.quote-mark { font-size:200px; font-family:'Playfair Display'; font-weight:900; line-height:1; opacity:0.15; position:absolute; top:80px; left:80px; }
.quote-text { font-family:'Playfair Display'; font-size:52px; font-weight:700; line-height:1.4;
    max-width:800px; padding:0 60px; position:relative; z-index:1; outline:none; }
.quote-text:hover { background:rgba(255,255,255,0.05); border-radius:8px; }
.quote-author { font-size:22px; font-weight:600; margin-top:40px; letter-spacing:2px; text-transform:uppercase; outline:none; }
.quote-author:hover { background:rgba(255,255,255,0.05); border-radius:8px; }
.divider { width:80px; height:4px; margin:30px auto; border-radius:2px; }
.footer-brand { position:absolute; bottom:50px; font-size:16px; font-weight:600; letter-spacing:2px; opacity:0.5; outline:none; }
.footer-brand:hover { opacity:0.8; }
</style>
</head>
<body>

<div class="instructions">
    ✏️ <strong>How to use:</strong> Click any text to edit → Change colors above → Click "Download as PNG"
</div>

<div class="toolbar">
    <div>
        <label>Background</label><br>
        <select id="bgSelect" onchange="changeBg()">
            <option value="#1a1a2e">Dark Navy</option>
            <option value="#0f172a">Deep Black</option>
            <option value="#faf5ff">Light Purple</option>
            <option value="#fff7ed">Warm Cream</option>
            <option value="#f0fdf4">Fresh Green</option>
        </select>
    </div>
    <div>
        <label>Accent</label><br>
        <input type="color" id="c1" value="#a78bfa" onchange="updateColors()">
    </div>
    <button class="btn btn-download" onclick="downloadPNG()">⬇ Download as PNG</button>
</div>

<div id="template">
<div class="card" id="card" style="background:#1a1a2e; --accent:#a78bfa; --text:#ffffff;">
    <div class="bg-circle1" style="background:var(--accent);"></div>
    <div class="bg-circle2" style="background:var(--accent);"></div>
    <div class="quote-mark" style="color:var(--accent);">"</div>
    <div class="quote-text" contenteditable="true" style="color:var(--text);">The best time to start marketing your business was yesterday. The second best time is now.</div>
    <div class="divider" style="background:var(--accent);"></div>
    <div class="quote-author" contenteditable="true" style="color:var(--accent);">— DIGITAL MARKETING WISDOM</div>
    <div class="footer-brand" contenteditable="true" style="color:var(--text);">YOUR BRAND</div>
</div>
</div>

<script>
function updateColors() {
    const card = document.getElementById('card');
    card.style.setProperty('--accent', document.getElementById('c1').value);
    document.querySelector('.bg-circle1').style.background = document.getElementById('c1').value;
    document.querySelector('.bg-circle2').style.background = document.getElementById('c1').value;
}
function changeBg() {
    const card = document.getElementById('card');
    const bg = document.getElementById('bgSelect').value;
    card.style.background = bg;
    const dark = ['#1a1a2e','#0f172a'].includes(bg);
    card.style.setProperty('--text', dark ? '#ffffff' : '#1a1a2e');
}
function downloadPNG() {
    document.activeElement.blur();
    html2canvas(document.getElementById('template'), { scale:2, useCORS:true }).then(c => {
        const a = document.createElement('a'); a.download='quote-post.png'; a.href=c.toDataURL('image/png'); a.click();
    });
}
</script>
<script src="template-enhancer.js"></script>
</body>
</html>
