<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 14 - This or That</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-download:hover{transform:scale(1.05)}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,255,255,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex}
.side{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px;position:relative}
.side-a{background:#6366f1}
.side-b{background:#ec4899}
.diagonal{position:absolute;top:0;bottom:0;right:-40px;width:80px;background:inherit;transform:skewX(-5deg);z-index:1}
.side-b .diagonal{left:-40px;right:auto;transform:skewX(-5deg)}
.or-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#0f172a;z-index:5;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.side-label{font-size:16px;font-weight:800;letter-spacing:4px;color:rgba(255,255,255,0.6);margin-bottom:30px;outline:none}
.side-label:hover{color:rgba(255,255,255,0.8)}
.side-emoji{font-size:80px;margin-bottom:20px}
.side-text{font-size:36px;font-weight:900;color:#fff;line-height:1.3;outline:none}
.side-text:hover{opacity:0.9}
.side-desc{font-size:18px;color:rgba(255,255,255,0.7);margin-top:15px;outline:none}
.side-desc:hover{color:rgba(255,255,255,0.9)}
.header{position:absolute;top:40px;left:0;right:0;text-align:center;z-index:5}
.header h1{font-size:32px;font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.3);outline:none}
.footer{position:absolute;bottom:30px;left:0;right:0;text-align:center;z-index:5}
.footer span{font-size:15px;color:rgba(255,255,255,0.4);font-weight:600;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change colors → Download as PNG</div>
<div class="toolbar">
<div><label>Left</label><br><input type="color" id="c1" value="#6366f1" onchange="u()"></div>
<div><label>Right</label><br><input type="color" id="c2" value="#ec4899" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card">
<div class="header"><h1 contenteditable="true">THIS OR THAT?</h1></div>
<div class="side side-a">
<div class="diagonal" style="background:#6366f1;"></div>
<div class="side-label" contenteditable="true">OPTION A</div>
<div class="side-emoji" contenteditable="true">📱</div>
<div class="side-text" contenteditable="true">Facebook<br>Ads</div>
<div class="side-desc" contenteditable="true">Broad audience reach</div>
</div>
<div class="or-circle">OR</div>
<div class="side side-b">
<div class="side-label" contenteditable="true">OPTION B</div>
<div class="side-emoji" contenteditable="true">🔍</div>
<div class="side-text" contenteditable="true">Google<br>Ads</div>
<div class="side-desc" contenteditable="true">High-intent searches</div>
</div>
<div class="footer"><span contenteditable="true">YOUR BRAND — Comment your choice below!</span></div>
</div>
</div>
<script>
function u(){
document.querySelector('.side-a').style.background=document.getElementById('c1').value;
document.querySelector('.side-a .diagonal').style.background=document.getElementById('c1').value;
document.querySelector('.side-b').style.background=document.getElementById('c2').value;
}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='this-or-that.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
</body>
</html>
