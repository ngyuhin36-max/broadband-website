<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 55 - Flash Sale</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,255,0,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px}
.zigzag{position:absolute;top:0;left:0;right:0;height:30px;background:repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(255,255,255,0.1) 27px,rgba(255,255,255,0.1) 54px)}
.zigzag-bottom{position:absolute;bottom:0;left:0;right:0;height:30px;background:repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(255,255,255,0.1) 27px,rgba(255,255,255,0.1) 54px)}
.flash-icon{font-size:70px;margin-bottom:15px;outline:none;position:relative;z-index:1}
.flash-tag{font-size:22px;font-weight:800;letter-spacing:8px;color:rgba(255,255,255,0.6);margin-bottom:10px;outline:none;position:relative;z-index:1}
.flash-title{font-size:90px;font-weight:900;line-height:1;margin-bottom:20px;outline:none;position:relative;z-index:1}
.flash-discount{font-size:180px;font-weight:900;line-height:0.9;margin-bottom:20px;outline:none;position:relative;z-index:1;letter-spacing:-8px}
.flash-off{font-size:60px;font-weight:900;letter-spacing:10px;margin-bottom:30px;outline:none;position:relative;z-index:1}
.countdown{display:flex;gap:20px;margin-bottom:35px;position:relative;z-index:1}
.countdown-box{background:rgba(0,0,0,0.3);border-radius:16px;padding:20px 25px;min-width:100px}
.countdown-num{font-size:42px;font-weight:900;color:#fff;outline:none}
.countdown-label{font-size:13px;color:rgba(255,255,255,0.5);font-weight:600;margin-top:4px;outline:none}
.flash-urgency{font-size:20px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:3px;outline:none;position:relative;z-index:1}
.flash-code{font-size:28px;font-weight:900;padding:15px 50px;border:3px dashed rgba(255,255,255,0.4);border-radius:12px;margin-top:25px;outline:none;position:relative;z-index:1}
.footer{position:absolute;bottom:40px;font-size:14px;color:rgba(255,255,255,0.2);font-weight:600;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change colors → Download as PNG</div>
<div class="toolbar">
<div><label>Background</label><br><input type="color" id="c1" value="#dc2626" onchange="u()"></div>
<div><label>Text</label><br><input type="color" id="c2" value="#fef08a" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:#dc2626;">
<div class="zigzag"></div>
<div class="zigzag-bottom"></div>
<div class="flash-icon" contenteditable="true">⚡</div>
<div class="flash-tag" contenteditable="true">LIMITED TIME ONLY</div>
<div class="flash-title" id="title" contenteditable="true" style="color:#fef08a;">FLASH SALE</div>
<div class="flash-discount" id="discount" contenteditable="true" style="color:#fff;">70%</div>
<div class="flash-off" id="off" contenteditable="true" style="color:#fef08a;">OFF</div>
<div class="countdown">
<div class="countdown-box"><div class="countdown-num" contenteditable="true">02</div><div class="countdown-label" contenteditable="true">HOURS</div></div>
<div class="countdown-box"><div class="countdown-num" contenteditable="true">45</div><div class="countdown-label" contenteditable="true">MINS</div></div>
<div class="countdown-box"><div class="countdown-num" contenteditable="true">30</div><div class="countdown-label" contenteditable="true">SECS</div></div>
</div>
<div class="flash-urgency" contenteditable="true">🔥 HURRY! WHILE STOCKS LAST 🔥</div>
<div class="flash-code" id="code" contenteditable="true" style="color:#fef08a;">USE CODE: FLASH70</div>
<div class="footer" contenteditable="true">@YOURBRAND</div>
</div>
</div>
<script>
function u(){var a=document.getElementById('c1').value,b=document.getElementById('c2').value;document.getElementById('card').style.background=a;document.getElementById('title').style.color=b;document.getElementById('off').style.color=b;document.getElementById('code').style.color=b}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='flash-sale.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
</body>
</html>
