<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 88 - YouTube Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(79,70,229,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change colors → Download as PNG (16:9 thumbnail framed in 1080x1080)</div>
<div class="toolbar">
<div><label>Left Bg</label><br><input type="color" id="c1" value="#dc2626" onchange="u()"></div>
<div><label>Right Bg</label><br><input type="color" id="c2" value="#1e1e1e" onchange="u()"></div>
<div><label>Accent</label><br><input type="color" id="c3" value="#facc15" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;">
<!-- Frame label -->
<div contenteditable style="font-size:16px;font-weight:700;color:#555;letter-spacing:3px;margin-bottom:20px;">YOUTUBE THUMBNAIL — 16:9</div>
<!-- Thumbnail 16:9 -->
<div id="thumb" style="width:1000px;height:562px;border-radius:16px;overflow:hidden;position:relative;display:flex;box-shadow:0 10px 40px rgba(0,0,0,0.5);">
<!-- Left side - Color block -->
<div id="leftSide" style="width:50%;background:linear-gradient(135deg,#dc2626,#b91c1c);display:flex;flex-direction:column;justify-content:center;padding:40px 50px;position:relative;">
<!-- Diagonal stripe accent -->
<div class="accent-stripe" style="position:absolute;top:0;right:-30px;width:60px;height:100%;background:#facc15;transform:skewX(-6deg);"></div>
<div contenteditable style="font-size:52px;font-weight:900;color:#fff;line-height:1.05;text-transform:uppercase;position:relative;z-index:1;">THIS<br>CHANGES<br>EVERY-<br>THING</div>
</div>
<!-- Right side - Dark -->
<div id="rightSide" style="width:50%;background:#1e1e1e;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;">
<!-- Face placeholder circle -->
<div style="width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.1);border:4px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;">
<div style="font-size:80px;">😮</div>
</div>
<!-- Play button -->
<div style="position:absolute;bottom:30px;right:30px;width:60px;height:60px;background:rgba(255,0,0,0.9);border-radius:14px;display:flex;align-items:center;justify-content:center;">
<div style="width:0;height:0;border-style:solid;border-width:12px 0 12px 22px;border-color:transparent transparent transparent #fff;margin-left:4px;"></div>
</div>
<!-- Episode badge -->
<div class="accent-badge" style="position:absolute;top:25px;right:25px;background:#facc15;padding:8px 20px;border-radius:8px;">
<div contenteditable style="font-size:20px;font-weight:900;color:#000;">EP. 47</div>
</div>
</div>
</div>
<!-- Bottom info -->
<div style="display:flex;gap:30px;margin-top:25px;align-items:center;">
<div contenteditable style="font-size:15px;color:#666;font-weight:600;">1920 x 1080 px</div>
<div style="width:4px;height:4px;border-radius:50%;background:#444;"></div>
<div contenteditable style="font-size:15px;color:#666;font-weight:600;">Bold & Eye-catching Design</div>
</div>
</div>
</div>
<script>
function u(){
var left=document.getElementById('c1').value;
var right=document.getElementById('c2').value;
var accent=document.getElementById('c3').value;
document.getElementById('leftSide').style.background='linear-gradient(135deg,'+left+','+left+'cc)';
document.getElementById('rightSide').style.background=right;
document.querySelectorAll('.accent-stripe').forEach(function(el){el.style.background=accent});
document.querySelectorAll('.accent-badge').forEach(function(el){el.style.background=accent});
}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(function(c){var a=document.createElement('a');a.download='yt-thumbnail.png';a.href=c.toDataURL('image/png');a.click();})}
</script>
<script src="template-enhancer.js"></script>
</body>
</html>
