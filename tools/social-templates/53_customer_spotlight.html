<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 53 - Customer Spotlight</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(59,130,246,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;text-align:center;background:#0f172a}
.spotlight-bg{position:absolute;top:-100px;right:-100px;width:500px;height:500px;border-radius:50%;opacity:0.08}
.spotlight-bg2{position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;border-radius:50%;opacity:0.06}
.spotlight-tag{font-size:16px;font-weight:800;letter-spacing:5px;text-transform:uppercase;padding:10px 28px;border-radius:30px;margin-bottom:35px;outline:none;position:relative;z-index:1}
.avatar{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:25px;outline:none;position:relative;z-index:1;border:4px solid rgba(255,255,255,0.1)}
.customer-name{font-size:40px;font-weight:900;color:#fff;margin-bottom:8px;outline:none;position:relative;z-index:1}
.customer-role{font-size:20px;color:rgba(255,255,255,0.4);font-weight:600;margin-bottom:30px;outline:none;position:relative;z-index:1}
.stars{font-size:36px;margin-bottom:30px;outline:none;position:relative;z-index:1}
.customer-story{font-size:24px;color:rgba(255,255,255,0.75);line-height:1.6;max-width:750px;font-style:italic;outline:none;position:relative;z-index:1}
.quote-deco{font-size:80px;line-height:0.5;opacity:0.15;color:#fff;margin-bottom:15px;position:relative;z-index:1}
.footer{position:absolute;bottom:40px;font-size:14px;color:rgba(255,255,255,0.15);font-weight:600;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change accent color → Download as PNG</div>
<div class="toolbar">
<div><label>Accent</label><br><input type="color" id="c1" value="#3b82f6" onchange="u()"></div>
<div><label>Background</label><br><input type="color" id="c2" value="#0f172a" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card">
<div class="spotlight-bg" id="bg1" style="background:#3b82f6;"></div>
<div class="spotlight-bg2" id="bg2" style="background:#3b82f6;"></div>
<div class="spotlight-tag" id="tag" contenteditable="true" style="background:rgba(59,130,246,0.15);color:#3b82f6;">⭐ CUSTOMER SPOTLIGHT</div>
<div class="avatar" id="avatar" contenteditable="true" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);">👤</div>
<div class="customer-name" contenteditable="true">Sarah Johnson</div>
<div class="customer-role" contenteditable="true">Small Business Owner • Austin, TX</div>
<div class="stars" contenteditable="true">⭐⭐⭐⭐⭐</div>
<div class="quote-deco">"</div>
<div class="customer-story" contenteditable="true">"This product completely transformed how I run my business. I've saved over 20 hours a week and my revenue increased by 150%."</div>
<div class="footer" contenteditable="true">@YOURBRAND</div>
</div>
</div>
<script>
function u(){var a=document.getElementById('c1').value,b=document.getElementById('c2').value;document.getElementById('card').style.background=b;document.getElementById('bg1').style.background=a;document.getElementById('bg2').style.background=a;document.getElementById('tag').style.background=a+'22';document.getElementById('tag').style.color=a;document.getElementById('avatar').style.background=`linear-gradient(135deg,${a},${b})`}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='customer-spotlight.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
</body>
</html>
