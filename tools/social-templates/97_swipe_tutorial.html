<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 97 - Swipe Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(79,70,229,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change colors → Download as PNG</div>
<div class="toolbar">
<div><label>Background</label><br><input type="color" id="c1" value="#0f172a" onchange="u()"></div>
<div><label>Accent</label><br><input type="color" id="c2" value="#06b6d4" onchange="u()"></div>
<div><label>Step Color</label><br><input type="color" id="c3" value="#f43f5e" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:#0f172a;display:flex;flex-direction:column;padding:70px 80px;box-sizing:border-box;">
<!-- Top bar: series indicator -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:50px;">
<div contenteditable class="accent-text" style="font-size:16px;font-weight:700;color:#06b6d4;letter-spacing:4px;text-transform:uppercase;">TUTORIAL SERIES</div>
<div style="display:flex;gap:8px;">
<div class="step-dot" style="width:36px;height:6px;background:#f43f5e;border-radius:3px;"></div>
<div style="width:36px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;"></div>
<div style="width:36px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;"></div>
<div style="width:36px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;"></div>
<div style="width:36px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;"></div>
</div>
</div>
<!-- Step number -->
<div style="margin-bottom:30px;">
<div class="step-badge" style="display:inline-flex;align-items:center;gap:12px;background:#f43f5e;padding:14px 28px;border-radius:14px;">
<div contenteditable style="font-size:18px;font-weight:900;color:#fff;">STEP 1 OF 5</div>
</div>
</div>
<!-- Main title -->
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
<div contenteditable style="font-size:60px;font-weight:900;color:#ffffff;line-height:1.12;margin-bottom:30px;">How to Set Up<br>Your First<br>Website</div>
<div class="accent-line" style="width:80px;height:5px;background:#06b6d4;border-radius:3px;margin-bottom:30px;"></div>
<div contenteditable style="font-size:26px;font-weight:600;color:#94a3b8;line-height:1.5;">Choose a domain name that<br>represents your brand identity.</div>
</div>
<!-- Bottom: swipe indicator -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:40px;">
<div contenteditable style="font-size:16px;color:#475569;font-weight:600;">@yourhandle</div>
<div style="display:flex;align-items:center;gap:12px;">
<div contenteditable class="accent-text" style="font-size:20px;font-weight:800;color:#06b6d4;">SWIPE</div>
<div style="display:flex;align-items:center;">
<svg class="arrow-icon" width="44" height="24" viewBox="0 0 44 24">
<path d="M0 12h38m0 0l-10-10m10 10l-10 10" stroke="#06b6d4" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</div>
</div>
</div>
</div>
</div>
<script>
function u(){
var bg=document.getElementById('c1').value;
var accent=document.getElementById('c2').value;
var step=document.getElementById('c3').value;
document.getElementById('card').style.background=bg;
document.querySelectorAll('.accent-text').forEach(function(el){el.style.color=accent});
document.querySelector('.accent-line').style.background=accent;
document.querySelector('.arrow-icon path').setAttribute('stroke',accent);
document.querySelectorAll('.step-badge').forEach(function(el){el.style.background=step});
document.querySelectorAll('.step-dot').forEach(function(el){el.style.background=step});
}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(function(c){var a=document.createElement('a');a.download='swipe-tutorial.png';a.href=c.toDataURL('image/png');a.click();})}
</script>
</body>
</html>
