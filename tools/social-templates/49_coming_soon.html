<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 49 - Coming Soon / Teaser</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,255,255,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;background:#0a0a0a;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:100px}
.blur-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.3}
.orb1{width:400px;height:400px;top:10%;left:10%}
.orb2{width:300px;height:300px;bottom:10%;right:15%}
.cs-label{font-size:16px;font-weight:800;letter-spacing:8px;color:rgba(255,255,255,0.3);margin-bottom:30px;outline:none}
.cs-title{font-size:80px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:20px;outline:none;position:relative;z-index:1}
.cs-title:hover{opacity:0.95}
.cs-line{width:100px;height:3px;background:rgba(255,255,255,0.2);margin:30px auto}
.cs-desc{font-size:24px;color:rgba(255,255,255,0.4);max-width:500px;line-height:1.5;margin-bottom:40px;outline:none;position:relative;z-index:1}
.cs-notify{display:inline-block;padding:18px 50px;border:2px solid rgba(255,255,255,0.2);border-radius:14px;font-size:20px;font-weight:800;color:#fff;outline:none;position:relative;z-index:1}
.cs-notify:hover{border-color:rgba(255,255,255,0.4)}
.footer{position:absolute;bottom:50px;font-size:15px;color:rgba(255,255,255,0.15);font-weight:600;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change orb colors → Download as PNG</div>
<div class="toolbar">
<div><label>Orb 1</label><br><input type="color" id="c1" value="#6366f1" onchange="u()"></div>
<div><label>Orb 2</label><br><input type="color" id="c2" value="#ec4899" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card">
<div class="blur-orb orb1" style="background:#6366f1;"></div>
<div class="blur-orb orb2" style="background:#ec4899;"></div>
<div class="cs-label" contenteditable="true">COMING SOON</div>
<div class="cs-title" contenteditable="true">Something<br>New Is<br>Brewing</div>
<div class="cs-line"></div>
<div class="cs-desc" contenteditable="true">We're working on something exciting. Be the first to know when it launches.</div>
<div class="cs-notify" contenteditable="true">Notify Me →</div>
<div class="footer" contenteditable="true">YOUR BRAND</div>
</div>
</div>
<script>
function u(){document.querySelector('.orb1').style.background=document.getElementById('c1').value;document.querySelector('.orb2').style.background=document.getElementById('c2').value}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='coming-soon.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
</body>
</html>
