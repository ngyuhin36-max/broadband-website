<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 37 - Podcast Episode</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-download:hover{transform:scale(1.05)}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,255,255,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;background:#0f0f1a;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px}
.wave{position:absolute;bottom:0;left:0;right:0;height:200px;opacity:0.05;display:flex;align-items:flex-end;justify-content:center;gap:4px}
.wave-bar{width:8px;border-radius:4px;background:#fff}
.pod-icon{font-size:80px;margin-bottom:20px;outline:none}
.pod-show{font-size:16px;font-weight:800;letter-spacing:4px;color:rgba(255,255,255,0.4);margin-bottom:20px;outline:none}
.pod-ep{font-size:20px;font-weight:700;padding:10px 30px;border-radius:25px;margin-bottom:25px;outline:none}
.pod-title{font-size:52px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:20px;outline:none}
.pod-title:hover{opacity:0.95}
.pod-guest{font-size:22px;color:rgba(255,255,255,0.6);margin-bottom:30px;outline:none}
.pod-duration{font-size:18px;color:rgba(255,255,255,0.3);font-weight:600;outline:none}
.pod-platforms{display:flex;gap:20px;margin-top:30px}
.pod-plat{padding:10px 24px;border-radius:12px;background:rgba(255,255,255,0.08);font-size:15px;font-weight:700;color:rgba(255,255,255,0.6);outline:none}
.footer{position:absolute;bottom:40px;font-size:15px;color:rgba(255,255,255,0.2);font-weight:600;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change accent → Download as PNG</div>
<div class="toolbar">
<div><label>Accent</label><br><input type="color" id="c1" value="#8b5cf6" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card">
<div class="wave" id="wave"></div>
<div class="pod-icon" contenteditable="true">🎙️</div>
<div class="pod-show" contenteditable="true">YOUR PODCAST NAME</div>
<div class="pod-ep" style="background:rgba(139,92,246,0.2);color:#8b5cf6;" contenteditable="true">EPISODE 12</div>
<div class="pod-title" contenteditable="true">How to Build a<br>Brand from Zero</div>
<div class="pod-guest" contenteditable="true">with Guest Name — Marketing Expert</div>
<div class="pod-duration" contenteditable="true">45 min listen</div>
<div class="pod-platforms">
<div class="pod-plat" contenteditable="true">Spotify</div>
<div class="pod-plat" contenteditable="true">Apple</div>
<div class="pod-plat" contenteditable="true">YouTube</div>
</div>
<div class="footer" contenteditable="true">YOUR BRAND</div>
</div>
</div>
<script>
// Generate wave bars
const wave=document.getElementById('wave');for(let i=0;i<80;i++){const b=document.createElement('div');b.className='wave-bar';b.style.height=Math.random()*150+30+'px';wave.appendChild(b)}
function u(){const c=document.getElementById('c1').value;document.querySelector('.pod-ep').style.background=c+'33';document.querySelector('.pod-ep').style.color=c}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='podcast-ep.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
</body>
</html>
