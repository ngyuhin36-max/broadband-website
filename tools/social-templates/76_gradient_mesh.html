<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 76 - Gradient Mesh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,255,255,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden}
.mesh-layer{position:absolute;inset:0}
.mesh-blob{position:absolute;border-radius:50%;mix-blend-mode:normal;filter:blur(100px)}
.m1{width:700px;height:700px;top:-200px;left:-150px}
.m2{width:600px;height:600px;bottom:-200px;right:-100px}
.m3{width:500px;height:500px;top:200px;left:300px}
.m4{width:400px;height:400px;top:-50px;right:100px}
.m5{width:350px;height:350px;bottom:100px;left:100px}
.content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:80px;box-sizing:border-box;text-align:center}
.mesh-label{font-size:16px;font-weight:800;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:5px;margin-bottom:24px;outline:none}
.mesh-title{font-size:76px;font-weight:900;color:#fff;line-height:1.05;margin-bottom:24px;outline:none;text-shadow:0 4px 30px rgba(0,0,0,0.15)}
.mesh-desc{font-size:24px;color:rgba(255,255,255,0.85);line-height:1.6;max-width:700px;margin-bottom:40px;outline:none}
.mesh-divider{width:80px;height:4px;background:#fff;border-radius:2px;margin:0 auto 40px;opacity:0.5}
.mesh-stats{display:flex;gap:60px;margin-bottom:50px}
.mesh-stat{text-align:center}
.mesh-stat-num{font-size:48px;font-weight:900;color:#fff;outline:none}
.mesh-stat-label{font-size:15px;font-weight:600;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:2px;margin-top:4px;outline:none}
.mesh-cta{display:inline-block;padding:18px 48px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);border-radius:60px;font-size:20px;font-weight:800;color:#fff;outline:none;backdrop-filter:blur(10px)}
.noise{position:absolute;inset:0;opacity:0.03;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px 128px}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change gradient colors → Download as PNG</div>
<div class="toolbar">
<div><label>Color 1</label><br><input type="color" id="c1" value="#ff6b6b" onchange="u()"></div>
<div><label>Color 2</label><br><input type="color" id="c2" value="#4ecdc4" onchange="u()"></div>
<div><label>Color 3</label><br><input type="color" id="c3" value="#45b7d1" onchange="u()"></div>
<div><label>Color 4</label><br><input type="color" id="c4" value="#f9ca24" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card">
<div class="mesh-layer">
<div class="mesh-blob m1" id="mb1"></div>
<div class="mesh-blob m2" id="mb2"></div>
<div class="mesh-blob m3" id="mb3"></div>
<div class="mesh-blob m4" id="mb4"></div>
<div class="mesh-blob m5" id="mb5"></div>
</div>
<div class="noise"></div>
<div class="content">
<div class="mesh-label" contenteditable="true">YOUR BRAND</div>
<div class="mesh-title" contenteditable="true">Beautiful Gradients Made Simple</div>
<div class="mesh-desc" contenteditable="true">Create eye-catching visuals with dynamic color meshes. Stand out on every platform.</div>
<div class="mesh-divider"></div>
<div class="mesh-stats">
<div class="mesh-stat"><div class="mesh-stat-num" contenteditable="true">50K+</div><div class="mesh-stat-label" contenteditable="true">Downloads</div></div>
<div class="mesh-stat"><div class="mesh-stat-num" contenteditable="true">4.9★</div><div class="mesh-stat-label" contenteditable="true">Rating</div></div>
<div class="mesh-stat"><div class="mesh-stat-num" contenteditable="true">120+</div><div class="mesh-stat-label" contenteditable="true">Templates</div></div>
</div>
<div class="mesh-cta" contenteditable="true">Get Started Free →</div>
</div>
</div>
</div>
<script>
function u(){
var c1=document.getElementById('c1').value;
var c2=document.getElementById('c2').value;
var c3=document.getElementById('c3').value;
var c4=document.getElementById('c4').value;
document.getElementById('card').style.background='#1a1a2e';
document.getElementById('mb1').style.background=c1;
document.getElementById('mb2').style.background=c2;
document.getElementById('mb3').style.background=c3;
document.getElementById('mb4').style.background=c4;
document.getElementById('mb5').style.background=c1;
}
u();
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='gradient-mesh.png';a.href=c.toDataURL('image/png');a.click();})}
</script>
<script src="template-enhancer.js"></script>
</body>
</html>
