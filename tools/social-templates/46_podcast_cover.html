<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 46 - Podcast Cover Art</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,255,255,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:100px}
.mic-icon{font-size:120px;margin-bottom:25px;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3))}
.pod-name{font-size:60px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:15px;outline:none}
.pod-name:hover{opacity:0.95}
.pod-tagline{font-size:24px;color:rgba(255,255,255,0.6);font-weight:600;max-width:500px;outline:none}
.pod-tagline:hover{color:rgba(255,255,255,0.8)}
.pod-host{position:absolute;bottom:60px;font-size:18px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:3px;outline:none}
.corner-accent{position:absolute;width:250px;height:250px;border-radius:50%;opacity:0.1}
.ca1{top:-60px;left:-60px}.ca2{bottom:-60px;right:-60px}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change gradient → Download as PNG</div>
<div class="toolbar">
<div><label>Color 1</label><br><input type="color" id="c1" value="#0f172a" onchange="u()"></div>
<div><label>Color 2</label><br><input type="color" id="c2" value="#1e3a5f" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:linear-gradient(135deg,#0f172a,#1e3a5f);">
<div class="corner-accent ca1" style="background:#fff;"></div>
<div class="corner-accent ca2" style="background:#fff;"></div>
<div class="mic-icon">🎙️</div>
<div class="pod-name" contenteditable="true">The Marketing<br>Minute</div>
<div class="pod-tagline" contenteditable="true">Quick tips to grow your business online</div>
<div class="pod-host" contenteditable="true">HOSTED BY YOUR NAME</div>
</div>
</div>
<script>
function u(){document.getElementById('card').style.background=`linear-gradient(135deg,${document.getElementById('c1').value},${document.getElementById('c2').value})`}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='podcast-cover.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
<script src="template-enhancer.js"></script>
</body>
</html>
