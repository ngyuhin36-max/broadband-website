const grid = document.getElementById('grid');

function renderGrid(list) {
    grid.innerHTML = '';
    if (list.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>找不到模板</h3><p>試下其他關鍵字或分類</p></div>';
        return;
    }
    list.forEach(t => {
        const card = document.createElement('div');
        card.className = 'template-card';
        card.setAttribute('data-cat', t.cat);
        card.onclick = () => openTemplate(t);
        card.innerHTML = `
            <div class="card-preview">
                <span class="card-category">${catNames[t.cat]}</span>
                <iframe src="${t.file}" loading="lazy" scrolling="no" tabindex="-1"></iframe>
            </div>
            <div class="card-info">
                <h3>${t.name}</h3>
                <span class="card-num">#${t.num}</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

function filterTemplates(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

function searchTemplates(val) {
    currentSearch = val.toLowerCase();
    applyFilters();
}

function applyFilters() {
    let filtered = templates;
    if (currentFilter !== 'all') {
        filtered = filtered.filter(t => t.cat === currentFilter);
    }
    if (currentSearch) {
        filtered = filtered.filter(t =>
            t.name.toLowerCase().includes(currentSearch) ||
            t.num.includes(currentSearch) ||
            catNames[t.cat].includes(currentSearch)
        );
    }
    renderGrid(filtered);
}

function openTemplate(t) {
    document.getElementById('modalTitle').textContent = `#${t.num} ${t.name}`;
    document.getElementById('modalFrame').src = t.file;
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').classList.remove('show');
    document.getElementById('modalFrame').src = 'about:blank';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// Initial render
renderGrid(templates);
</script>

</body>
</html>
