<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 52 - Motivation Monday</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,255,255,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px}
.sun-circle{position:absolute;bottom:-200px;left:50%;transform:translateX(-50%);width:700px;height:700px;border-radius:50%;opacity:0.15}
.tag{font-size:18px;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:30px;outline:none;position:relative;z-index:1}
.quote-mark{font-size:120px;color:rgba(255,255,255,0.15);line-height:0.6;margin-bottom:10px;position:relative;z-index:1}
.quote-text{font-size:56px;font-weight:900;color:#fff;line-height:1.2;max-width:850px;outline:none;position:relative;z-index:1}
.quote-author{font-size:22px;color:rgba(255,255,255,0.6);margin-top:35px;font-weight:600;outline:none;position:relative;z-index:1}
.divider{width:80px;height:4px;background:rgba(255,255,255,0.3);border-radius:2px;margin:30px auto}
.cta{font-size:18px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:3px;outline:none;position:relative;z-index:1}
.footer{position:absolute;bottom:40px;font-size:14px;color:rgba(255,255,255,0.15);font-weight:600;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change sunrise colors → Download as PNG</div>
<div class="toolbar">
<div><label>Sky Top</label><br><input type="color" id="c1" value="#1e1b4b" onchange="u()"></div>
<div><label>Horizon</label><br><input type="color" id="c2" value="#f97316" onchange="u()"></div>
<div><label>Sun Glow</label><br><input type="color" id="c3" value="#fbbf24" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:linear-gradient(180deg,#1e1b4b 0%,#312e81 30%,#f97316 85%,#fbbf24 100%);">
<div class="sun-circle" id="sun" style="background:radial-gradient(circle,#fbbf24,transparent 70%);"></div>
<div class="tag" contenteditable="true">MOTIVATION MONDAY</div>
<div class="quote-mark">"</div>
<div class="quote-text" contenteditable="true">The only way to do great work is to love what you do.</div>
<div class="quote-author" contenteditable="true">— Steve Jobs</div>
<div class="divider"></div>
<div class="cta" contenteditable="true">START YOUR WEEK STRONG</div>
<div class="footer" contenteditable="true">@YOURBRAND</div>
</div>
</div>
<script>
function u(){var a=document.getElementById('c1').value,b=document.getElementById('c2').value,c=document.getElementById('c3').value;document.getElementById('card').style.background=`linear-gradient(180deg,${a} 0%,${b} 85%,${c} 100%)`;document.getElementById('sun').style.background=`radial-gradient(circle,${c},transparent 70%)`}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='motivation-monday.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
</body>
</html>
