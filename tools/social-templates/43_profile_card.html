<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template 43 - Profile Card / Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(79,70,229,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;background:#0f172a;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px}
.avatar{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:80px;margin-bottom:25px;border:4px solid rgba(255,255,255,0.1)}
.bio-name{font-size:48px;font-weight:900;color:#fff;margin-bottom:8px;outline:none}
.bio-handle{font-size:22px;color:rgba(255,255,255,0.4);margin-bottom:25px;outline:none}
.bio-desc{font-size:22px;color:rgba(255,255,255,0.7);max-width:600px;line-height:1.6;margin-bottom:35px;outline:none}
.bio-stats{display:flex;gap:50px;margin-bottom:35px}
.stat{text-align:center}
.stat-num{font-size:32px;font-weight:900;color:#fff;outline:none}
.stat-label{font-size:14px;color:rgba(255,255,255,0.4);font-weight:600;margin-top:4px}
.bio-links{display:flex;gap:12px}
.bio-link{padding:12px 28px;border-radius:12px;font-size:16px;font-weight:700;color:#fff;outline:none}
.bio-link:hover{opacity:0.9}
.footer{position:absolute;bottom:40px;font-size:15px;color:rgba(255,255,255,0.2);font-weight:600;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change accent → Download as PNG</div>
<div class="toolbar">
<div><label>Accent</label><br><input type="color" id="c1" value="#6366f1" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card">
<div class="avatar" style="background:rgba(99,102,241,0.2);" contenteditable="true">👤</div>
<div class="bio-name" contenteditable="true">Your Name</div>
<div class="bio-handle" contenteditable="true">@yourhandle</div>
<div class="bio-desc" contenteditable="true">Digital marketing expert helping small businesses grow online. 10+ years experience in SEO & social media.</div>
<div class="bio-stats">
<div class="stat"><div class="stat-num" contenteditable="true">10K</div><div class="stat-label">Followers</div></div>
<div class="stat"><div class="stat-num" contenteditable="true">500+</div><div class="stat-label">Clients</div></div>
<div class="stat"><div class="stat-num" contenteditable="true">50+</div><div class="stat-label">Projects</div></div>
</div>
<div class="bio-links">
<div class="bio-link" style="background:#6366f1;" contenteditable="true">Website</div>
<div class="bio-link" style="background:rgba(255,255,255,0.1);" contenteditable="true">LinkedIn</div>
<div class="bio-link" style="background:rgba(255,255,255,0.1);" contenteditable="true">Email</div>
</div>
<div class="footer" contenteditable="true">YOUR BRAND</div>
</div>
</div>
<script>
function u(){const c=document.getElementById('c1').value;document.querySelector('.avatar').style.background=c+'33';document.querySelector('.bio-links .bio-link').style.background=c}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='profile-card.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
<script src="template-enhancer.js"></script>
<script src="template-engine.js"></script>
</body>
</html>
