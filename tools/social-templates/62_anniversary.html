<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Template 62 - Anniversary</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(255,215,0,0.6);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:#0a0a1a}
.confetti{position:absolute;width:12px;height:12px;border-radius:2px;opacity:0.6}
.confetti-circle{border-radius:50%}
.gold-ring{position:absolute;width:420px;height:420px;border:3px solid rgba(255,215,0,0.15);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.gold-ring-2{position:absolute;width:520px;height:520px;border:2px solid rgba(255,215,0,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.years-badge{width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#f0a500);display:flex;flex-direction:column;justify-content:center;align-items:center;margin-bottom:30px;box-shadow:0 8px 40px rgba(255,215,0,0.3)}
.years-num{font-size:72px;font-weight:900;color:#0a0a1a;line-height:1;outline:none}
.years-label{font-size:16px;font-weight:800;color:#0a0a1a;text-transform:uppercase;letter-spacing:3px;outline:none}
.top-text{position:absolute;top:70px;font-size:16px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:rgba(255,215,0,0.4);outline:none}
.title{font-size:60px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:15px;outline:none}
.subtitle{font-size:26px;font-weight:600;color:rgba(255,215,0,0.8);margin-bottom:25px;outline:none;max-width:700px;line-height:1.4}
.message{font-size:20px;color:rgba(255,255,255,0.5);max-width:600px;line-height:1.6;outline:none}
.brand{position:absolute;bottom:50px;font-size:18px;font-weight:800;color:rgba(255,215,0,0.3);letter-spacing:3px;outline:none}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change colors → Download as PNG</div>
<div class="toolbar">
<div><label>Accent</label><br><input type="color" id="c1" value="#ffd700" onchange="u()"></div>
<div><label>Background</label><br><input type="color" id="c2" value="#0a0a1a" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card">
<!-- confetti pieces -->
<div class="confetti" style="top:5%;left:10%;background:#ffd700;transform:rotate(45deg)"></div>
<div class="confetti confetti-circle" style="top:12%;left:25%;background:#ff6b6b"></div>
<div class="confetti" style="top:8%;right:15%;background:#ffd700;transform:rotate(-30deg)"></div>
<div class="confetti confetti-circle" style="top:18%;right:30%;background:#4ecdc4"></div>
<div class="confetti" style="top:3%;left:50%;background:#ff6b6b;transform:rotate(60deg)"></div>
<div class="confetti confetti-circle" style="top:15%;left:70%;background:#ffd700"></div>
<div class="confetti" style="bottom:8%;left:15%;background:#4ecdc4;transform:rotate(-45deg)"></div>
<div class="confetti confetti-circle" style="bottom:12%;right:20%;background:#ffd700"></div>
<div class="confetti" style="bottom:5%;left:45%;background:#ff6b6b;transform:rotate(30deg)"></div>
<div class="confetti confetti-circle" style="bottom:15%;left:60%;background:#4ecdc4"></div>
<div class="gold-ring-2"></div>
<div class="gold-ring"></div>
<div class="top-text" contenteditable="true">Celebrating</div>
<div class="years-badge" id="badge">
<div class="years-num" contenteditable="true">5</div>
<div class="years-label" contenteditable="true">Years</div>
</div>
<div class="title" contenteditable="true">Happy Anniversary!</div>
<div class="subtitle" contenteditable="true">Half a decade of growth, innovation & success</div>
<div class="message" contenteditable="true">Thank you for being part of our incredible journey. Every year has been a milestone, and we couldn't have done it without you.</div>
<div class="brand" contenteditable="true">YOUR BRAND</div>
</div>
</div>
<script>
function u(){
var c1=document.getElementById('c1').value,c2=document.getElementById('c2').value;
document.getElementById('card').style.background=c2;
document.getElementById('badge').style.background='linear-gradient(135deg,'+c1+','+darken(c1,30)+')';
document.getElementById('badge').style.boxShadow='0 8px 40px '+c1+'4d';
document.querySelectorAll('.gold-ring').forEach(function(el){el.style.borderColor=c1+'26'});
document.querySelector('.gold-ring-2').style.borderColor=c1+'14';
document.querySelector('.top-text').style.color=c1+'66';
document.querySelector('.subtitle').style.color=c1+'cc';
document.querySelector('.brand').style.color=c1+'4d';
}
function darken(hex,amt){var r=Math.max(0,parseInt(hex.slice(1,3),16)-amt),g=Math.max(0,parseInt(hex.slice(3,5),16)-amt),b=Math.max(0,parseInt(hex.slice(5,7),16)-amt);return'#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('')}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='anniversary.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
<script src="template-enhancer.js"></script>
</body>
</html>
