<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template 28 - Did You Know</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;background:#f0f0f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
.toolbar{background:#fff;padding:20px 40px;border-radius:16px;margin-bottom:30px;box-shadow:0 2px 20px rgba(0,0,0,0.1);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:14px;color:#666;font-weight:600}
.toolbar input[type="color"]{width:50px;height:36px;padding:2px;cursor:pointer;border:2px solid #e0e0e0;border-radius:8px}
.toolbar select{padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px}
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-download{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-download:hover{transform:scale(1.05)}
.instructions{background:#fff3cd;padding:15px 25px;border-radius:12px;margin-bottom:20px;font-size:15px;color:#856404;border-left:4px solid #ffc107;max-width:1080px;width:100%}
#template{position:relative}
[contenteditable]:focus{outline:2px dashed rgba(79,70,229,0.5);outline-offset:4px}
.card{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:100px}
.light-icon{font-size:100px;margin-bottom:20px;outline:none}
.dyk-label{font-size:20px;font-weight:800;letter-spacing:6px;margin-bottom:30px;outline:none}
.dyk-label:hover{opacity:0.9}
.dyk-fact{font-size:48px;font-weight:900;line-height:1.3;max-width:800px;margin-bottom:30px;outline:none}
.dyk-fact:hover{opacity:0.95}
.dyk-detail{font-size:22px;opacity:0.6;line-height:1.5;max-width:600px;outline:none}
.dyk-detail:hover{opacity:0.8}
.footer{position:absolute;bottom:50px;display:flex;gap:30px}
.footer span{font-size:16px;font-weight:600;letter-spacing:1px;opacity:0.3;outline:none}
.footer span:hover{opacity:0.5}
</style>
</head>
<body>
<div class="instructions">✏️ <strong>How to use:</strong> Click text to edit → Change style → Download as PNG</div>
<div class="toolbar">
<div><label>Background</label><br><select id="bgSelect" onchange="bg()"><option value="#fffbeb">Warm</option><option value="#0f172a">Dark</option><option value="#ffffff">White</option><option value="#f0fdf4">Mint</option></select></div>
<div><label>Accent</label><br><input type="color" id="c1" value="#f59e0b" onchange="u()"></div>
<button class="btn btn-download" onclick="dl()">⬇ Download as PNG</button>
</div>
<div id="template">
<div class="card" id="card" style="background:#fffbeb;--text:#0f172a;">
<div class="light-icon" contenteditable="true">💡</div>
<div class="dyk-label" style="color:#f59e0b;" contenteditable="true">DID YOU KNOW?</div>
<div class="dyk-fact" contenteditable="true" style="color:var(--text);">Google processes over<br><span style="color:#f59e0b;">8.5 billion</span><br>searches per day</div>
<div class="dyk-detail" contenteditable="true" style="color:var(--text);">That's 99,000 searches every single second. Is your business showing up?</div>
<div class="footer">
<span contenteditable="true" style="color:var(--text);">YOUR BRAND</span>
<span contenteditable="true" style="color:var(--text);">Share this with a friend</span>
</div>
</div>
</div>
<script>
function u(){document.querySelector('.dyk-label').style.color=document.getElementById('c1').value}
function bg(){const card=document.getElementById('card'),b=document.getElementById('bgSelect').value;card.style.background=b;card.style.setProperty('--text',b==='#0f172a'?'#fff':'#0f172a')}
function dl(){document.activeElement.blur();html2canvas(document.getElementById('template'),{scale:2,useCORS:true}).then(c=>{const a=document.createElement('a');a.download='did-you-know.png';a.href=c.toDataURL('image/png');a.click()})}
</script>
<script src="template-enhancer.js"></script>
<script src="template-engine.js"></script>
</body>
</html>
