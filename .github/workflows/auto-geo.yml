name: Auto GEO - AI 搜尋引擎優化

# 每周三、六 香港時間早上 10 點自動執行 (UTC 02:00)
# 避開 SEO boost (每日 UTC 00:00) 同 Article (周一四 UTC 01:00)
on:
  schedule:
    - cron: '0 2 * * 3,6'   # 周三、周六
  workflow_dispatch:          # 可手動觸發

permissions:
  contents: write

jobs:
  geo-optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run GEO optimization
        run: python .github/scripts/auto_geo.py

      - name: Commit and push GEO updates
        run: |
          git config user.name "BroadbandHK Bot"
          git config user.email "bot@broadbandhk.com"
          git add llms.txt llms-full.txt .github/scripts/geo_log.json
          if git diff --staged --quiet; then
            echo "No GEO updates needed"
          else
            git commit -m "GEO: Auto-update llms-full.txt with latest articles $(date +%Y-%m-%d)"
            git push
            echo "GEO optimization complete!"
          fi
