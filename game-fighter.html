<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Share functions
const GAME_URL = 'https://broadbandhk.com/game-fighter.html';
function shareGame(platform, scoreText) {
  let text = scoreText || '我喺度玩寬頻英雄大戰斷線魔皇！你敢挑戰嗎？';
  let url = GAME_URL;
  switch(platform) {
    case 'wa':
      window.open('https://wa.me/?text=' + encodeURIComponent(text + '\n' + url), '_blank'); break;
    case 'fb':
      window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url) + '&quote=' + encodeURIComponent(text), '_blank'); break;
    case 'copy':
      navigator.clipboard.writeText(text + '\n' + url).then(() => {
        let el = document.getElementById('share-score');
        el.style.display = 'block'; el.textContent = '已複製！可以貼去群組分享';
        setTimeout(() => el.style.display = 'none', 3000);
      }); break;
  }
}
function showShareScore(score, hp, combo) {
  let text = `我用寬頻英雄打敗斷線魔皇！分數: ${score.toLocaleString()} (剩餘血量${hp}%, 最高${combo}連擊)！你打得贏我嗎？`;
  let el = document.getElementById('share-score');
  el.style.display = 'block';
  el.innerHTML = '恭喜勝利！分享你的成績：<br>' +
    '<a onclick="shareGame(\'wa\',\'' + text.replace(/'/g,"\\'") + '\')" style="cursor:pointer;color:#25D366;font-weight:700;margin:0 8px">WhatsApp</a>' +
    '<a onclick="shareGame(\'fb\',\'' + text.replace(/'/g,"\\'") + '\')" style="cursor:pointer;color:#1877F2;font-weight:700;margin:0 8px">Facebook</a>' +
    '<a onclick="shareGame(\'copy\',\'' + text.replace(/'/g,"\\'") + '\')" style="cursor:pointer;color:#aaa;font-weight:700;margin:0 8px">複製</a>';
}

let playerName = localStorage.getItem('fighter_player_name') || '';
let gameState = 'title';
let timer = 99;
let timerInterval = null;
let roundNum = 1;
let p1Wins = 0;
let p2Wins = 0;
let koTimer = 0;
let shakeScreen = 0;
let comboTexts = [];
let hitSparks = [];
let screenFlash = 0;
let screenFlashColor = '#fff';
let energyTrails = [];
let totalDamageDealt = 0;
let maxCombo = 0;
let matchStartTime = 0;
let victoryTimer = 0;
let showingVictory = false;

// Local leaderboard
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('fighter_leaderboard') || '[]'); } catch(e) { return []; }
}
function saveScore(name, score, hp, combo, time) {
  let lb = getLeaderboard();
  lb.push({ name, score, hp, combo, time, date: new Date().toLocaleDateString('zh-HK') });
  lb.sort((a,b) => b.score - a.score);
  lb = lb.slice(0, 10);
  localStorage.setItem('fighter_leaderboard', JSON.stringify(lb));
  return lb;
}

// === Global Leaderboard (Cloudflare Workers) ===
const LB_API = 'https://broadband-leaderboard.broadbandhk.workers.dev/api/leaderboard';
const LB_KEY = 'bdhk-lb-s3cr3t-x7k9m2p4q8';
let globalLeaderboard = [];

async function hmacSign(data) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(LB_KEY), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(data));
  return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function fetchGlobalLB() {
  try {
    const r = await fetch(LB_API + '/fighter');
    if (r.ok) globalLeaderboard = await r.json();
  } catch(e) {}
}

async function submitGlobalScore(name, hp, combo, time, dmg, score) {
  try {
    const ts = Date.now();
    const payload = { name, hp, combo, time, dmg, score };
    const sigData = { ...payload, ts };
    const sig = await hmacSign(JSON.stringify(sigData));
    const r = await fetch(LB_API + '/fighter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...sigData, sig, ts })
    });
    if (r.ok) {
      const data = await r.json();
      if (data.scores) globalLeaderboard = data.scores;
    }
  } catch(e) {}
}

// Fetch global leaderboard on load
fetchGlobalLB();

// Pre-calculate window positions to avoid flickering
const buildings = [
  [0,250,60,150],[55,220,50,180],[100,280,70,120],[165,200,45,200],[205,260,55,140],
  [255,230,40,170],[290,270,65,130],[350,210,50,190],[395,250,45,150],[435,190,55,210],
  [485,240,60,160],[540,220,40,180],[575,260,55,140],[625,200,45,200],[665,270,50,130],
  [710,230,60,170],[765,250,50,150],[810,210,45,190],[850,240,55,160]
];
const windowData = [];
function seedRandom(s) { return function() { s = Math.sin(s) * 10000; return s - Math.floor(s); }; }
(function buildWindows() {
  const rng = seedRandom(42);
  for (let b of buildings) {
    let wins = [];
    for (let wy = b[1]+10; wy < b[1]+b[3]-10; wy += 18) {
      for (let wx = b[0]+8; wx < b[0]+b[2]-8; wx += 14) {
        if (rng() > 0.4) {
          wins.push({ x: wx, y: wy, lit: rng() > 0.7 });
        }
      }
    }
    windowData.push(wins);
  }
})();

// === SOUND ENGINE (Web Audio API) ===
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
  if (!audioCtx) return;
  try {
    let o, g, now = audioCtx.currentTime;
    switch(type) {
      case 'punch':
        // Short sharp hit
        o = audioCtx.createOscillator(); g = audioCtx.createGain();
        o.type = 'square'; o.frequency.setValueAtTime(200, now);
        o.frequency.exponentialRampToValueAtTime(80, now+0.08);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.01, now+0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now); o.stop(now+0.1);
        // Noise burst
        let nb = audioCtx.createBufferSource();
        let buf = audioCtx.createBuffer(1, 2000, audioCtx.sampleRate);
        let d = buf.getChannelData(0);
        for(let i=0;i<2000;i++) d[i]=(Math.random()*2-1)*Math.max(0,1-i/2000);
        nb.buffer = buf;
        let ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.15, now);
        ng.gain.exponentialRampToValueAtTime(0.01, now+0.06);
        nb.connect(ng); ng.connect(audioCtx.destination);
        nb.start(now); nb.stop(now+0.06);
        break;
      case 'kick':
        // Deeper thud
        o = audioCtx.createOscillator(); g = audioCtx.createGain();
        o.type = 'triangle'; o.frequency.setValueAtTime(150, now);
        o.frequency.exponentialRampToValueAtTime(40, now+0.15);
        g.gain.setValueAtTime(0.35, now);
        g.gain.exponentialRampToValueAtTime(0.01, now+0.15);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now); o.stop(now+0.15);
        break;
      case 'special':
        // Dramatic energy blast
        for(let i=0;i<3;i++){
          let oo = audioCtx.createOscillator(); let gg = audioCtx.createGain();
          oo.type = i===0?'sawtooth':'square';
          oo.frequency.setValueAtTime(300+i*200, now);
          oo.frequency.exponentialRampToValueAtTime(80+i*50, now+0.4);
          gg.gain.setValueAtTime(0.15, now+i*0.05);
          gg.gain.exponentialRampToValueAtTime(0.01, now+0.4);
          oo.connect(gg); gg.connect(audioCtx.destination);
          oo.start(now+i*0.05); oo.stop(now+0.4);
        }
        break;
      case 'block':
        // Metallic clang
        o = audioCtx.createOscillator(); g = audioCtx.createGain();
        o.type = 'square'; o.frequency.setValueAtTime(800, now);
        o.frequency.exponentialRampToValueAtTime(400, now+0.08);
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.01, now+0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now); o.stop(now+0.1);
        break;
      case 'guardbreak':
        // Glass shatter
        for(let i=0;i<4;i++){
          let oo = audioCtx.createOscillator(); let gg = audioCtx.createGain();
          oo.type = 'sawtooth';
          oo.frequency.setValueAtTime(1200-i*200, now+i*0.03);
          oo.frequency.exponentialRampToValueAtTime(100, now+0.3);
          gg.gain.setValueAtTime(0.15, now+i*0.03);
          gg.gain.exponentialRampToValueAtTime(0.01, now+0.25);
          oo.connect(gg); gg.connect(audioCtx.destination);
          oo.start(now+i*0.03); oo.stop(now+0.3);
        }
        break;
      case 'ko':
        // Dramatic KO sound
        [200,300,400,500].forEach((f,i)=>{
          let oo = audioCtx.createOscillator(); let gg = audioCtx.createGain();
          oo.type = 'square';
          oo.frequency.setValueAtTime(f, now+i*0.1);
          oo.frequency.exponentialRampToValueAtTime(f*0.3, now+0.5+i*0.1);
          gg.gain.setValueAtTime(0.2, now+i*0.1);
          gg.gain.exponentialRampToValueAtTime(0.01, now+0.6+i*0.1);
          oo.connect(gg); gg.connect(audioCtx.destination);
          oo.start(now+i*0.1); oo.stop(now+0.7+i*0.1);
        });
        break;
      case 'dash':
        // Whoosh
        o = audioCtx.createOscillator(); g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(1200, now);
        o.frequency.exponentialRampToValueAtTime(200, now+0.15);
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.01, now+0.15);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now); o.stop(now+0.15);
        break;
      case 'start':
        // Fight! jingle
        [400,500,600,800].forEach((f,i)=>{
          let oo = audioCtx.createOscillator(); let gg = audioCtx.createGain();
          oo.type = 'square';
          oo.frequency.setValueAtTime(f, now+i*0.12);
          gg.gain.setValueAtTime(0.15, now+i*0.12);
          gg.gain.exponentialRampToValueAtTime(0.01, now+0.12+i*0.12);
          oo.connect(gg); gg.connect(audioCtx.destination);
          oo.start(now+i*0.12); oo.stop(now+0.15+i*0.12);
        });
        break;
    }
  } catch(e) {}
}

const keys = {};
window.addEventListener('keydown', e => {
  if (e.key === ' ' && (gameState === 'title' || gameState === 'victory')) startRound();
  if (e.key.toLowerCase() === 'n' && gameState === 'title') {
    let name = prompt('輸入新玩家名稱：', playerName || '');
    if (name && name.trim()) { playerName = name.trim().substring(0, 12); localStorage.setItem('fighter_player_name', playerName); }
  }
  keys[e.key.toLowerCase()] = true;
  if ([' ','w','a','s','d','e','i','j','k','l'].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mobile touch controls
(function setupTouch() {
  const btns = document.querySelectorAll('[data-key]');
  btns.forEach(btn => {
    const key = btn.dataset.key;
    function press(e) {
      e.preventDefault();
      keys[key] = true;
      btn.classList.add('active');
      if (key === ' ' && (gameState === 'title' || gameState === 'victory')) startRound();
    }
    function release(e) {
      e.preventDefault();
      keys[key] = false;
      btn.classList.remove('active');
    }
    btn.addEventListener('touchstart', press, { passive: false });
    btn.addEventListener('touchend', release, { passive: false });
    btn.addEventListener('touchcancel', release, { passive: false });
    // Also handle mouse for testing
    btn.addEventListener('mousedown', press);
    btn.addEventListener('mouseup', release);
    btn.addEventListener('mouseleave', release);
  });
  // Tap canvas to start game
  document.getElementById('game').addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameState === 'title' || gameState === 'victory') startRound();
  }, { passive: false });
  document.getElementById('game').addEventListener('click', e => {
    if (gameState === 'title' || gameState === 'victory') startRound();
  });
})();

class Fighter {
  constructor(x, name, color, isAI) {
    this.x = x; this.y = 420; this.groundY = 420;
    this.name = name; this.color = color; this.isAI = isAI;
    this.width = 60; this.height = 110;
    this.hp = 200; this.maxHp = 200;
    this.special = 0; this.maxSpecial = 100;
    this.vx = 0; this.vy = 0;
    this.facing = isAI ? -1 : 1;
    this.state = 'idle'; this.stateTimer = 0;
    this.attackHit = false;
    this.comboCount = 0; this.comboTimer = 0;
    this.blocking = false;
    this.animFrame = 0; this.animTimer = 0;
    this.hitStun = 0; this.blockStun = 0;
    // AI
    this.aiTimer = 0;
    this.aiAction = 'idle';
    this.aiReactTime = 0;
    // Dash/flash
    this.dashCooldown = 0;
    this.dashMaxCooldown = 600; // 10 seconds at 60fps
    this.isDashing = false;
    this.dashTimer = 0;
    this.dashTrails = [];
  }
  reset(x) {
    this.x = x; this.y = this.groundY;
    this.hp = this.maxHp; this.special = 0;
    this.vx = 0; this.vy = 0;
    this.state = 'idle'; this.stateTimer = 0;
    this.comboCount = 0; this.comboTimer = 0;
    this.hitStun = 0; this.blockStun = 0;
    this.aiTimer = 0; this.aiAction = 'idle';
    this.dashCooldown = 0; this.isDashing = false; this.dashTimer = 0; this.dashTrails = [];
  }
  getHitbox() {
    let h = this.state === 'crouch' ? 70 : this.height;
    let y = this.state === 'crouch' ? this.groundY + 40 : this.y;
    return { x: this.x - 25, y, w: 50, h };
  }
  getAttackBox() {
    if (this.state === 'punch' && this.stateTimer >= 4 && this.stateTimer <= 10)
      return { x: this.x + this.facing * 30, y: this.y + 15, w: 45, h: 25, dmg: 5, type: 'punch' };
    if (this.state === 'kick' && this.stateTimer >= 6 && this.stateTimer <= 14)
      return { x: this.x + this.facing * 25, y: this.y + 50, w: 55, h: 30, dmg: 8, type: 'kick' };
    if (this.state === 'special' && this.stateTimer >= 12 && this.stateTimer <= 16)
      return { x: this.x + this.facing * 20, y: this.y, w: 120, h: 80, dmg: 45, type: 'special' };
    return null;
  }

  aiUpdate(opponent) {
    this.aiTimer++;
    let dist = Math.abs(this.x - opponent.x);

    // Decide new action every 20-35 frames
    if (this.aiTimer > 20 + Math.random() * 15) {
      this.aiTimer = 0;
      let r = Math.random();

      // If opponent is blocking, use special to guard break!
      if (opponent.blocking && this.special >= 50 && dist < 120) {
        this.aiAction = 'special';
        return;
      }

      // React to opponent attacks - block or dodge
      if (opponent.state === 'punch' || opponent.state === 'kick') {
        if (r < 0.55) { this.aiAction = 'block'; return; }
        if (r < 0.75) { this.aiAction = 'back'; return; }
      }
      // Dodge special attacks instead of blocking (guard break!)
      if (opponent.state === 'special') {
        if (r < 0.5) { this.aiAction = 'back'; return; }
        if (this.dashCooldown <= 0 && r < 0.7) { this.dashBehind(opponent); this.aiAction = 'kick'; return; }
      }

      // Counter-attack when opponent is in recovery
      if (opponent.stateTimer > 12 && dist < 100) {
        if (r < 0.5) { this.aiAction = 'punch'; return; }
        if (r < 0.8) { this.aiAction = 'kick'; return; }
        if (this.special >= 50) { this.aiAction = 'special'; return; }
      }

      // Dash behind player more often
      if (this.dashCooldown <= 0 && dist < 180 && r < 0.18 && this.y >= this.groundY) {
        this.dashBehind(opponent);
        this.aiAction = 'punch';
        return;
      }

      if (dist < 80) {
        // Close range - aggressive attacks
        if (this.special >= 50 && r < 0.35) this.aiAction = 'special';
        else if (r < 0.5) this.aiAction = 'punch';
        else if (r < 0.75) this.aiAction = 'kick';
        else if (r < 0.8) this.aiAction = 'block';
        else this.aiAction = 'back';
      } else if (dist < 180) {
        // Mid range - push in aggressively
        if (r < 0.4) this.aiAction = 'approach';
        else if (r < 0.6) this.aiAction = 'jump_attack';
        else if (this.special >= 50 && r < 0.75) this.aiAction = 'special';
        else if (r < 0.85) this.aiAction = 'kick';
        else this.aiAction = 'approach';
      } else {
        // Far - rush in
        if (r < 0.55) this.aiAction = 'approach';
        else if (r < 0.75) this.aiAction = 'jump_approach';
        else if (r < 0.9) this.aiAction = 'approach';
        else this.aiAction = 'idle';
      }
    }

    // Execute AI action
    let moveDir = opponent.x > this.x ? 1 : -1;
    switch (this.aiAction) {
      case 'approach':
        this.vx = moveDir * 3;
        this.state = 'walk';
        break;
      case 'back':
        this.vx = -moveDir * 2.5;
        this.state = 'walk';
        break;
      case 'punch':
        if (dist < 90 && this.y >= this.groundY) {
          this.state = 'punch'; this.stateTimer = 0; this.attackHit = false; this.vx = 0;
          this.aiAction = 'idle';
        } else {
          this.vx = moveDir * 3; this.state = 'walk';
        }
        break;
      case 'kick':
        if (dist < 100 && this.y >= this.groundY) {
          this.state = 'kick'; this.stateTimer = 0; this.attackHit = false; this.vx = 0;
          this.aiAction = 'idle';
        } else {
          this.vx = moveDir * 3; this.state = 'walk';
        }
        break;
      case 'special':
        if (dist < 120 && this.special >= 50) {
          this.state = 'special'; this.stateTimer = 0; this.attackHit = false;
          this.special -= 50; this.vx = 0; shakeScreen = 10;
          this.aiAction = 'idle';
        } else {
          this.vx = moveDir * 3; this.state = 'walk';
        }
        break;
      case 'block':
        this.blocking = true; this.state = 'block'; this.vx = 0;
        break;
      case 'jump_attack':
        if (this.y >= this.groundY) { this.vy = -12; this.vx = moveDir * 2.5; }
        this.aiAction = 'punch';
        break;
      case 'jump_approach':
        if (this.y >= this.groundY) { this.vy = -12; this.vx = moveDir * 3; }
        this.aiAction = 'approach';
        break;
      default:
        this.vx = 0; this.state = 'idle';
    }
  }

  update(opponent) {
    this.animTimer++;
    if (this.animTimer > 8) { this.animTimer = 0; this.animFrame++; }
    if (this.comboTimer > 0) { this.comboTimer--; if (this.comboTimer <= 0) this.comboCount = 0; }
    if (this.hitStun > 0) {
      this.hitStun--;
      if (this.hitStun <= 0) this.state = 'idle';
      this.y += this.vy; this.vy += 0.8;
      if (this.y >= this.groundY) { this.y = this.groundY; this.vy = 0; }
      return;
    }
    if (this.blockStun > 0) {
      this.blockStun--;
      if (this.blockStun <= 0) this.state = 'idle';
      return;
    }
    if (this.state === 'punch' || this.state === 'kick' || this.state === 'special') {
      this.stateTimer++;
      let dur = this.state === 'punch' ? 32 : this.state === 'kick' ? 40 : 55;
      if (this.stateTimer >= dur) { this.state = 'idle'; this.stateTimer = 0; this.attackHit = false; }
      if (this.y < this.groundY) { this.vy += 0.8; this.y += this.vy; if (this.y >= this.groundY) { this.y = this.groundY; this.vy = 0; } }
      return;
    }
    this.vy += 0.8; this.y += this.vy;
    if (this.y >= this.groundY) { this.y = this.groundY; this.vy = 0; }
    if (opponent.x > this.x) this.facing = 1; else this.facing = -1;

    this.vx = 0; this.state = 'idle'; this.blocking = false;

    if (this.isAI) {
      this.aiUpdate(opponent);
    } else {
      // Player input
      let speed = 3;
      if (keys['i']) { this.blocking = true; this.state = 'block'; }
      if (keys['s']) { this.state = 'crouch'; }
      else if (keys['a']) { this.vx = -speed; this.state = 'walk'; }
      else if (keys['d']) { this.vx = speed; this.state = 'walk'; }
      if (keys['w'] && this.y >= this.groundY) { this.vy = -13; this.state = 'jump'; }
      if (this.y < this.groundY) this.state = 'jump';
      if (keys['j'] && this.y >= this.groundY) { this.state = 'punch'; this.stateTimer = 0; this.attackHit = false; this.vx = 0; }
      if (keys['k'] && this.y >= this.groundY) { this.state = 'kick'; this.stateTimer = 0; this.attackHit = false; this.vx = 0; }
      if (keys['l'] && this.special >= 50) { this.state = 'special'; this.stateTimer = 0; this.attackHit = false; this.special -= 50; this.vx = 0; shakeScreen = 10; }
      if (keys['e'] && this.dashCooldown <= 0 && this.y >= this.groundY) { this.dashBehind(opponent); }
    }

    this.x += this.vx;
    if (this.x < 40) this.x = 40;
    if (this.x > 860) this.x = 860;
    if (this.y < this.groundY) this.state = 'jump';
    if (this.special < this.maxSpecial) this.special += (this.isAI ? 0.15 : 0.05);
    // Dash cooldown
    if (this.dashCooldown > 0) this.dashCooldown--;
    // Dash trails fade
    for (let i = this.dashTrails.length-1; i >= 0; i--) {
      this.dashTrails[i].life--;
      if (this.dashTrails[i].life <= 0) this.dashTrails.splice(i, 1);
    }
  }

  takeDamage(dmg, attackType, attacker) {
    if (this.blocking) {
      if (attackType === 'special') {
        // GUARD BREAK! Special attack breaks through defense
        playSound('guardbreak');
        this.blocking = false;
        this.blockStun = 0;
        this.hitStun = 35; // Long stun
        this.state = 'hit';
        this.hp -= Math.floor(dmg * 0.7); // 70% damage goes through
        this.x -= this.facing * 25;
        this.vy = -6;
        shakeScreen = 15;
        screenFlash = 10;
        screenFlashColor = attacker.isAI ? 'rgba(255,0,0,0.4)' : 'rgba(0,200,255,0.4)';
        // Guard break text
        comboTexts.push({ text: 'GUARD BREAK!', x: this.x, y: this.y - 60, life: 80, color: '#f80', size: 34 });
        // Shatter sparks
        let sparkX = this.x + this.facing * 20, sparkY = this.y + 35;
        for (let i = 0; i < 20; i++) {
          let ang = Math.random() * Math.PI * 2;
          let spd = 5 + Math.random() * 10;
          hitSparks.push({ x: sparkX, y: sparkY, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd-3, life: 20+Math.random()*15, size: 2+Math.random()*4, color: i < 8 ? '#ff0' : '#f80', type: 'spark' });
        }
        // Attacker gains meter
        attacker.special = Math.min(attacker.maxSpecial, attacker.special + dmg * 0.3);
        attacker.comboCount++; attacker.comboTimer = 60;
        totalDamageDealt += Math.floor(dmg * 0.7);
        if (attacker.comboCount > maxCombo) maxCombo = attacker.comboCount;
        if (this.hp <= 0) { this.hp = 0; this.state = 'ko'; }
        return;
      }
      // Normal attacks: perfect block
      playSound('block');
      this.blockStun = 15; this.state = 'block';
      // Gain special meter when blocking
      this.special = Math.min(this.maxSpecial, this.special + dmg * 0.5);
      // Push back
      this.x -= this.facing * 20;
      // Block sparks - deflected energy
      let sparkX = this.x + this.facing * 25;
      let sparkY = this.y + 35;
      let blockColor = this.isAI ? '#f44' : '#0ef';
      for (let i = 0; i < 12; i++) {
        let ang = -this.facing * (Math.random() * 1.5 - 0.3) + Math.PI;
        let spd = 4 + Math.random() * 8;
        hitSparks.push({
          x: sparkX, y: sparkY + (Math.random()-0.5)*40,
          vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
          life: 15+Math.random()*10,
          size: 2+Math.random()*2,
          color: i < 4 ? '#fff' : blockColor,
          type: 'spark'
        });
      }
      // Shield ripple effect
      for (let r = 0; r < 3; r++) {
        hitSparks.push({
          x: sparkX, y: sparkY,
          vx: 0, vy: 0,
          life: 20 + r*5,
          size: 0,
          color: blockColor,
          type: 'ring'
        });
      }
      // Small screen shake
      shakeScreen = 3;
      screenFlash = 3;
      screenFlashColor = this.isAI ? 'rgba(255,50,50,0.15)' : 'rgba(0,170,255,0.15)';
      return;
    }
    this.hp -= dmg;
    this.hitStun = attackType === 'special' ? 25 : 15;
    this.state = 'hit';
    playSound(attackType);
    let kb = attackType === 'special' ? 12 : attackType === 'kick' ? 8 : 5;
    this.x -= this.facing * kb;
    if (attackType === 'special') this.vy = -8;
    attacker.special = Math.min(attacker.maxSpecial, attacker.special + dmg * 0.5);
    attacker.comboCount++; attacker.comboTimer = 60;
    shakeScreen = attackType === 'special' ? 20 : attackType === 'kick' ? 8 : 5;
    let sparkX = (this.x + attacker.x) / 2, sparkY = this.y + 30;
    let isSpecial = attackType === 'special';
    let sparkCount = isSpecial ? 35 : attackType === 'kick' ? 15 : 10;
    // Screen flash
    if (isSpecial) { screenFlash = 12; screenFlashColor = attacker.isAI ? 'rgba(255,0,0,0.4)' : 'rgba(0,170,255,0.4)'; }
    else { screenFlash = 4; screenFlashColor = 'rgba(255,255,255,0.3)'; }
    // Sparks
    let sparkCol = attacker.isAI ? '#f44' : '#4ef';
    for (let i = 0; i < sparkCount; i++) {
      let speed = isSpecial ? 18 : 10;
      let ang = Math.random() * Math.PI * 2;
      let spd = Math.random() * speed;
      hitSparks.push({
        x: sparkX, y: sparkY,
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - (isSpecial ? 4 : 0),
        life: 20+Math.random()*15,
        size: isSpecial ? 3+Math.random()*5 : 2+Math.random()*3,
        color: isSpecial ? `hsl(${(attacker.isAI ? 0 : 190) + Math.random()*40}, 100%, ${60+Math.random()*30}%)` : sparkCol,
        type: isSpecial && i < 8 ? 'ring' : 'spark'
      });
    }
    // Energy trail from attacker to target
    if (isSpecial) {
      for (let i = 0; i < 12; i++) {
        energyTrails.push({
          x: attacker.x + (this.x - attacker.x) * (i/12),
          y: sparkY + (Math.random()-0.5)*20,
          life: 30 + i*2,
          size: 6 - i*0.3,
          color: attacker.isAI ? '#f44' : '#0ef'
        });
      }
    }
    // Track stats
    totalDamageDealt += dmg;
    if (attacker.comboCount > maxCombo) maxCombo = attacker.comboCount;
    if (attacker.comboCount > 1) {
      let comboSize = attacker.comboCount >= 7 ? 42 : attacker.comboCount >= 5 ? 36 : attacker.comboCount >= 3 ? 30 : 24;
      let comboColor = attacker.comboCount >= 7 ? '#f0f' : attacker.comboCount >= 5 ? '#ff0' : attacker.comboCount >= 3 ? '#0ff' : '#fff';
      comboTexts.push({ text: `${attacker.comboCount} HIT COMBO!`, x: this.x, y: this.y - 50, life: 80, color: comboColor, size: comboSize });
    }
    if (this.hp <= 0) { this.hp = 0; this.state = 'ko'; }
  }

  draw() {
    ctx.save();
    let skinColor = '#f5d0a0';
    let breathe = Math.sin(this.animTimer * 0.12) * 1.5;
    let walkCycle = this.state === 'walk' ? Math.sin(this.animFrame * 1.4) : 0;
    // P1 寬頻英雄: blue-white fiber armor, WiFi emblem, cyan energy
    // CPU 斷線魔皇: dark red-black, broken signal, red corruption energy
    let jacketColor = this.isAI ? '#2a0a0a' : '#1a4a8a';
    let jacketColor2 = this.isAI ? '#400808' : '#2266bb';
    let shirtColor = this.isAI ? '#1a0505' : '#0a2a5a';
    let pantsColor = this.isAI ? '#1a0a0a' : '#1a3366';
    let shoeColor = this.isAI ? '#330505' : '#0a2244';
    let hairColor = this.isAI ? '#440000' : '#1a3a6a';
    let gloveColor = this.isAI ? '#550000' : '#0af';
    let flameColor = this.isAI ? '#cc0000' : '#00ccff';
    let flameColor2 = this.isAI ? '#ff4444' : '#88eeff';

    let drawY = this.state === 'crouch' ? this.y + 30 : this.y;

    // Dash afterimage trails
    for (let t of this.dashTrails) {
      let a = t.life / t.maxLife * 0.5;
      ctx.globalAlpha = a;
      ctx.fillStyle = this.isAI ? '#f44' : '#0af';
      // Silhouette
      ctx.beginPath();
      ctx.ellipse(t.x, t.y + 50, 18, 55, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(this.x, this.groundY + this.height + 2, 28, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.translate(this.x, drawY);
    if (this.facing === -1) ctx.scale(-1, 1);
    if (this.state === 'ko') ctx.rotate(Math.PI / 2);
    if (this.state === 'hit' && this.hitStun % 3 < 2) ctx.globalAlpha = 0.5;
    if (this.state === 'block') ctx.translate(-3, 0);

    let crouching = this.state === 'crouch';
    let tY = crouching ? 15 : 0; // torso offset when crouching

    // ===== LEGS =====
    let legLen = crouching ? 25 : 45;
    let footY = crouching ? 75 : 95;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    if (this.state === 'kick' && this.stateTimer >= 4 && this.stateTimer <= 14) {
      // Kicking - one leg forward extended
      // Standing leg
      ctx.fillStyle = pantsColor;
      this.drawLimb(-8, 65+tY, -10, footY+tY, 11);
      ctx.fillStyle = shoeColor;
      ctx.fillRect(-16, footY+tY, 14, 7);
      // Kick leg - horizontal
      ctx.fillStyle = pantsColor;
      ctx.save();
      ctx.translate(5, 68+tY);
      ctx.rotate(-0.15);
      ctx.fillRect(0, -6, 14, 12);
      ctx.fillStyle = skinColor;
      ctx.fillRect(14, -5, 35, 10);
      ctx.fillStyle = shoeColor;
      ctx.fillRect(44, -7, 16, 14);
      ctx.restore();
    } else {
      // Normal legs with fighting stance
      let lOff = walkCycle * 10;
      // Left leg
      ctx.fillStyle = pantsColor;
      this.drawLimb(-9, 65+tY, -12+lOff*0.3, footY+tY+lOff*0.5, 11);
      ctx.fillStyle = shoeColor;
      ctx.beginPath();
      ctx.ellipse(-12+lOff*0.3, footY+tY+lOff*0.5+3, 9, 5, 0, 0, Math.PI*2);
      ctx.fill();
      // Right leg
      ctx.fillStyle = pantsColor;
      this.drawLimb(5, 65+tY, 8-lOff*0.3, footY+tY-lOff*0.5, 11);
      ctx.fillStyle = shoeColor;
      ctx.beginPath();
      ctx.ellipse(8-lOff*0.3, footY+tY-lOff*0.5+3, 9, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // ===== TORSO =====
    let torsoH = crouching ? 30 : 42;
    // Jacket body
    ctx.fillStyle = jacketColor;
    ctx.beginPath();
    ctx.moveTo(-20, 22+tY+breathe);
    ctx.lineTo(20, 22+tY+breathe);
    ctx.lineTo(18, 22+torsoH+tY+breathe);
    ctx.lineTo(-18, 22+torsoH+tY+breathe);
    ctx.closePath();
    ctx.fill();
    // Jacket lapels / detail
    ctx.fillStyle = jacketColor2;
    ctx.beginPath();
    ctx.moveTo(-5, 22+tY+breathe);
    ctx.lineTo(5, 22+tY+breathe);
    ctx.lineTo(3, 22+torsoH+tY+breathe);
    ctx.lineTo(-3, 22+torsoH+tY+breathe);
    ctx.closePath();
    ctx.fill();
    // Inner shirt visible
    ctx.fillStyle = shirtColor;
    ctx.fillRect(-4, 24+tY+breathe, 8, torsoH-6);
    // Belt
    ctx.fillStyle = this.isAI ? '#222' : '#444';
    ctx.fillRect(-19, 60+tY+breathe, 38, 5);
    // Belt buckle
    ctx.fillStyle = '#daa520';
    ctx.fillRect(-3, 60+tY+breathe, 6, 5);

    // Collar
    ctx.fillStyle = jacketColor;
    ctx.beginPath();
    ctx.moveTo(-14, 22+tY+breathe);
    ctx.lineTo(-8, 15+tY+breathe);
    ctx.lineTo(-2, 22+tY+breathe);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(14, 22+tY+breathe);
    ctx.lineTo(8, 15+tY+breathe);
    ctx.lineTo(2, 22+tY+breathe);
    ctx.fill();

    // ===== ARMS =====
    if (this.state === 'punch' && this.stateTimer >= 3 && this.stateTimer <= 12) {
      // Punching arm - extended forward
      ctx.fillStyle = skinColor;
      this.drawLimb(16, 30+tY+breathe, 55, 32+tY+breathe, 8);
      // Fist with glove
      ctx.fillStyle = gloveColor;
      ctx.beginPath(); ctx.arc(60, 32+tY+breathe, 9, 0, Math.PI*2); ctx.fill();
      // Impact effect
      if (this.stateTimer >= 5 && this.stateTimer <= 9) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
          let a = (i/4)*Math.PI - 0.5;
          ctx.beginPath();
          ctx.moveTo(65 + Math.cos(a)*8, 32+tY+breathe + Math.sin(a)*8);
          ctx.lineTo(65 + Math.cos(a)*15, 32+tY+breathe + Math.sin(a)*15);
          ctx.stroke();
        }
      }
      // Back arm guard
      ctx.fillStyle = skinColor;
      this.drawLimb(-16, 30+tY+breathe, -20, 48+tY+breathe, 7);
      ctx.fillStyle = gloveColor;
      ctx.beginPath(); ctx.arc(-20, 48+tY+breathe, 7, 0, Math.PI*2); ctx.fill();
    } else if (this.state === 'special' && this.stateTimer >= 3 && this.stateTimer <= 25) {
      // === ULTIMATE SPECIAL ATTACK - massive energy beam ===
      let t = this.stateTimer;
      let phase = t < 8 ? 'charge' : 'fire';

      // Arms thrust forward
      ctx.fillStyle = skinColor;
      this.drawLimb(14, 26+tY, 40, 28+tY, 9);
      this.drawLimb(14, 36+tY, 40, 38+tY, 9);

      if (phase === 'charge') {
        // Charging - energy gathering around hands
        let chargeR = (t-3) * 5;
        ctx.strokeStyle = flameColor; ctx.lineWidth = 3;
        ctx.globalAlpha = 0.7;
        for (let r = 0; r < 3; r++) {
          ctx.beginPath();
          ctx.arc(45, 33+tY, chargeR + r*8, 0, Math.PI*2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        // Particles being sucked in
        for (let i = 0; i < 8; i++) {
          let a = (i/8)*Math.PI*2 + t*0.5;
          let dist = 40 - t*4;
          if (dist > 5) {
            ctx.fillStyle = flameColor2;
            ctx.beginPath();
            ctx.arc(45+Math.cos(a)*dist, 33+tY+Math.sin(a)*dist, 3, 0, Math.PI*2);
            ctx.fill();
          }
        }
      } else {
        // FIRING - huge beam shooting forward
        let beamProgress = Math.min(1, (t-8)/4);
        let beamLen = 300 * beamProgress;
        let beamWidth = 28 + Math.sin(t*1.5)*6;

        // Beam outer glow
        ctx.fillStyle = flameColor;
        ctx.globalAlpha = 0.25;
        ctx.fillRect(42, 33+tY-beamWidth, beamLen, beamWidth*2);
        // Beam main
        ctx.globalAlpha = 0.6;
        ctx.fillRect(42, 33+tY-beamWidth*0.6, beamLen, beamWidth*1.2);
        ctx.globalAlpha = 1;

        // Beam core
        ctx.fillStyle = flameColor2;
        ctx.fillRect(42, 33+tY-beamWidth*0.35, beamLen, beamWidth*0.7);

        // Beam bright center
        ctx.fillStyle = '#fff';
        ctx.fillRect(42, 33+tY-beamWidth*0.12, beamLen, beamWidth*0.24);

        // Energy particles along beam
        for (let i = 0; i < 6; i++) {
          let bx = 50 + (beamLen * i/6);
          let by = 33+tY + (Math.sin(Date.now()*0.02+i)*beamWidth*0.4);
          ctx.fillStyle = flameColor2;
          ctx.globalAlpha = 0.7;
          ctx.beginPath(); ctx.arc(bx, by, 2+Math.sin(t+i)*2, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Impact explosion at beam tip
        if (beamProgress >= 1) {
          let impX = 42 + beamLen;
          let impR = 15 + Math.sin(t*2)*8;
          ctx.fillStyle = flameColor;
          ctx.globalAlpha = 0.4;
          ctx.beginPath(); ctx.arc(impX, 33+tY, impR*1.5, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;
          ctx.beginPath(); ctx.arc(impX, 33+tY, impR, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(impX, 33+tY, impR*0.4, 0, Math.PI*2); ctx.fill();
        }

        // Character name flash
        ctx.fillStyle = flameColor;
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.isAI ? '斷線衝擊！' : '光纖衝擊波！', 0, -15+tY);
        ctx.textAlign = 'left';
      }
    } else if (this.state === 'block') {
      // Arms crossed in front - guard pose
      ctx.fillStyle = skinColor;
      this.drawLimb(-14, 28+tY+breathe, 2, 32+tY+breathe, 8);
      this.drawLimb(14, 28+tY+breathe, 0, 38+tY+breathe, 8);
      ctx.fillStyle = gloveColor;
      ctx.beginPath(); ctx.arc(2, 32+tY+breathe, 7, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, 38+tY+breathe, 7, 0, Math.PI*2); ctx.fill();

      // === Hexagonal energy shield ===
      let shieldColor = this.isAI ? '#f44' : '#0af';
      let shieldColor2 = this.isAI ? '#f88' : '#8ef';
      let pulse = Math.sin(Date.now()*0.008)*0.3;
      let shieldX = 8, shieldY = 35+tY;
      let shieldR = 32;

      // Shield glow background
      ctx.fillStyle = shieldColor;
      ctx.globalAlpha = 0.1 + pulse*0.1;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        let a = (i/6)*Math.PI*2 - Math.PI/6;
        let hx = shieldX + Math.cos(a)*shieldR;
        let hy = shieldY + Math.sin(a)*shieldR;
        i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
      }
      ctx.closePath(); ctx.fill();

      // Shield hex outline
      ctx.strokeStyle = shieldColor;
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = 0.6 + pulse;
      ctx.stroke();

      // Inner hex grid pattern
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3 + pulse*0.5;
      ctx.strokeStyle = shieldColor2;
      for (let ring = 1; ring <= 2; ring++) {
        let rr = shieldR * ring / 3;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          let a = (i/6)*Math.PI*2 - Math.PI/6;
          let hx = shieldX + Math.cos(a)*rr;
          let hy = shieldY + Math.sin(a)*rr;
          i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
        }
        ctx.closePath(); ctx.stroke();
      }
      // Cross lines
      for (let i = 0; i < 6; i++) {
        let a = (i/6)*Math.PI*2 - Math.PI/6;
        ctx.beginPath();
        ctx.moveTo(shieldX, shieldY);
        ctx.lineTo(shieldX + Math.cos(a)*shieldR, shieldY + Math.sin(a)*shieldR);
        ctx.stroke();
      }

      // Pulsing edge particles
      ctx.globalAlpha = 0.7;
      for (let i = 0; i < 6; i++) {
        let a = (i/6)*Math.PI*2 - Math.PI/6 + Date.now()*0.002;
        let px = shieldX + Math.cos(a)*shieldR;
        let py = shieldY + Math.sin(a)*shieldR;
        ctx.fillStyle = shieldColor2;
        ctx.beginPath(); ctx.arc(px, py, 2+Math.sin(Date.now()*0.01+i)*1.5, 0, Math.PI*2); ctx.fill();
      }

      ctx.globalAlpha = 1;

      // "防禦" text
      if (this.blockStun > 8) {
        ctx.fillStyle = shieldColor;
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.isAI ? '干擾盾！' : '光纖護盾！', 0, -10+tY);
        ctx.textAlign = 'left';
      }
    } else {
      // Fighting stance - fists up (KOF idle pose)
      let bob = breathe;
      // Front arm (raised fist)
      ctx.fillStyle = skinColor;
      this.drawLimb(14, 26+tY+bob, 22, 18+tY+bob, 7);
      ctx.fillStyle = gloveColor;
      ctx.beginPath(); ctx.arc(22, 16+tY+bob, 8, 0, Math.PI*2); ctx.fill();
      // Back arm (guard near chin)
      ctx.fillStyle = skinColor;
      this.drawLimb(-14, 26+tY+bob, -8, 14+tY+bob, 7);
      ctx.fillStyle = gloveColor;
      ctx.beginPath(); ctx.arc(-8, 12+tY+bob, 7, 0, Math.PI*2); ctx.fill();
    }

    // Jacket sleeves on top of arms
    if (this.state !== 'punch' && this.state !== 'special') {
      ctx.fillStyle = jacketColor;
      ctx.fillRect(-22, 22+tY+breathe, 8, 14);
      ctx.fillRect(14, 22+tY+breathe, 8, 14);
    }

    // ===== HEAD =====
    let headY = 2 + tY + breathe;

    // Neck
    ctx.fillStyle = skinColor;
    ctx.fillRect(-5, 12+tY+breathe, 10, 12);

    // Head shape
    ctx.fillStyle = skinColor;
    ctx.beginPath(); ctx.arc(0, headY, 18, 0, Math.PI*2); ctx.fill();
    // Jaw line - slightly angular
    ctx.beginPath();
    ctx.moveTo(-14, headY+5);
    ctx.quadraticCurveTo(-8, headY+20, 0, headY+22);
    ctx.quadraticCurveTo(8, headY+20, 14, headY+5);
    ctx.fill();

    // ===== HAIR / HELMET =====
    if (this.isAI) {
      // 斷線魔皇 - dark horned helmet with red cracks
      ctx.fillStyle = '#1a0505';
      // Helmet base
      ctx.beginPath();
      ctx.arc(0, headY-2, 22, Math.PI, 0);
      ctx.fill();
      // Horns
      ctx.fillStyle = '#440000';
      ctx.beginPath();
      ctx.moveTo(-18, headY-8);
      ctx.lineTo(-28, headY-38);
      ctx.lineTo(-14, headY-18);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(18, headY-8);
      ctx.lineTo(28, headY-38);
      ctx.lineTo(14, headY-18);
      ctx.fill();
      // Red crack lines on helmet
      ctx.strokeStyle = '#cc0000';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, headY-20); ctx.lineTo(-3, headY-10); ctx.lineTo(-8, headY-5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, headY-18); ctx.lineTo(5, headY-8); ctx.stroke();
      // Red eyes glow under helmet
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.ellipse(-6, headY-2, 4, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, headY-2, 4, 3, 0, 0, Math.PI*2); ctx.fill();
      // Broken signal X on chest
      ctx.strokeStyle = '#cc0000';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-8, 32+tY+breathe); ctx.lineTo(8, 48+tY+breathe); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8, 32+tY+breathe); ctx.lineTo(-8, 48+tY+breathe); ctx.stroke();
      // Broken WiFi icon
      ctx.strokeStyle = '#550000';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 52+tY+breathe, 6, -2.5, -0.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 52+tY+breathe, 10, -2.4, -0.7); ctx.stroke();
    } else {
      // 寬頻英雄 - glowing blue visor helmet
      ctx.fillStyle = '#1a3a6a';
      // Helmet base
      ctx.beginPath();
      ctx.arc(0, headY-2, 22, Math.PI, 0);
      ctx.fill();
      // Visor
      ctx.fillStyle = '#0af';
      ctx.beginPath();
      ctx.moveTo(-16, headY-4);
      ctx.quadraticCurveTo(0, headY-8, 16, headY-4);
      ctx.quadraticCurveTo(0, headY+2, -16, headY-4);
      ctx.fill();
      // Visor glow (extra layer)
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(-20, headY-4);
      ctx.quadraticCurveTo(0, headY-12, 20, headY-4);
      ctx.quadraticCurveTo(0, headY+4, -20, headY-4);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Antenna
      ctx.fillStyle = '#0af';
      ctx.fillRect(-2, headY-28, 4, 12);
      ctx.beginPath(); ctx.arc(0, headY-30, 4, 0, Math.PI*2); ctx.fill();
      // Signal waves from antenna
      ctx.strokeStyle = '#0af';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.arc(0, headY-30, 8, -2.2, -0.9); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, headY-30, 13, -2.1, -1.0); ctx.stroke();
      ctx.globalAlpha = 1;
      // WiFi emblem on chest
      ctx.strokeStyle = '#0af';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(0, 52+tY+breathe, 5, -2.5, -0.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 52+tY+breathe, 10, -2.4, -0.7); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 52+tY+breathe, 15, -2.3, -0.8); ctx.stroke();
      ctx.fillStyle = '#0af';
      ctx.beginPath(); ctx.arc(0, 52+tY+breathe, 2, 0, Math.PI*2); ctx.fill();
      // Fiber optic lines on armor
      ctx.strokeStyle = '#4af';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(-18, 28+tY+breathe); ctx.lineTo(-18, 58+tY+breathe); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(18, 28+tY+breathe); ctx.lineTo(18, 58+tY+breathe); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // ===== FACE =====
    if (this.isAI) {
      // 斷線魔皇 - dark face under helmet, glowing red mouth
      ctx.fillStyle = '#0a0202';
      ctx.beginPath();
      ctx.moveTo(-12, headY+4);
      ctx.quadraticCurveTo(0, headY+22, 12, headY+4);
      ctx.fill();
      // Mouth
      if (this.state === 'hit') {
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.ellipse(0, headY+12, 6, 5, 0, 0, Math.PI*2); ctx.fill();
      } else if (this.state === 'special') {
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.ellipse(0, headY+12, 7, 6, 0, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-5, headY+11); ctx.lineTo(5, headY+11); ctx.stroke();
      }
    } else {
      // 寬頻英雄 - lower face visible under visor
      ctx.fillStyle = skinColor;
      // Nose
      ctx.beginPath(); ctx.moveTo(0, headY+2); ctx.lineTo(-2, headY+7); ctx.lineTo(2, headY+7); ctx.fill();
      // Mouth
      if (this.state === 'hit') {
        ctx.fillStyle = '#a00';
        ctx.beginPath(); ctx.ellipse(0, headY+12, 5, 4, 0, 0, Math.PI*2); ctx.fill();
      } else if (this.state === 'special') {
        ctx.fillStyle = '#06a';
        ctx.beginPath(); ctx.ellipse(0, headY+12, 4, 4, 0, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.strokeStyle = '#a05030'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-4, headY+11);
        ctx.quadraticCurveTo(0, headY+14, 5, headY+10);
        ctx.stroke();
      }
    }

    // ===== ENERGY AURA (idle) =====
    if (this.state === 'idle' || this.state === 'walk') {
      let t = Date.now() * 0.003;
      if (this.isAI) {
        // 斷線魔皇 - glitchy red static particles
        for (let i = 0; i < 4; i++) {
          let fx = (Math.sin(t*1.5+i*3)*20);
          let fy = 20+tY + Math.cos(t+i*2)*30;
          ctx.fillStyle = '#f00';
          ctx.globalAlpha = 0.2 + Math.sin(t*3+i)*0.15;
          ctx.fillRect(fx-3, fy-1, 6, 2);
          ctx.fillRect(fx-1, fy-3, 2, 6);
        }
      } else {
        // 寬頻英雄 - flowing cyan data particles around fists
        for (let i = 0; i < 4; i++) {
          let fx = 22 + Math.sin(t+i*2)*5;
          let fy = 14+tY+breathe - i*4 + Math.cos(t+i)*3;
          ctx.fillStyle = '#0af';
          ctx.globalAlpha = 0.4 - i*0.08;
          ctx.beginPath(); ctx.arc(fx, fy, 2.5-i*0.4, 0, Math.PI*2); ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  dashBehind(opponent) {
    if (this.dashCooldown > 0) return;
    // Save current position for trail
    for (let i = 0; i < 4; i++) {
      this.dashTrails.push({
        x: this.x + (opponent.x - this.x) * (i/4),
        y: this.y,
        life: 15,
        maxLife: 15
      });
    }
    // Teleport behind opponent
    let behindDist = 60;
    if (opponent.x > this.x) {
      this.x = opponent.x + behindDist;
    } else {
      this.x = opponent.x - behindDist;
    }
    // Clamp to bounds
    if (this.x < 40) this.x = 40;
    if (this.x > 860) this.x = 860;
    // Set cooldown
    this.dashCooldown = this.dashMaxCooldown;
    playSound('dash');
    // Screen effect
    screenFlash = 5;
    screenFlashColor = this.isAI ? 'rgba(255,0,0,0.2)' : 'rgba(0,200,255,0.2)';
  }

  // Helper: draw a thick limb between two points
  drawLimb(x1, y1, x2, y2, thickness) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    ctx.strokeStyle = ctx.fillStyle;
    ctx.stroke();
  }
}

let p1 = new Fighter(200, '寬頻英雄', '#2255cc', false);
let p2 = new Fighter(700, '斷線魔皇', '#cc2222', true);

function askPlayerName() {
  if (playerName) return true;
  let name = prompt('輸入你的玩家名稱（排行榜顯示）：', '');
  if (name && name.trim()) {
    playerName = name.trim().substring(0, 12);
    localStorage.setItem('fighter_player_name', playerName);
    return true;
  }
  return false;
}

function startRound() {
  // Ask for name on first play
  if (!playerName && !askPlayerName()) return;
  // If match is over (someone got 2 wins), reset everything for new match
  if (p1Wins >= 2 || p2Wins >= 2 || roundNum === 1) {
    p1Wins = 0; p2Wins = 0; roundNum = 1;
    totalDamageDealt = 0; maxCombo = 0; matchStartTime = Date.now();
  }
  gameState = 'fighting'; timer = 99;
  initAudio(); playSound('start');
  p1.reset(200); p2.reset(700);
  comboTexts = []; hitSparks = []; energyTrails = []; koTimer = 0;
  showingVictory = false; victoryTimer = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (gameState === 'fighting') { timer--; if (timer <= 0) { timer = 0; endRound(); } }
  }, 1000);
}

function endRound() {
  gameState = 'ko'; koTimer = 200;
  if (p1.hp > p2.hp) p1Wins++; else if (p2.hp > p1.hp) p2Wins++;
  if (timerInterval) clearInterval(timerInterval);
  // Big screen flash on KO
  screenFlash = 20;
  screenFlashColor = 'rgba(255,255,255,0.6)';
  shakeScreen = 25;
  playSound('ko');
}

function showVictoryScreen() {
  if (showingVictory) return;
  showingVictory = true;
  victoryTimer = 0;
  let matchTime = Math.floor((Date.now() - matchStartTime) / 1000);
  let playerWon = p1Wins >= 2;
  let score = 0;
  if (playerWon) {
    score = p1.hp * 100 + maxCombo * 500 + Math.max(0, (300 - matchTime)) * 10 + totalDamageDealt * 5;
    saveScore(playerName || '寬頻英雄', score, p1.hp, maxCombo, matchTime);
    submitGlobalScore(playerName || '寬頻英雄', p1.hp, maxCombo, matchTime, totalDamageDealt, score);
    showShareScore(score, p1.hp, maxCombo);
  }
  // Store for drawing
  window._victoryData = { playerWon, score, hp: p1.hp, combo: maxCombo, time: matchTime, dmg: totalDamageDealt };
}

function drawVictoryScreen() {
  let d = window._victoryData;
  if (!d) return;
  victoryTimer++;
  let alpha = Math.min(1, victoryTimer / 40);

  // Dark overlay
  ctx.fillStyle = `rgba(0,0,0,${alpha * 0.85})`;
  ctx.fillRect(0, 0, 900, 600);
  ctx.textAlign = 'center';

  if (victoryTimer < 10) return;

  if (d.playerWon) {
    // === PLAYER WINS ===
    // Glow effect
    let glowSize = 100 + Math.sin(victoryTimer * 0.05) * 20;
    let grd = ctx.createRadialGradient(450, 200, 0, 450, 200, glowSize);
    grd.addColorStop(0, 'rgba(0,170,255,0.3)');
    grd.addColorStop(1, 'rgba(0,170,255,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(250, 100, 400, 200);

    // Victory particles
    for (let i = 0; i < 20; i++) {
      let px = 450 + Math.sin(victoryTimer*0.02 + i*0.6) * (150 + i*5);
      let py = 300 + Math.cos(victoryTimer*0.025 + i*0.8) * (100 + i*3);
      ctx.fillStyle = `hsl(${190 + i*5}, 100%, ${60 + Math.sin(victoryTimer*0.03+i)*20}%)`;
      ctx.globalAlpha = 0.5 + Math.sin(victoryTimer*0.04+i)*0.3;
      ctx.beginPath(); ctx.arc(px, py, 3+Math.sin(victoryTimer*0.05+i)*2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Title
    let titleScale = Math.min(1, (victoryTimer-10)/20);
    ctx.fillStyle = '#0af';
    ctx.font = `bold ${48*titleScale}px Arial`;
    ctx.strokeStyle = '#0af'; ctx.lineWidth = 4; ctx.globalAlpha = 0.5;
    ctx.strokeText('全港網絡已守護！', 450, 140);
    ctx.globalAlpha = 1;
    ctx.fillText('全港網絡已守護！', 450, 140);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px Arial';
    ctx.fillText('寬頻英雄 勝利！', 450, 190);

    // Stats panel
    if (victoryTimer > 30) {
      let panelAlpha = Math.min(1, (victoryTimer-30)/20);
      ctx.globalAlpha = panelAlpha;
      // Panel background
      ctx.fillStyle = 'rgba(0,50,100,0.5)';
      ctx.strokeStyle = '#0af';
      ctx.lineWidth = 2;
      let px = 250, py = 220, pw = 400, ph = 200;
      ctx.fillRect(px, py, pw, ph);
      ctx.strokeRect(px, py, pw, ph);

      ctx.fillStyle = '#0af'; ctx.font = 'bold 20px Arial';
      ctx.fillText('- 戰鬥統計 -', 450, 250);

      ctx.font = '18px Arial'; ctx.fillStyle = '#fff';
      let sy = 280;
      ctx.fillText(`剩餘血量: ${d.hp}%`, 450, sy);
      ctx.fillText(`最高連擊: ${d.combo} HIT`, 450, sy+30);
      ctx.fillText(`總傷害量: ${d.dmg}`, 450, sy+60);
      ctx.fillText(`用時: ${d.time} 秒`, 450, sy+90);

      // Score
      ctx.fillStyle = '#ff0';
      ctx.font = 'bold 26px Arial';
      ctx.fillText(`總分: ${d.score.toLocaleString()}`, 450, sy+130);

      ctx.globalAlpha = 1;
    }

    // Leaderboard
    if (victoryTimer > 60) {
      let lbAlpha = Math.min(1, (victoryTimer-60)/20);
      ctx.globalAlpha = lbAlpha;
      // Global leaderboard
      let glb = globalLeaderboard;
      if (glb.length > 0) {
        ctx.fillStyle = '#0af'; ctx.font = 'bold 16px Arial';
        ctx.fillText('🌍 全球排行榜 TOP ' + Math.min(glb.length, 5), 450, 455);
        ctx.font = '13px Arial';
        for (let i = 0; i < Math.min(glb.length, 5); i++) {
          let entry = glb[i];
          ctx.fillStyle = i === 0 ? '#ff0' : '#ccc';
          ctx.fillText(`#${i+1}  ${entry.name}  ${entry.score.toLocaleString()} 分  ${entry.details || ''}  ${entry.date}`, 450, 475 + i*17);
        }
      } else {
        // Fallback to local
        let lb = getLeaderboard();
        if (lb.length > 0) {
          ctx.fillStyle = '#ff6600'; ctx.font = 'bold 16px Arial';
          ctx.fillText('排行榜 TOP ' + Math.min(lb.length, 5), 450, 455);
          ctx.font = '13px Arial';
          for (let i = 0; i < Math.min(lb.length, 5); i++) {
            ctx.fillStyle = '#aaa';
            ctx.fillText(`#${i+1}  ${lb[i].score.toLocaleString()} 分  (血量${lb[i].hp}% 連擊${lb[i].combo})  ${lb[i].date}`, 450, 475 + i*17);
          }
        }
      }
      ctx.globalAlpha = 1;
    }
  } else {
    // === PLAYER LOSES ===
    // Red glitch effect
    for (let i = 0; i < 10; i++) {
      ctx.fillStyle = `rgba(255,0,0,${0.05 + Math.sin(victoryTimer*0.1+i)*0.03})`;
      ctx.fillRect(Math.sin(victoryTimer*0.5+i)*400+50, i*60, 800, 3);
    }

    let titleScale = Math.min(1, (victoryTimer-10)/20);
    ctx.fillStyle = '#f00';
    ctx.font = `bold ${48*titleScale}px Arial`;
    ctx.strokeStyle = '#f00'; ctx.lineWidth = 4; ctx.globalAlpha = 0.5;
    ctx.strokeText('全港斷線！', 450, 180);
    ctx.globalAlpha = 1;
    ctx.fillText('全港斷線！', 450, 180);

    ctx.fillStyle = '#f88'; ctx.font = 'bold 28px Arial';
    ctx.fillText('斷線魔皇 勝利...', 450, 230);

    ctx.fillStyle = '#aaa'; ctx.font = '18px Arial';
    ctx.fillText('網絡被破壞了...再試一次吧！', 450, 280);

    // Show global leaderboard
    if (victoryTimer > 40) {
      let glb = globalLeaderboard;
      if (glb.length > 0) {
        ctx.fillStyle = '#0af'; ctx.font = 'bold 16px Arial';
        ctx.fillText('🌍 全球排行榜 TOP ' + Math.min(glb.length, 5), 450, 340);
        ctx.font = '13px Arial';
        for (let i = 0; i < Math.min(glb.length, 5); i++) {
          ctx.fillStyle = i === 0 ? '#ff0' : '#888';
          ctx.fillText(`#${i+1}  ${glb[i].name}  ${glb[i].score.toLocaleString()} 分  ${glb[i].details || ''}`, 450, 360 + i*17);
        }
      } else {
        let lb = getLeaderboard();
        if (lb.length > 0) {
          ctx.fillStyle = '#ff6600'; ctx.font = 'bold 16px Arial';
          ctx.fillText('排行榜 TOP ' + Math.min(lb.length, 5), 450, 340);
          ctx.font = '13px Arial';
          for (let i = 0; i < Math.min(lb.length, 5); i++) {
            ctx.fillStyle = '#888';
            ctx.fillText(`#${i+1}  ${lb[i].score.toLocaleString()} 分  (血量${lb[i].hp}%)  ${lb[i].date}`, 450, 360 + i*17);
          }
        }
      }
    }
  }

  // Restart prompt
  if (victoryTimer > 80) {
    if (Math.sin(Date.now()*0.005) > 0) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial';
      ctx.fillText('按 SPACE 重新挑戰', 450, 570);
    }
  }
  ctx.textAlign = 'left';
}

function rectCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function checkAttack(attacker, defender) {
  let atk = attacker.getAttackBox();
  if (atk && !attacker.attackHit) {
    let def = defender.getHitbox();
    if (rectCollision(atk, def)) {
      attacker.attackHit = true;
      defender.takeDamage(atk.dmg, atk.type, attacker);
      if (defender.hp <= 0) endRound();
    }
  }
}

function drawBackground() {
  // Clear entire canvas first
  ctx.clearRect(0, 0, 900, 600);
  // Sky - fill full height as base
  let grad = ctx.createLinearGradient(0, 0, 0, 530);
  grad.addColorStop(0, '#1a0a2e'); grad.addColorStop(0.5, '#2d1b4e'); grad.addColorStop(1, '#4a2c6e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 900, 530);

  // Buildings with pre-calculated windows (no flickering)
  for (let bi = 0; bi < buildings.length; bi++) {
    let b = buildings[bi];
    ctx.fillStyle = '#0d0620';
    ctx.fillRect(b[0], b[1], b[2], b[3]);
    let wins = windowData[bi];
    for (let w of wins) {
      ctx.fillStyle = w.lit ? '#ffa' : '#553';
      ctx.fillRect(w.x, w.y, 6, 8);
    }
  }

  // Ground
  let groundGrad = ctx.createLinearGradient(0, 530, 0, 600);
  groundGrad.addColorStop(0, '#3a3a3a'); groundGrad.addColorStop(1, '#222');
  ctx.fillStyle = groundGrad; ctx.fillRect(0, 530, 900, 70);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, 530); ctx.lineTo(900, 530); ctx.stroke();

  // Stars (deterministic)
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 30; i++) {
    let sx = (i*137+50)%900, sy = (i*89+20)%250;
    ctx.globalAlpha = Math.sin(Date.now()*0.002+i)*0.5+0.5;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Moon
  // Moon with glow (no shadowBlur)
  ctx.fillStyle = 'rgba(255,232,160,0.15)';
  ctx.beginPath(); ctx.arc(780, 80, 55, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,232,160,0.3)';
  ctx.beginPath(); ctx.arc(780, 80, 42, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe8a0';
  ctx.beginPath(); ctx.arc(780, 80, 35, 0, Math.PI*2); ctx.fill();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, 900, 55);
  // P1 HP
  let p1HpW = 350*(p1.hp/p1.maxHp);
  ctx.fillStyle = '#333'; ctx.fillRect(40, 12, 350, 22);
  ctx.fillStyle = p1.hp > 50 ? '#0c0' : p1.hp > 25 ? '#fc0' : '#f00';
  ctx.fillRect(40, 12, p1HpW, 22);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(40, 12, 350, 22);
  // P2 HP
  let p2HpW = 350*(p2.hp/p2.maxHp);
  ctx.fillStyle = '#333'; ctx.fillRect(510, 12, 350, 22);
  ctx.fillStyle = p2.hp > 50 ? '#0c0' : p2.hp > 25 ? '#fc0' : '#f00';
  ctx.fillRect(510+350-p2HpW, 12, p2HpW, 22);
  ctx.strokeStyle = '#fff'; ctx.strokeRect(510, 12, 350, 22);
  // P1 Special
  let p1SpW = 120*(p1.special/p1.maxSpecial);
  ctx.fillStyle = '#222'; ctx.fillRect(40, 38, 120, 8);
  ctx.fillStyle = p1.special >= 50 ? '#0ff' : '#066'; ctx.fillRect(40, 38, p1SpW, 8);
  if (p1.special >= 50) { ctx.fillStyle = '#0ff'; ctx.font = '10px Arial'; ctx.fillText('必殺 READY!', 42, 55); }
  // P2 Special
  let p2SpW = 120*(p2.special/p2.maxSpecial);
  ctx.fillStyle = '#222'; ctx.fillRect(740, 38, 120, 8);
  ctx.fillStyle = p2.special >= 50 ? '#f44' : '#600'; ctx.fillRect(740+120-p2SpW, 38, p2SpW, 8);
  if (p2.special >= 50) { ctx.fillStyle = '#f44'; ctx.font = '10px Arial'; ctx.textAlign = 'right'; ctx.fillText('必殺 READY!', 858, 55); ctx.textAlign = 'left'; }
  // Timer
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
  ctx.fillText(timer.toString().padStart(2,'0'), 450, 36);
  // Names
  ctx.font = 'bold 14px Arial'; ctx.fillStyle = '#4af'; ctx.textAlign = 'left';
  ctx.fillText(`P1 ${p1.name}`, 42, 8);
  ctx.fillStyle = '#f44'; ctx.textAlign = 'right'; ctx.fillText(`CPU ${p2.name}`, 858, 8);
  // Round wins (BO3 dots)
  ctx.textAlign = 'left';
  for (let i = 0; i < 2; i++) {
    ctx.fillStyle = i < p1Wins ? '#0f0' : '#333';
    ctx.beginPath(); ctx.arc(45+i*16, 53, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.stroke();
  }
  for (let i = 0; i < 2; i++) {
    ctx.fillStyle = i < p2Wins ? '#f00' : '#333';
    ctx.beginPath(); ctx.arc(855-i*16, 53, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.stroke();
  }
  // Dash cooldown indicator (P1)
  let dashReady = p1.dashCooldown <= 0;
  let dashPct = dashReady ? 1 : 1 - (p1.dashCooldown / p1.dashMaxCooldown);
  ctx.fillStyle = '#222'; ctx.fillRect(170, 38, 60, 8);
  ctx.fillStyle = dashReady ? '#0f0' : '#555';
  ctx.fillRect(170, 38, 60 * dashPct, 8);
  ctx.fillStyle = dashReady ? '#0f0' : '#666';
  ctx.font = '9px Arial';
  ctx.fillText(dashReady ? '閃現 OK' : '閃現 CD', 172, 55);
  ctx.textAlign = 'left';
}

function drawTitle() {
  ctx.save(); ctx.clearRect(0, 0, 900, 600); ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 900, 600);
  for (let i = 0; i < 50; i++) {
    ctx.fillStyle = `hsl(${(Date.now()*0.05+i*20)%360}, 80%, 50%)`; ctx.globalAlpha = 0.05;
    let x = Math.sin(Date.now()*0.001+i)*400+450, y = Math.cos(Date.now()*0.001+i*0.7)*250+300;
    ctx.fillRect(x-100, y-100, 200, 200);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'center';
  ctx.fillStyle = '#000'; ctx.font = 'bold 52px Arial'; ctx.fillText('寬頻英雄大戰斷線魔皇', 453, 183);
  let tg = ctx.createLinearGradient(100, 150, 800, 200);
  tg.addColorStop(0, '#0088ff'); tg.addColorStop(0.5, '#00ddff'); tg.addColorStop(1, '#0088ff');
  ctx.fillStyle = tg; ctx.font = 'bold 52px Arial'; ctx.fillText('寬頻英雄大戰斷線魔皇', 450, 180);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial'; ctx.fillText('BROADBAND HERO vs DISCONNECT DEVIL', 450, 220);
  ctx.fillStyle = '#888'; ctx.font = '16px Arial'; ctx.fillText('守護全港網絡！擊敗斷線魔皇！', 450, 250);
  ctx.fillStyle = '#0af'; ctx.font = 'bold 32px Arial'; ctx.fillText('寬頻英雄', 250, 360);
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 48px Arial'; ctx.fillText('VS', 450, 370);
  ctx.fillStyle = '#f44'; ctx.font = 'bold 32px Arial'; ctx.fillText('斷線魔皇 (CPU)', 650, 360);
  if (Math.sin(Date.now()*0.005) > 0) {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial';
    ctx.fillText('按 SPACE 或點擊畫面開始', 450, 480);
  }
  ctx.font = '16px Arial'; ctx.fillStyle = '#888'; ctx.fillText('PRESS SPACE / TAP TO START', 450, 510);
  if (playerName) {
    ctx.fillStyle = '#0af'; ctx.font = 'bold 16px Arial';
    ctx.fillText('玩家: ' + playerName, 450, 540);
    ctx.fillStyle = '#666'; ctx.font = '12px Arial';
    ctx.fillText('（按 N 改名）', 450, 558);
  }
  ctx.fillStyle = '#555'; ctx.font = '12px Arial'; ctx.fillText('broadbandhk.com', 450, 580);
  ctx.textAlign = 'left'; ctx.restore();
}

function drawKO() {
  ctx.save(); ctx.textAlign = 'center';
  let winner = p1.hp > p2.hp ? p1 : p2;
  let elapsed = 200 - koTimer;
  let scale = Math.min(1, elapsed/15);

  // Dramatic slowmo dark overlay
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.4, elapsed*0.01)})`;
  ctx.fillRect(0, 0, 900, 600);

  // K.O. text with glow
  let koColor = winner === p1 ? '#0af' : '#f00';
  ctx.fillStyle = koColor;
  ctx.font = `bold ${Math.min(120, 120*scale)}px Arial`;
  // KO text outline glow
  ctx.strokeStyle = koColor;
  ctx.lineWidth = 6;
  ctx.globalAlpha = 0.5;
  ctx.strokeText('K.O.!', 450, 260);
  ctx.globalAlpha = 1;
  ctx.fillText('K.O.!', 450, 260);

  // Impact lines radiating from center
  if (elapsed < 30) {
    ctx.strokeStyle = '#fff';
    ctx.globalAlpha = 1 - elapsed/30;
    ctx.lineWidth = 3;
    for (let i = 0; i < 12; i++) {
      let a = (i/12)*Math.PI*2;
      let r1 = elapsed * 8;
      let r2 = r1 + 60;
      ctx.beginPath();
      ctx.moveTo(450+Math.cos(a)*r1, 230+Math.sin(a)*r1);
      ctx.lineTo(450+Math.cos(a)*r2, 230+Math.sin(a)*r2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  if (elapsed > 40) {
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 36px Arial';
    ctx.fillText(`${winner.name} 勝利!`, 450, 320);

    // Round score display
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial';
    ctx.fillText(`ROUND ${roundNum}`, 450, 360);

    // Score circles: P1 vs P2
    ctx.font = 'bold 18px Arial';
    ctx.fillStyle = '#0af';
    ctx.fillText('寬頻英雄', 300, 395);
    ctx.fillStyle = '#f44';
    ctx.fillText('斷線魔皇', 600, 395);

    // Win dots
    for (let i = 0; i < 2; i++) {
      // P1 dots
      ctx.fillStyle = i < p1Wins ? '#0f0' : '#333';
      ctx.beginPath(); ctx.arc(280 + i*30, 415, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.stroke();
      // P2 dots
      ctx.fillStyle = i < p2Wins ? '#f00' : '#333';
      ctx.beginPath(); ctx.arc(580 + i*30, 415, 10, 0, Math.PI*2); ctx.fill();
      ctx.stroke();
    }

    // VS text
    ctx.fillStyle = '#ff6600'; ctx.font = 'bold 26px Arial';
    ctx.fillText(`${p1Wins} - ${p2Wins}`, 450, 420);

    if (p1Wins >= 2 || p2Wins >= 2) {
      // Match over
      ctx.fillStyle = p1Wins >= 2 ? '#0af' : '#f44';
      ctx.font = 'bold 24px Arial';
      ctx.fillText(p1Wins >= 2 ? '全港網絡已守護！' : '全港斷線...', 450, 460);
    } else {
      // Next round prompt
      if (Math.sin(Date.now()*0.005) > 0) {
        ctx.fillStyle = '#aaa'; ctx.font = '20px Arial';
        ctx.fillText('按 SPACE 或點擊畫面 → 下一回合', 450, 470);
      }
    }
  }
  ctx.textAlign = 'left'; ctx.restore();
}

function gameLoop() {
  ctx.save();
  if (shakeScreen > 0) {
    ctx.translate((Math.random()-0.5)*shakeScreen*2, (Math.random()-0.5)*shakeScreen*2);
    shakeScreen *= 0.9;
    if (shakeScreen < 0.5) shakeScreen = 0;
  }
  if (gameState === 'title') { drawTitle(); ctx.restore(); requestAnimationFrame(gameLoop); return; }
  if (gameState === 'victory' && showingVictory) {
    drawBackground(); p1.draw(); p2.draw(); drawHUD();
    drawVictoryScreen();
    ctx.restore(); requestAnimationFrame(gameLoop); return;
  }
  drawBackground();
  if (gameState === 'fighting') {
    p1.update(p2); p2.update(p1);
    checkAttack(p1, p2); checkAttack(p2, p1);
    let dist = Math.abs(p1.x - p2.x);
    if (dist < 50) {
      let push = (50-dist)/2;
      if (p1.x < p2.x) { p1.x -= push; p2.x += push; } else { p1.x += push; p2.x -= push; }
    }
  }
  if (gameState === 'ko') {
    koTimer--;
    if (koTimer <= 0) {
      if (p1Wins >= 2 || p2Wins >= 2) {
        // Match over! Show final victory screen
        gameState = 'victory';
        showVictoryScreen();
      } else {
        // Round over, wait for player to start next round
        gameState = 'victory';
        roundNum++;
        // Don't set showingVictory — KO screen shows score + "next round" prompt
      }
    }
  }
  p1.draw(); p2.draw();

  // Hit sparks (no shadowBlur for performance)
  for (let i = hitSparks.length-1; i >= 0; i--) {
    let s = hitSparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.3; s.vx *= 0.97; s.life--;
    let alpha = s.life / 35;
    ctx.globalAlpha = alpha;
    if (s.type === 'ring') {
      let r = Math.max(0.1, (35 - s.life) * 3);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.stroke();
    } else {
      let sz = Math.max(0.1, (s.size || 3) * (s.life / 35));
      // Outer glow (larger, transparent)
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath(); ctx.arc(s.x, s.y, sz*1.8, 0, Math.PI*2); ctx.fill();
      // Core
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x, s.y, sz*0.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(s.x, s.y, sz, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (s.life <= 0) hitSparks.splice(i, 1);
  }

  // Energy trails (no shadowBlur)
  for (let i = energyTrails.length-1; i >= 0; i--) {
    let t = energyTrails[i]; t.life--;
    let a = Math.max(0, t.life / 30);
    let r = Math.max(0.1, t.size*(t.life/30));
    let ty = t.y + Math.sin(t.life*0.3)*5;
    ctx.fillStyle = t.color;
    ctx.globalAlpha = a * 0.3;
    ctx.beginPath(); ctx.arc(t.x, ty, r*2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(t.x, ty, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    if (t.life <= 0) energyTrails.splice(i, 1);
  }

  // Combo texts
  for (let i = comboTexts.length-1; i >= 0; i--) {
    let ct = comboTexts[i]; ct.y -= 0.6; ct.life--;
    let alpha = ct.life / 80;
    let bounce = ct.life > 60 ? 1 + Math.sin((80-ct.life)*0.3)*0.3 : 1;
    let fs = `bold ${(ct.size||24)*bounce}px Arial`;
    // Text outline for glow effect (no shadowBlur)
    ctx.font = fs;
    ctx.textAlign = 'center';
    ctx.globalAlpha = alpha * 0.4;
    ctx.strokeStyle = ct.color;
    ctx.lineWidth = 4;
    ctx.strokeText(ct.text, ct.x, ct.y);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.fillText(ct.text, ct.x, ct.y);
    ctx.textAlign = 'left'; ctx.globalAlpha = 1;
    if (ct.life <= 0) comboTexts.splice(i, 1);
  }

  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = screenFlashColor;
    ctx.globalAlpha = screenFlash / 20;
    ctx.fillRect(0, 0, 900, 600);
    ctx.globalAlpha = 1;
    screenFlash--;
  }

  drawHUD();
  if (gameState === 'ko') drawKO();
  if (gameState === 'fighting') {
    ctx.fillStyle = '#fff'; ctx.font = '14px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`ROUND ${roundNum}`, 450, 65); ctx.textAlign = 'left';
  }
  ctx.restore();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
