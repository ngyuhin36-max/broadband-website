<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let gameState = 'title';
let timer = 99;
let timerInterval = null;
let roundNum = 1;
let p1Wins = 0;
let p2Wins = 0;
let koTimer = 0;
let shakeScreen = 0;
let comboTexts = [];
let hitSparks = [];

// Pre-calculate window positions to avoid flickering
const buildings = [
  [0,250,60,150],[55,220,50,180],[100,280,70,120],[165,200,45,200],[205,260,55,140],
  [255,230,40,170],[290,270,65,130],[350,210,50,190],[395,250,45,150],[435,190,55,210],
  [485,240,60,160],[540,220,40,180],[575,260,55,140],[625,200,45,200],[665,270,50,130],
  [710,230,60,170],[765,250,50,150],[810,210,45,190],[850,240,55,160]
];
const windowData = [];
function seedRandom(s) { return function() { s = Math.sin(s) * 10000; return s - Math.floor(s); }; }
(function buildWindows() {
  const rng = seedRandom(42);
  for (let b of buildings) {
    let wins = [];
    for (let wy = b[1]+10; wy < b[1]+b[3]-10; wy += 18) {
      for (let wx = b[0]+8; wx < b[0]+b[2]-8; wx += 14) {
        if (rng() > 0.4) {
          wins.push({ x: wx, y: wy, lit: rng() > 0.7 });
        }
      }
    }
    windowData.push(wins);
  }
})();

const keys = {};
window.addEventListener('keydown', e => {
  if (e.key === ' ' && (gameState === 'title' || gameState === 'victory')) startRound();
  keys[e.key.toLowerCase()] = true;
  if ([' ','w','a','s','d','f','g','h','r'].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

class Fighter {
  constructor(x, name, color, isAI) {
    this.x = x; this.y = 420; this.groundY = 420;
    this.name = name; this.color = color; this.isAI = isAI;
    this.width = 60; this.height = 110;
    this.hp = 100; this.maxHp = 100;
    this.special = 0; this.maxSpecial = 100;
    this.vx = 0; this.vy = 0;
    this.facing = isAI ? -1 : 1;
    this.state = 'idle'; this.stateTimer = 0;
    this.attackHit = false;
    this.comboCount = 0; this.comboTimer = 0;
    this.blocking = false;
    this.animFrame = 0; this.animTimer = 0;
    this.hitStun = 0; this.blockStun = 0;
    // AI
    this.aiTimer = 0;
    this.aiAction = 'idle';
    this.aiReactTime = 0;
  }
  reset(x) {
    this.x = x; this.y = this.groundY;
    this.hp = this.maxHp; this.special = 0;
    this.vx = 0; this.vy = 0;
    this.state = 'idle'; this.stateTimer = 0;
    this.comboCount = 0; this.comboTimer = 0;
    this.hitStun = 0; this.blockStun = 0;
    this.aiTimer = 0; this.aiAction = 'idle';
  }
  getHitbox() {
    let h = this.state === 'crouch' ? 70 : this.height;
    let y = this.state === 'crouch' ? this.groundY + 40 : this.y;
    return { x: this.x - 25, y, w: 50, h };
  }
  getAttackBox() {
    if (this.state === 'punch' && this.stateTimer >= 4 && this.stateTimer <= 10)
      return { x: this.x + this.facing * 30, y: this.y + 15, w: 45, h: 25, dmg: 8, type: 'punch' };
    if (this.state === 'kick' && this.stateTimer >= 6 && this.stateTimer <= 14)
      return { x: this.x + this.facing * 25, y: this.y + 50, w: 55, h: 30, dmg: 12, type: 'kick' };
    if (this.state === 'special' && this.stateTimer === 10)
      return { x: this.x + this.facing * 20, y: this.y, w: 60, h: 80, dmg: 25, type: 'special' };
    return null;
  }

  aiUpdate(opponent) {
    this.aiTimer++;
    let dist = Math.abs(this.x - opponent.x);
    let facingOpponent = (opponent.x > this.x && this.facing === 1) || (opponent.x < this.x && this.facing === -1);

    // Decide new action every 20-40 frames
    if (this.aiTimer > 20 + Math.random() * 20) {
      this.aiTimer = 0;
      let r = Math.random();

      // If opponent is attacking, try to block
      if (opponent.state === 'punch' || opponent.state === 'kick' || opponent.state === 'special') {
        if (r < 0.5) { this.aiAction = 'block'; return; }
      }

      if (dist < 80) {
        // Close range - attack
        if (this.special >= 50 && r < 0.15) this.aiAction = 'special';
        else if (r < 0.4) this.aiAction = 'punch';
        else if (r < 0.7) this.aiAction = 'kick';
        else if (r < 0.85) this.aiAction = 'block';
        else this.aiAction = 'back';
      } else if (dist < 200) {
        // Mid range - approach or attack
        if (r < 0.5) this.aiAction = 'approach';
        else if (r < 0.7) this.aiAction = 'jump_attack';
        else if (this.special >= 50 && r < 0.8) this.aiAction = 'special';
        else this.aiAction = 'approach';
      } else {
        // Far - approach
        if (r < 0.7) this.aiAction = 'approach';
        else if (r < 0.85) this.aiAction = 'jump_approach';
        else this.aiAction = 'idle';
      }
    }

    // Execute AI action
    let moveDir = opponent.x > this.x ? 1 : -1;
    switch (this.aiAction) {
      case 'approach':
        this.vx = moveDir * 4;
        this.state = 'walk';
        break;
      case 'back':
        this.vx = -moveDir * 3.5;
        this.state = 'walk';
        break;
      case 'punch':
        if (dist < 90 && this.y >= this.groundY) {
          this.state = 'punch'; this.stateTimer = 0; this.attackHit = false; this.vx = 0;
          this.aiAction = 'idle';
        } else {
          this.vx = moveDir * 4; this.state = 'walk';
        }
        break;
      case 'kick':
        if (dist < 100 && this.y >= this.groundY) {
          this.state = 'kick'; this.stateTimer = 0; this.attackHit = false; this.vx = 0;
          this.aiAction = 'idle';
        } else {
          this.vx = moveDir * 4; this.state = 'walk';
        }
        break;
      case 'special':
        if (dist < 120 && this.special >= 50) {
          this.state = 'special'; this.stateTimer = 0; this.attackHit = false;
          this.special -= 50; this.vx = 0; shakeScreen = 10;
          this.aiAction = 'idle';
        } else {
          this.vx = moveDir * 4; this.state = 'walk';
        }
        break;
      case 'block':
        this.blocking = true; this.state = 'block'; this.vx = 0;
        break;
      case 'jump_attack':
        if (this.y >= this.groundY) { this.vy = -15; this.vx = moveDir * 3; }
        this.aiAction = 'punch';
        break;
      case 'jump_approach':
        if (this.y >= this.groundY) { this.vy = -14; this.vx = moveDir * 4; }
        this.aiAction = 'approach';
        break;
      default:
        this.vx = 0; this.state = 'idle';
    }
  }

  update(opponent) {
    this.animTimer++;
    if (this.animTimer > 8) { this.animTimer = 0; this.animFrame++; }
    if (this.comboTimer > 0) { this.comboTimer--; if (this.comboTimer <= 0) this.comboCount = 0; }
    if (this.hitStun > 0) {
      this.hitStun--;
      if (this.hitStun <= 0) this.state = 'idle';
      this.y += this.vy; this.vy += 0.8;
      if (this.y >= this.groundY) { this.y = this.groundY; this.vy = 0; }
      return;
    }
    if (this.blockStun > 0) {
      this.blockStun--;
      if (this.blockStun <= 0) this.state = 'idle';
      return;
    }
    if (this.state === 'punch' || this.state === 'kick' || this.state === 'special') {
      this.stateTimer++;
      let dur = this.state === 'punch' ? 18 : this.state === 'kick' ? 22 : 30;
      if (this.stateTimer >= dur) { this.state = 'idle'; this.stateTimer = 0; this.attackHit = false; }
      if (this.y < this.groundY) { this.vy += 0.8; this.y += this.vy; if (this.y >= this.groundY) { this.y = this.groundY; this.vy = 0; } }
      return;
    }
    this.vy += 0.8; this.y += this.vy;
    if (this.y >= this.groundY) { this.y = this.groundY; this.vy = 0; }
    if (opponent.x > this.x) this.facing = 1; else this.facing = -1;

    this.vx = 0; this.state = 'idle'; this.blocking = false;

    if (this.isAI) {
      this.aiUpdate(opponent);
    } else {
      // Player input
      let speed = 4.5;
      if (keys['r']) { this.blocking = true; this.state = 'block'; }
      if (keys['s']) { this.state = 'crouch'; }
      else if (keys['a']) { this.vx = -speed; this.state = 'walk'; }
      else if (keys['d']) { this.vx = speed; this.state = 'walk'; }
      if (keys['w'] && this.y >= this.groundY) { this.vy = -16; this.state = 'jump'; }
      if (this.y < this.groundY) this.state = 'jump';
      if (keys['f'] && this.y >= this.groundY) { this.state = 'punch'; this.stateTimer = 0; this.attackHit = false; this.vx = 0; }
      if (keys['g'] && this.y >= this.groundY) { this.state = 'kick'; this.stateTimer = 0; this.attackHit = false; this.vx = 0; }
      if (keys['h'] && this.special >= 50) { this.state = 'special'; this.stateTimer = 0; this.attackHit = false; this.special -= 50; this.vx = 0; shakeScreen = 10; }
    }

    this.x += this.vx;
    if (this.x < 40) this.x = 40;
    if (this.x > 860) this.x = 860;
    if (this.y < this.groundY) this.state = 'jump';
    if (this.special < this.maxSpecial) this.special += 0.05;
  }

  takeDamage(dmg, attackType, attacker) {
    if (this.blocking) {
      this.blockStun = 12; this.state = 'block';
      this.hp -= Math.floor(dmg * 0.15);
      this.x -= this.facing * 15;
      return;
    }
    this.hp -= dmg;
    this.hitStun = attackType === 'special' ? 25 : 15;
    this.state = 'hit';
    let kb = attackType === 'special' ? 12 : attackType === 'kick' ? 8 : 5;
    this.x -= this.facing * kb;
    if (attackType === 'special') this.vy = -8;
    attacker.special = Math.min(attacker.maxSpecial, attacker.special + dmg * 0.5);
    attacker.comboCount++; attacker.comboTimer = 60;
    shakeScreen = attackType === 'special' ? 15 : 5;
    let sparkX = (this.x + attacker.x) / 2, sparkY = this.y + 30;
    for (let i = 0; i < (attackType === 'special' ? 20 : 8); i++) {
      hitSparks.push({ x: sparkX, y: sparkY, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 15+Math.random()*10, color: attackType === 'special' ? `hsl(${Math.random()*60}, 100%, 70%)` : '#fff' });
    }
    if (attacker.comboCount > 1) {
      comboTexts.push({ text: `${attacker.comboCount} HIT COMBO!`, x: this.x, y: this.y - 40, life: 60, color: attacker.comboCount >= 5 ? '#ff0' : '#fff' });
    }
    if (this.hp <= 0) { this.hp = 0; this.state = 'ko'; }
  }

  draw() {
    ctx.save();
    let drawY = this.state === 'crouch' ? this.y + 40 : this.y;
    let bodyColor = this.color, skinColor = '#ffd4a0';
    let hairColor = this.isAI ? '#222' : '#ffa500';
    let pantsColor = this.isAI ? '#333' : '#fff';
    let breathe = Math.sin(this.animTimer * 0.15) * 2;
    let walkBob = this.state === 'walk' ? Math.sin(this.animFrame * 1.2) * 3 : 0;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(this.x, this.groundY + this.height, 30, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.translate(this.x, drawY);
    if (this.facing === -1) ctx.scale(-1, 1);
    if (this.state === 'ko') ctx.rotate(Math.PI / 2);
    if (this.state === 'hit' && this.hitStun % 4 < 2) ctx.globalAlpha = 0.6;
    if (this.state === 'block') ctx.translate(-5, 0);
    // Legs
    ctx.fillStyle = pantsColor;
    if (this.state === 'walk') {
      ctx.fillRect(-12, 70 + walkBob, 12, 40); ctx.fillStyle = skinColor; ctx.fillRect(-10, 95 + walkBob, 12, 18); ctx.fillStyle = pantsColor;
      ctx.fillRect(2, 70 - walkBob, 12, 40); ctx.fillStyle = skinColor; ctx.fillRect(4, 95 - walkBob, 12, 18);
    } else if (this.state === 'kick' && this.stateTimer >= 4 && this.stateTimer <= 14) {
      ctx.fillRect(-12, 70, 12, 40); ctx.save(); ctx.translate(5, 75); ctx.rotate(-0.3);
      ctx.fillRect(0, 0, 12, 20); ctx.fillStyle = skinColor; ctx.fillRect(5, 15, 40, 14); ctx.restore();
    } else if (this.state === 'crouch') {
      ctx.fillRect(-12, 40, 12, 25); ctx.fillRect(5, 40, 12, 25);
      ctx.fillStyle = skinColor; ctx.fillRect(-10, 55, 12, 12); ctx.fillRect(7, 55, 12, 12);
    } else {
      ctx.fillRect(-12, 70, 12, 35); ctx.fillRect(5, 70, 12, 35);
      ctx.fillStyle = '#555'; ctx.fillRect(-14, 102, 16, 8); ctx.fillRect(3, 102, 16, 8);
    }
    // Torso
    ctx.fillStyle = bodyColor;
    let torsoY = this.state === 'crouch' ? 10 : 20;
    ctx.fillRect(-18, torsoY + breathe, 38, 52 - (this.state === 'crouch' ? 20 : 0));
    ctx.fillStyle = this.isAI ? '#c00' : '#000';
    ctx.fillRect(-18, torsoY + 44 + breathe, 38, 6);
    // Arms
    ctx.fillStyle = skinColor;
    if (this.state === 'punch' && this.stateTimer >= 3 && this.stateTimer <= 12) {
      ctx.fillRect(15, torsoY + 8, 45, 12);
      ctx.fillStyle = this.isAI ? '#c00' : '#fff'; ctx.fillRect(55, torsoY + 5, 16, 18);
      ctx.fillStyle = skinColor; ctx.fillRect(-25, torsoY + 15, 12, 25);
    } else if (this.state === 'special' && this.stateTimer >= 5 && this.stateTimer <= 20) {
      ctx.fillRect(10, torsoY + 2, 35, 14); ctx.fillRect(10, torsoY + 20, 35, 14);
      let glow = Math.sin(this.stateTimer * 0.5) * 5;
      ctx.fillStyle = this.isAI ? '#f00' : '#0af';
      ctx.shadowColor = this.isAI ? '#f00' : '#0af'; ctx.shadowBlur = 20 + glow;
      ctx.beginPath(); ctx.arc(55, torsoY + 18, 18 + glow, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
    } else if (this.state === 'block') {
      ctx.fillRect(-5, torsoY + 5, 12, 35); ctx.fillRect(8, torsoY + 5, 12, 35);
      ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
      ctx.beginPath(); ctx.arc(5, torsoY + 30, 30, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1;
    } else {
      ctx.fillRect(-25, torsoY + 8 + breathe, 12, 30); ctx.fillRect(15, torsoY + 8 + breathe, 12, 30);
      ctx.fillStyle = this.isAI ? '#c00' : '#fff';
      ctx.fillRect(-27, torsoY + 5 + breathe, 14, 14); ctx.fillRect(15, torsoY + 5 + breathe, 14, 14);
    }
    // Head
    let headY = torsoY - 28 + breathe;
    ctx.fillStyle = skinColor; ctx.beginPath(); ctx.arc(2, headY, 20, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = hairColor;
    if (this.isAI) {
      ctx.beginPath(); ctx.moveTo(-18, headY-5); ctx.lineTo(-12, headY-25); ctx.lineTo(-5, headY-15);
      ctx.lineTo(2, headY-28); ctx.lineTo(10, headY-15); ctx.lineTo(16, headY-22); ctx.lineTo(22, headY-5);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(-20, headY-5); ctx.lineTo(-8, headY-30); ctx.lineTo(2, headY-20);
      ctx.lineTo(12, headY-32); ctx.lineTo(22, headY-5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#f00'; ctx.fillRect(-22, headY-8, 46, 6); ctx.fillRect(-22, headY-8, 4, 20);
    }
    ctx.fillStyle = '#fff'; ctx.fillRect(-6, headY-5, 8, 6); ctx.fillRect(6, headY-5, 8, 6);
    ctx.fillStyle = this.state === 'special' ? '#ff0' : '#222';
    ctx.fillRect(-3, headY-4, 4, 5); ctx.fillRect(9, headY-4, 4, 5);
    if (this.state === 'hit') { ctx.fillStyle = '#a00'; ctx.fillRect(-4, headY+8, 10, 6); }
    else if (this.state === 'special') { ctx.fillStyle = '#a00'; ctx.beginPath(); ctx.arc(3, headY+10, 5, 0, Math.PI*2); ctx.fill(); }
    else { ctx.fillStyle = '#a00'; ctx.fillRect(-2, headY+8, 8, 3); }
    ctx.restore();
  }
}

let p1 = new Fighter(200, '龍 Dragon', '#2255cc', false);
let p2 = new Fighter(700, '虎 Tiger', '#cc2222', true);

function startRound() {
  gameState = 'fighting'; timer = 99;
  p1.reset(200); p2.reset(700);
  comboTexts = []; hitSparks = []; koTimer = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (gameState === 'fighting') { timer--; if (timer <= 0) { timer = 0; endRound(); } }
  }, 1000);
}

function endRound() {
  gameState = 'ko'; koTimer = 180;
  if (p1.hp > p2.hp) p1Wins++; else if (p2.hp > p1.hp) p2Wins++;
  if (timerInterval) clearInterval(timerInterval);
}

function rectCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function checkAttack(attacker, defender) {
  let atk = attacker.getAttackBox();
  if (atk && !attacker.attackHit) {
    let def = defender.getHitbox();
    if (rectCollision(atk, def)) {
      attacker.attackHit = true;
      defender.takeDamage(atk.dmg, atk.type, attacker);
      if (defender.hp <= 0) endRound();
    }
  }
}

function drawBackground() {
  // Clear entire canvas first
  ctx.clearRect(0, 0, 900, 600);
  // Sky - fill full height as base
  let grad = ctx.createLinearGradient(0, 0, 0, 530);
  grad.addColorStop(0, '#1a0a2e'); grad.addColorStop(0.5, '#2d1b4e'); grad.addColorStop(1, '#4a2c6e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 900, 530);

  // Buildings with pre-calculated windows (no flickering)
  for (let bi = 0; bi < buildings.length; bi++) {
    let b = buildings[bi];
    ctx.fillStyle = '#0d0620';
    ctx.fillRect(b[0], b[1], b[2], b[3]);
    let wins = windowData[bi];
    for (let w of wins) {
      ctx.fillStyle = w.lit ? '#ffa' : '#553';
      ctx.fillRect(w.x, w.y, 6, 8);
    }
  }

  // Ground
  let groundGrad = ctx.createLinearGradient(0, 530, 0, 600);
  groundGrad.addColorStop(0, '#3a3a3a'); groundGrad.addColorStop(1, '#222');
  ctx.fillStyle = groundGrad; ctx.fillRect(0, 530, 900, 70);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, 530); ctx.lineTo(900, 530); ctx.stroke();

  // Stars (deterministic)
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 30; i++) {
    let sx = (i*137+50)%900, sy = (i*89+20)%250;
    ctx.globalAlpha = Math.sin(Date.now()*0.002+i)*0.5+0.5;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#ffe8a0'; ctx.shadowColor = '#ffe8a0'; ctx.shadowBlur = 30;
  ctx.beginPath(); ctx.arc(780, 80, 35, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, 900, 55);
  // P1 HP
  let p1HpW = 350*(p1.hp/p1.maxHp);
  ctx.fillStyle = '#333'; ctx.fillRect(40, 12, 350, 22);
  ctx.fillStyle = p1.hp > 50 ? '#0c0' : p1.hp > 25 ? '#fc0' : '#f00';
  ctx.fillRect(40, 12, p1HpW, 22);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(40, 12, 350, 22);
  // P2 HP
  let p2HpW = 350*(p2.hp/p2.maxHp);
  ctx.fillStyle = '#333'; ctx.fillRect(510, 12, 350, 22);
  ctx.fillStyle = p2.hp > 50 ? '#0c0' : p2.hp > 25 ? '#fc0' : '#f00';
  ctx.fillRect(510+350-p2HpW, 12, p2HpW, 22);
  ctx.strokeStyle = '#fff'; ctx.strokeRect(510, 12, 350, 22);
  // P1 Special
  let p1SpW = 120*(p1.special/p1.maxSpecial);
  ctx.fillStyle = '#222'; ctx.fillRect(40, 38, 120, 8);
  ctx.fillStyle = p1.special >= 50 ? '#0ff' : '#066'; ctx.fillRect(40, 38, p1SpW, 8);
  if (p1.special >= 50) { ctx.fillStyle = '#0ff'; ctx.font = '10px Arial'; ctx.fillText('必殺 READY!', 42, 55); }
  // P2 Special
  let p2SpW = 120*(p2.special/p2.maxSpecial);
  ctx.fillStyle = '#222'; ctx.fillRect(740, 38, 120, 8);
  ctx.fillStyle = p2.special >= 50 ? '#f44' : '#600'; ctx.fillRect(740+120-p2SpW, 38, p2SpW, 8);
  if (p2.special >= 50) { ctx.fillStyle = '#f44'; ctx.font = '10px Arial'; ctx.textAlign = 'right'; ctx.fillText('必殺 READY!', 858, 55); ctx.textAlign = 'left'; }
  // Timer
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
  ctx.fillText(timer.toString().padStart(2,'0'), 450, 36);
  // Names
  ctx.font = 'bold 14px Arial'; ctx.fillStyle = '#4af'; ctx.textAlign = 'left';
  ctx.fillText(`P1 ${p1.name}`, 42, 8);
  ctx.fillStyle = '#f44'; ctx.textAlign = 'right'; ctx.fillText(`CPU ${p2.name}`, 858, 8);
  // Wins
  ctx.textAlign = 'left';
  for (let i = 0; i < p1Wins; i++) { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(45+i*20, 53, 6, 0, Math.PI*2); ctx.fill(); }
  for (let i = 0; i < p2Wins; i++) { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(855-i*20, 53, 6, 0, Math.PI*2); ctx.fill(); }
  ctx.textAlign = 'left';
}

function drawTitle() {
  ctx.save(); ctx.clearRect(0, 0, 900, 600); ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 900, 600);
  for (let i = 0; i < 50; i++) {
    ctx.fillStyle = `hsl(${(Date.now()*0.05+i*20)%360}, 80%, 50%)`; ctx.globalAlpha = 0.05;
    let x = Math.sin(Date.now()*0.001+i)*400+450, y = Math.cos(Date.now()*0.001+i*0.7)*250+300;
    ctx.fillRect(x-100, y-100, 200, 200);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'center';
  ctx.fillStyle = '#000'; ctx.font = 'bold 72px Arial'; ctx.fillText('街 頭 格 鬥', 453, 203);
  let tg = ctx.createLinearGradient(200, 150, 700, 250);
  tg.addColorStop(0, '#ff4400'); tg.addColorStop(0.5, '#ffaa00'); tg.addColorStop(1, '#ff4400');
  ctx.fillStyle = tg; ctx.font = 'bold 72px Arial'; ctx.fillText('街 頭 格 鬥', 450, 200);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial'; ctx.fillText('STREET FIGHTER', 450, 250);
  ctx.fillStyle = '#4af'; ctx.font = 'bold 36px Arial'; ctx.fillText('龍 Dragon', 250, 360);
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 48px Arial'; ctx.fillText('VS', 450, 370);
  ctx.fillStyle = '#f44'; ctx.font = 'bold 36px Arial'; ctx.fillText('虎 Tiger (CPU)', 650, 360);
  if (Math.sin(Date.now()*0.005) > 0) {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial'; ctx.fillText('按 SPACE 開始遊戲', 450, 480);
  }
  ctx.font = '16px Arial'; ctx.fillStyle = '#888'; ctx.fillText('PRESS SPACE TO START', 450, 510);
  ctx.fillStyle = '#555'; ctx.font = '12px Arial'; ctx.fillText('broadbandhk.com', 450, 560);
  ctx.textAlign = 'left'; ctx.restore();
}

function drawKO() {
  ctx.save(); ctx.textAlign = 'center';
  let winner = p1.hp > p2.hp ? p1 : p2;
  let scale = Math.min(1, (180-koTimer)/20);
  ctx.fillStyle = '#f00'; ctx.font = `bold ${100*scale}px Arial`; ctx.fillText('K.O.!', 450, 280);
  if (koTimer < 120) {
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 36px Arial'; ctx.fillText(`${winner.name} 勝利!`, 450, 340);
    if (p1Wins >= 2 || p2Wins >= 2) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial'; ctx.fillText('最終勝利!!', 450, 390);
      if (Math.sin(Date.now()*0.005) > 0) { ctx.fillStyle = '#aaa'; ctx.font = '20px Arial'; ctx.fillText('按 SPACE 重新開始', 450, 440); }
    } else {
      if (Math.sin(Date.now()*0.005) > 0) { ctx.fillStyle = '#aaa'; ctx.font = '20px Arial'; ctx.fillText('按 SPACE 下一回合', 450, 440); }
    }
  }
  ctx.textAlign = 'left'; ctx.restore();
}

function gameLoop() {
  ctx.save();
  if (shakeScreen > 0) {
    ctx.translate((Math.random()-0.5)*shakeScreen*2, (Math.random()-0.5)*shakeScreen*2);
    shakeScreen--;
  }
  if (gameState === 'title') { drawTitle(); ctx.restore(); requestAnimationFrame(gameLoop); return; }
  drawBackground();
  if (gameState === 'fighting') {
    p1.update(p2); p2.update(p1);
    checkAttack(p1, p2); checkAttack(p2, p1);
    let dist = Math.abs(p1.x - p2.x);
    if (dist < 50) {
      let push = (50-dist)/2;
      if (p1.x < p2.x) { p1.x -= push; p2.x += push; } else { p1.x += push; p2.x -= push; }
    }
  }
  if (gameState === 'ko') { koTimer--; if (koTimer <= 0) { if (p1Wins >= 2 || p2Wins >= 2) { gameState = 'victory'; p1Wins = 0; p2Wins = 0; } else { gameState = 'victory'; roundNum++; } } }
  p1.draw(); p2.draw();
  for (let i = hitSparks.length-1; i >= 0; i--) {
    let s = hitSparks[i]; s.x += s.vx; s.y += s.vy; s.life--;
    ctx.fillStyle = s.color; ctx.globalAlpha = s.life/25; ctx.fillRect(s.x-3, s.y-3, 6, 6); ctx.globalAlpha = 1;
    if (s.life <= 0) hitSparks.splice(i, 1);
  }
  for (let i = comboTexts.length-1; i >= 0; i--) {
    let ct = comboTexts[i]; ct.y -= 0.8; ct.life--;
    ctx.fillStyle = ct.color; ctx.globalAlpha = ct.life/60; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
    ctx.fillText(ct.text, ct.x, ct.y); ctx.textAlign = 'left'; ctx.globalAlpha = 1;
    if (ct.life <= 0) comboTexts.splice(i, 1);
  }
  drawHUD();
  if (gameState === 'ko' || gameState === 'victory') drawKO();
  if (gameState === 'fighting') {
    ctx.fillStyle = '#fff'; ctx.font = '14px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`ROUND ${roundNum}`, 450, 65); ctx.textAlign = 'left';
  }
  ctx.restore();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
